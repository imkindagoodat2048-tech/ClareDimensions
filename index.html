<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClareDimensions</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --bg-color: #0f0f1a;
            --chat-bg: #1a1a2d;
            --primary: #4834d4;
            --danger: #eb4d4b;
            --text-white: #ffffff;
            --accent: #a29bfe;
            --green: #2ed573;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Courier New', monospace;
            background: var(--bg-color);
            color: var(--text-white);
            height: 100vh; overflow: hidden;
            display: flex; flex-direction: column;
        }
        #top-bar {
            padding: 6px 12px;
            background: rgba(26,26,45,0.97);
            border-bottom: 2px solid var(--primary);
            display: flex; align-items: center; justify-content: space-between;
            gap: 8px; z-index: 100; flex-shrink: 0;
        }
        .bar-left { display: flex; align-items: center; gap: 6px; }
        .site-title { font-size: 13px; font-weight: bold; color: var(--primary); letter-spacing: 0.05em; }
        .sep { color: #444; font-size: 12px; }
        .player-tag {
            font-size: 11px; color: var(--accent);
            padding: 3px 8px; background: #1a1a2d;
            border: 1px solid var(--primary); border-radius: 4px;
            display: flex; align-items: center; gap: 5px;
        }
        .pfp-mini {
            width: 16px; height: 16px; border-radius: 3px;
            object-fit: cover; border: 1px solid var(--primary); flex-shrink: 0;
        }
        .icon-btn {
            background: #2f3542; color: white; border: none;
            border-radius: 4px; padding: 4px 10px; font-size: 11px;
            cursor: pointer; height: 26px; font-family: inherit;
            transition: background 0.15s, transform 0.1s;
        }
        .icon-btn:hover  { background: #3d4555; }
        .icon-btn:active { transform: scale(0.92); }

        #c {
            flex: 1; display: block; width: 100%;
            cursor: crosshair; position: relative; overflow: hidden;
        }
        #c canvas { position: absolute; inset: 0; width: 100% !important; height: 100% !important; }

        /* ── JOIN SCREEN ── */
        #join-screen {
            position: fixed; inset: 0; background: rgba(0,0,0,0.92);
            z-index: 200; display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(6px);
        }
        #join-screen.hidden { display: none !important; }
        .join-box {
            background: var(--chat-bg); padding: 28px; border-radius: 14px;
            width: 300px; text-align: center;
            border: 1px solid var(--primary);
            box-shadow: 0 0 28px rgba(72,52,212,0.35);
        }
        .join-box h2 { color: var(--primary); font-size: 24px; margin: 0 0 15px 0; }
        .join-subtitle { color: #888; font-size: 11px; margin-top: 15px; cursor: pointer; }
        .join-box input {
            width: 100%; background: #0f0f1a; border: 1px solid #333;
            color: white; border-radius: 8px; padding: 10px;
            font-size: 12px; outline: none; font-family: inherit;
            margin-bottom: 10px; box-sizing: border-box;
        }
        .join-box input:focus { border-color: var(--primary); }
        .join-box button {
            width: 100%; padding: 12px; background: var(--primary);
            border: none; border-radius: 8px; color: white; font-weight: bold;
            cursor: pointer; font-family: inherit; font-size: 14px;
            margin-top: 20px; transition: background 0.15s;
        }
        .join-box button:hover  { background: #5a43e8; }
        .join-box button:active { transform: scale(0.97); }
        .join-box button:disabled { background: #333; color: #666; cursor: not-allowed; }
        .color-row { display: flex; gap: 8px; justify-content: center; margin: 10px 0 4px; }
        .cswatch {
            width: 22px; height: 22px; border-radius: 4px; cursor: pointer;
            border: 2px solid transparent; transition: transform 0.1s, border-color 0.1s;
        }
        .cswatch:hover  { transform: scale(1.2); }
        .cswatch.active { border-color: white; }
        .color-label { font-size: 10px; color: #666; margin-bottom: 2px; }
        #login-err { color: var(--danger); font-size: 10px; min-height: 14px; margin-bottom: 6px; display: none; }
        #login-spin { display: none; color: var(--accent); font-size: 10px; margin-bottom: 6px; }
        #cc-badge {
            display: none; background: #0f0f1a; border: 1px solid var(--green);
            border-radius: 8px; padding: 10px; margin-bottom: 12px;
            text-align: left; font-size: 11px;
        }
        #cc-badge img { width: 36px; height: 36px; border-radius: 6px; object-fit: cover; border: 1px solid var(--primary); float: left; margin-right: 10px; }
        #cc-badge .cc-name { color: var(--green); font-weight: bold; }
        #cc-badge .cc-status { color: #666; font-size: 10px; }

        /* ── OVERLAYS ── */
        #crosshair {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%,-50%);
            pointer-events: none; z-index: 50;
            color: rgba(255,255,255,0.65); font-size: 18px; line-height: 1;
            display: none;
        }
        #hint {
            position: fixed; bottom: 10px; left: 50%;
            transform: translateX(-50%);
            font-size: 10px; color: #3a3a4a;
            pointer-events: none; z-index: 50; letter-spacing: 0.05em; display: none;
        }
        #lock-prompt {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%,-50%);
            font-size: 12px; color: #555;
            pointer-events: none; z-index: 50;
            text-align: center; line-height: 1.8; display: none;
        }
        #dim-label {
            position: fixed; top: 44px; left: 50%;
            transform: translateX(-50%);
            font-size: 11px; color: var(--accent);
            background: rgba(15,15,26,0.85); border: 1px solid var(--primary);
            padding: 2px 10px; border-radius: 4px;
            pointer-events: none; z-index: 50; display: none;
            letter-spacing: 0.05em;
        }
        #portal-prompt {
            position: fixed; bottom: 26px; left: 50%;
            transform: translateX(-50%);
            font-size: 11px; color: #a29bfe;
            background: rgba(15,15,26,0.9); border: 1px solid var(--primary);
            padding: 4px 14px; border-radius: 6px;
            pointer-events: none; z-index: 50; display: none;
        }
        #gen-btn {
            position: fixed; bottom: 10px; right: 14px;
            font-size: 11px; z-index: 60; display: none;
            background: var(--green); color: #000; border: none;
            border-radius: 6px; padding: 5px 12px; cursor: pointer;
            font-family: inherit; font-weight: bold;
        }
        #pet-notif {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -120px);
            font-size: 13px; color: white;
            background: rgba(15,15,26,0.9); border: 1px solid var(--green);
            padding: 6px 16px; border-radius: 8px;
            pointer-events: none; z-index: 60; display: none;
        }

        @keyframes rainbow {
            0%{color:#ff4757}20%{color:#ffa502}40%{color:#eccc68}
            60%{color:#2ed573}80%{color:#1e90ff}100%{color:#ff4757}
        }
        .admin-tag { animation: rainbow 3s linear infinite; font-size: 9px; margin-left: 2px; font-weight: bold; }
    </style>
</head>
<body>

<!-- JOIN SCREEN — identical to ClareCool login -->
<div id="join-screen">
    <div class="join-box">
        <h2 id="auth-header">ClareDimensions</h2>
        <div id="cc-badge"></div>
        <div id="login-spin">⏳ Verifying...</div>

<!-- TOP BAR -->

<div id="c"></div>

<!-- OVERLAYS -->

<button id="gen-btn" onclick="generateGrasslands()">🌿 Generate All</button>
<div id="pet-notif"></div>

<!-- HP bar -->
<div id="hp-bar" style="
    position:fixed; top:44px; right:14px; z-index:60; display:none;
    background:rgba(15,15,26,0.9); border:1px solid var(--primary);
    border-radius:6px; padding:5px 10px; font-size:11px; min-width:120px;">
    ❤️ <span id="hp-val">100</span>/100
    <div style="width:100px;height:6px;background:#222;border-radius:3px;margin-top:3px;overflow:hidden;">
        <div id="hp-fill" style="height:100%;width:100%;background:var(--primary);border-radius:3px;transition:width .3s,background .3s;"></div>
    </div>
</div>

<!-- Basement screen effects -->
<div id="bsmt-flicker" style="position:fixed;inset:0;background:#000;pointer-events:none;z-index:800;display:none;opacity:0;"></div>
<div id="bsmt-msg" style="
    position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
    font-size:18px;color:white;pointer-events:none;z-index:900;
    display:none;text-align:center;letter-spacing:0.1em;
    text-shadow:0 0 10px rgba(255,255,255,0.8);
    font-family:'Courier New',monospace;"></div>
<div id="bsmt-interact" style="
    position:fixed;bottom:60px;left:50%;transform:translateX(-50%);
    font-size:11px;color:#a29bfe;background:rgba(15,15,26,0.9);
    border:1px solid var(--primary);padding:4px 14px;border-radius:6px;
    pointer-events:none;z-index:60;display:none;"></div>
<div id="weather-timer" style="
    position:fixed;top:44px;left:14px;z-index:60;display:none;
    background:rgba(15,15,26,0.9);border:1px solid var(--primary);
    border-radius:6px;padding:4px 10px;font-size:11px;color:var(--accent);
    font-family:'Courier New',monospace;letter-spacing:0.05em;"></div>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

<script>
// ════════════════════════════════════════════════
// FIREBASE
// ════════════════════════════════════════════════
const ccApp = firebase.initializeApp({
    apiKey:"AIzaSyB9Rlvq49-AiLBzMDvjz71QCTT4d6NqE98",
    authDomain:"mychat-28205.firebaseapp.com",
    databaseURL:"https://mychat-28205-default-rtdb.firebaseio.com",
    projectId:"mychat-28205",
    storageBucket:"mychat-28205.firebasestorage.app",
    messagingSenderId:"522121848657",
    appId:"1:522121848657:web:7108993439310bf6da5570"
}, "clarecool");
const ccDB = ccApp.database();

const bpApp = firebase.initializeApp({
    apiKey:"AIzaSyBiCQBzaMtlKu1pUMpNYyCn2wesSci38Hk",
    authDomain:"thisisafirebase.firebaseapp.com",
    databaseURL:"https://thisisafirebase-default-rtdb.firebaseio.com",
    projectId:"thisisafirebase",
    storageBucket:"thisisafirebase.firebasestorage.app",
    messagingSenderId:"869597817002",
    appId:"1:869597817002:web:375cb498243ebcfc9f08d3",
    measurementId:"G-72PYPCYPRW"
}, "baseplate");
const db = bpApp.database();

// ════════════════════════════════════════════════
// CONSTANTS
// ════════════════════════════════════════════════
const CC_ADMINS      = ["44","bboy2014","bartelsfamily5","hunter"];
const FALLBACK_COLORS = ['#4834d4','#2ed573','#eb4d4b','#ffa502','#a29bfe','#00cec9','#fdcb6e','#e84393'];
const SPEED          = 400;  // world units per second
const EYE_H          = 55;    // camera eye height
const HUB_R          = 400;   // hub radius
const G_SIZE         = 9000;  // grasslands half-size

// ════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════
let myId = null, myName = '', myColor = '#4834d4', myPfp = '', isAdmin = false, myRef = null;
let otherPlayers = {};
let pos   = { x: 0, y: 0, z: 0 };
let yaw   = 0, pitch = 0;
let keys  = {}, locked = false, lastPush = 0;
let currentDim = 'hub'; // 'hub' | 'grasslands'

// Three.js globals
const wrap = document.getElementById('c');
let renderer, clock3;
let activeScene, activeCamera;
const playerMeshes = {}, nameTags = {};

// ════════════════════════════════════════════════
// AUTH — identical to ClareCool
// ════════════════════════════════════════════════
let chosenColor = FALLBACK_COLORS[0];
document.getElementById('color-row');

async function ccLogin() {
    const u = document.getElementById('cc-user').value.trim().toLowerCase();
    const p = document.getElementById('cc-pass').value.trim();
    if (!u || !p) { showErr('Enter username and password.'); return; }
    setLoading(true);
    try {
        const snap = await ccDB.ref('users/' + u).once('value');
        if (!snap.exists()) { setLoading(false); showErr('User not found.'); return; }
        const data = snap.val();
        if (data.password !== p) { setLoading(false); showErr('Wrong password.'); return; }
        if (data.banned)         { setLoading(false); showErr('This account is banned on ClareCool.'); return; }
        setLoading(false);
        const pfpUrl = data.pfp || '', status = data.status || 'Active';
        const adminTag = CC_ADMINS.includes(u);
        const color = adminTag ? '#ffa502' : '#4834d4';
        showBadge(u, pfpUrl, status, adminTag);
        document.getElementById('cc-user').style.display = 'none';
        document.getElementById('cc-pass').style.display = 'none';
        document.getElementById('cc-btn').innerText = '▶ Play';
        document.getElementById('cc-btn').onclick = () => launchGame(u, color, pfpUrl, adminTag);
    } catch(e) { setLoading(false); showErr('Connection error.'); }
}

function showBadge(username, pfp, status, isAdm) {
    const badge = document.getElementById('cc-badge');
    badge.style.display = 'block';
    badge.innerHTML = `
        ${pfp ? `<img src="${pfp}" onerror="this.style.display='none'">` : ''}
        <div style="overflow:hidden;">
            <div class="cc-name">${username}${isAdm?' <span style="color:#ffa502;font-size:9px;">[ADM]</span>':''}</div>
            <div class="cc-status">"${status}"</div>
            <div style="color:#2ed573;font-size:9px;margin-top:2px;">✓ ClareCool verified</div>
        </div><div style="clear:both;"></div>`;
}

function toggleSignUp() {
    const ss = document.getElementById('signup-section');
    const tt = document.getElementById('toggle-auth-text');
    const hdr = document.getElementById('auth-header');
    const open = ss.style.display === 'none';
    ss.style.display = open ? 'block' : 'none';
    tt.innerText  = open ? 'Already have an account? Login' : 'New here? Sign Up';
    hdr.innerText = open ? 'Sign Up' : 'ClareDimensions';
}

async function ccSignUp() {
    const u = document.getElementById('su-user').value.trim().toLowerCase();
    const p = document.getElementById('su-pass').value.trim();
    if (!u || !p) { showErr('Fill in both fields.'); return; }
    if (/[ \(\)\[\]\{\}\<\>\/\\|]/.test(u)) { showErr('No spaces or brackets allowed.'); return; }
    setLoading(true);
    try {
        const snap = await ccDB.ref('users/' + u).once('value');
        if (snap.exists()) { setLoading(false); showErr('Username already taken.'); return; }
        await ccDB.ref('users/' + u).set({ password: p, pfp: '', status: 'Active', warned: false, banned: false });
        setLoading(false);
        showBadge(u, '', 'Active', false);
        document.getElementById('signup-section').style.display = 'none';
        document.getElementById('toggle-auth-text').style.display = 'none';
        document.getElementById('cc-btn').innerText = '▶ Play';
        document.getElementById('cc-btn').onclick = () => launchGame(u, '#4834d4', '', false);
        document.getElementById('cc-btn').style.display = 'block';
    } catch(e) { setLoading(false); showErr('Connection error.'); }
}

function showErr(msg) {
    const el = document.getElementById('login-err');
    el.innerText = msg; el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 3000);
}
function setLoading(on) {
    document.getElementById('login-spin').style.display = on ? 'block' : 'none';
    document.getElementById('cc-btn').disabled = on;
}

// ════════════════════════════════════════════════
// LAUNCH
// ════════════════════════════════════════════════
function launchGame(username, color, pfp, adminFlag) {
    myName = username; myColor = color; myPfp = pfp; isAdmin = adminFlag;
    document.getElementById('player-name').innerText = myName;
    if (pfp) {
        const mini = document.getElementById('pfp-mini');
        mini.src = pfp; mini.style.display = 'inline-block';
        mini.onerror = () => mini.style.display = 'none';
    }
    if (isAdmin) {
        document.getElementById('adm-tag').style.display = 'inline';
        document.getElementById('restart-btn').style.display = 'inline-block';
    }
    document.getElementById('crosshair').style.display  = 'block';
    document.getElementById('lock-prompt').style.display = 'block';
    document.getElementById('hint').style.display        = 'block';
    document.getElementById('dim-label').style.display   = 'block';

    pos.x = 0; pos.y = 0; pos.z = 0;

    myRef = db.ref('cd_players').push();
    myId  = myRef.key;
    myRef.set({ name: myName, color: myColor, pfp: myPfp, isAdmin, x: 0, y: 0, z: 0, yaw: 0, dim: 'hub' });
    myRef.onDisconnect().remove();

    db.ref('cd_players').on('value', snap => {
        otherPlayers = {};
        snap.forEach(child => { if (child.key !== myId) otherPlayers[child.key] = child.val(); });
        document.getElementById('online-label').innerText = (Object.keys(otherPlayers).length + 1) + ' online';
    });

    document.getElementById('join-screen').classList.add('hidden');
    initRenderer();
    enterHub();
    listenForServerRestart();
    loop();
}

function leaveGame() { if (myRef) myRef.remove(); location.reload(); }

// ── Server restart ──────────────────────────────────────────────
function restartServer() {
    if (!isAdmin) return;
    if (!confirm('Restart the server? This will kick everyone and reload all maps.')) return;
    // Wipe all players then broadcast the restart signal
    db.ref('cd_players').remove().then(() => {
        db.ref('cd_server/restart').set(Date.now());
    });
}

// Listen for restart signal — triggers on ALL clients
let _joinTime = 0;
function listenForServerRestart() {
    _joinTime = Date.now();
    db.ref('cd_server/restart').on('value', snap => {
        if (!snap.exists() || !myId) return;
        const restartTime = snap.val();
        // Ignore signals that were set before we joined (stale restarts)
        if (typeof restartTime !== 'number' || restartTime <= _joinTime) return;
        setTimeout(() => { if (myRef) myRef.remove(); location.reload(); }, Math.random() * 1500);
    });
}

// ── Remove player on tab close / navigate away ──
window.addEventListener('beforeunload', () => { if (myRef) myRef.remove(); });
document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'hidden' && myRef) myRef.remove();
    // Re-register if tab comes back visible and we're still in-game
    if (document.visibilityState === 'visible' && myId && !myRef) {
        myRef = db.ref('cd_players/' + myId);
        myRef.set({ name: myName, color: myColor, pfp: myPfp, isAdmin, x: pos.x, y: pos.y, z: pos.z, yaw, dim: currentDim });
        myRef.onDisconnect().remove();
    }
});

// ════════════════════════════════════════════════
// RENDERER — shared single WebGL renderer
// ════════════════════════════════════════════════
function initRenderer() {
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(wrap.clientWidth, wrap.clientHeight);
    renderer.shadowMap.enabled = true;
    renderer.setClearColor(0x08080f);
    wrap.appendChild(renderer.domElement);

    window.addEventListener('resize', () => {
        renderer.setSize(wrap.clientWidth, wrap.clientHeight);
        if (activeCamera) { activeCamera.aspect = wrap.clientWidth / wrap.clientHeight; activeCamera.updateProjectionMatrix(); }
    });

    wrap.addEventListener('click', () => { if (myId) wrap.requestPointerLock(); });
    document.addEventListener('pointerlockchange', () => {
        locked = document.pointerLockElement === wrap;
        document.getElementById('lock-prompt').style.display = (myId && !locked) ? 'block' : 'none';
    });

    clock3 = new THREE.Clock();
    document.addEventListener('keydown', e => {
        keys[e.code] = true;
        if(e.code==='Space') e.preventDefault();
        // Press G to unsoftlock — eject out of any collision box or interior
        if(e.code==='KeyG') {
            if(currentDim==='ghosttown' && gtInInterior) {
                leaveInterior();
            } else if(currentDim==='ghosttown') {
                const PR = 40;
                let ejected = false;
                for (const box of gtCollisionBoxes) {
                    if (pos.x > box.minX - PR && pos.x < box.maxX + PR &&
                        pos.z > box.minZ - PR && pos.z < box.maxZ + PR) {
                        const cx = (box.minX + box.maxX) / 2;
                        const cz = (box.minZ + box.maxZ) / 2;
                        const edx = pos.x - cx, edz = pos.z - cz;
                        const elen = Math.sqrt(edx*edx + edz*edz) || 1;
                        pos.x = cx + (edx/elen) * ((box.maxX-box.minX)/2 + PR + 20);
                        pos.z = cz + (edz/elen) * ((box.maxZ-box.minZ)/2 + PR + 20);
                        ejected = true; break;
                    }
                }
                if (!ejected) { pos.x = 0; pos.z = 0; } // fallback: reset to town centre
            }
        }
        // Legacy S-key unsoftlock (keep for compatibility)
        if(e.code==='KeyS' && currentDim==='ghosttown') {
            const PR = 40;
            for (const box of gtCollisionBoxes) {
                if (pos.x > box.minX - PR && pos.x < box.maxX + PR &&
                    pos.z > box.minZ - PR && pos.z < box.maxZ + PR) {
                    const cx = (box.minX + box.maxX) / 2;
                    const cz = (box.minZ + box.maxZ) / 2;
                    const edx = pos.x - cx, edz = pos.z - cz;
                    const elen = Math.sqrt(edx*edx + edz*edz) || 1;
                    pos.x = cx + (edx/elen) * ((box.maxX-box.minX)/2 + PR + 10);
                    pos.z = cz + (edz/elen) * ((box.maxZ-box.minZ)/2 + PR + 10);
                    break;
                }
            }
        }
    });
    document.addEventListener('keyup',   e => { keys[e.code] = false; });
    document.addEventListener('mousemove', e => {
        if (!locked) return;
        yaw   -= e.movementX * 0.002;
        pitch -= e.movementY * 0.002;
        pitch  = Math.max(-1.0, Math.min(0.9, pitch));
    });
}

function makeCamera() {
    const cam = new THREE.PerspectiveCamera(75, wrap.clientWidth / wrap.clientHeight, 1, 12000);
    cam.rotation.order = 'YXZ';
    return cam;
}

function makeSquareMesh(hexColor) {
    const g   = new THREE.Group();
    const mat = new THREE.MeshLambertMaterial({ color: hexColor });
    const body = new THREE.Mesh(new THREE.BoxGeometry(22, 30, 22), mat);
    body.position.y = 15; body.castShadow = true;
    const head = new THREE.Mesh(new THREE.BoxGeometry(20, 20, 20), mat);
    head.position.y = 42; head.castShadow = true;
    const eyeMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
    [-5, 5].forEach(ex => {
        const eye = new THREE.Mesh(new THREE.BoxGeometry(4, 4, 3), eyeMat);
        eye.position.set(ex, 44, -11); g.add(eye);
    });
    [body, head].forEach(m => {
        const e = new THREE.LineSegments(new THREE.EdgesGeometry(m.geometry), new THREE.LineBasicMaterial({ color: hexColor }));
        e.position.copy(m.position); g.add(e);
    });
    g.add(body, head);
    return g;
}

    starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starVerts, 3));
    hubScene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 3 })));

let grassScene, grassCamera;

const TERRAIN_SEGS = 120;

// Simple seeded random
function seededRand(seed) {
    let s = seed;
    return function() { s = (s * 9301 + 49297) % 233280; return s / 233280; };
}

// ── Terrain generation ──────────────────────────────────────
function generateGrasslands(force) {
    if (!force && myName !== 'bartelsfamily5') return;
    const rng = seededRand(Date.now() % 9999);

    const segs = TERRAIN_SEGS;
    const heights = [];

    // ── Step 1: Place biome complexes ─────────────────────────
    // Guaranteed layout: place complexes in a grid of 3x3 slots so they
    // can't all clump together. Slots are 0.33 wide in UV space.
    // We guarantee at least 1 valley complex, 1 mountain complex, rest plains.
    const biomeZones = [];

    // Fixed guaranteed slots spread across the map
    const guaranteedComplexes = [
        { u: 0.20, v: 0.25 },
        { u: 0.75, v: 0.20 },
        { u: 0.50, v: 0.70 },
        { u: 0.25, v: 0.75 },
    ];
    // Add 1-2 extra random ones
    const extraCount = 1 + Math.floor(rng() * 2);
    for (let i = 0; i < extraCount; i++) {
        guaranteedComplexes.push({ u: 0.1 + rng() * 0.8, v: 0.1 + rng() * 0.8 });
    }

    guaranteedComplexes.forEach((slot, i) => {
        // Jitter slightly within slot
        const cx = Math.max(0.12, Math.min(0.88, slot.u + (rng() - 0.5) * 0.08));
        const cz = Math.max(0.12, Math.min(0.88, slot.v + (rng() - 0.5) * 0.08));

        // Valley radius is generous — deep bowl
        const valleyR   = 0.07 + rng() * 0.06;
        // Mountain ring starts OUTSIDE the valley and doesn't overlap its centre
        const gapR      = valleyR + 0.02;              // small gap between valley edge and mountain start
        const mountainR = gapR   + 0.06 + rng() * 0.05;

        const depth  = -(150 + rng() * 130);
        const height =  (220 + rng() * 160);

        biomeZones.push({ type: 'valley',   cx, cz, innerR: 0,      outerR: valleyR,   depth,  height: 0      });
        biomeZones.push({ type: 'mountain', cx, cz, innerR: gapR,   outerR: mountainR, depth:0, height         });
    });

    // ── Step 2: Build height map ────────────────────────────────
    const biomeGrid = [];

    for (let vi = 0; vi <= segs; vi++) {
        heights.push([]);
        biomeGrid.push([]);
        for (let ui = 0; ui <= segs; ui++) {
            const u = ui / segs, v = vi / segs;
            const wx2 = (u - 0.5) * G_SIZE * 2;
            const wz2 = (v - 0.5) * G_SIZE * 2;

            const freq = 1 / 1200; // scaled to bigger map
            const plainsBump = (
                Math.sin(wx2 * freq * 1.3 + 0.3) * Math.cos(wz2 * freq * 0.9) +
                Math.sin(wx2 * freq * 2.8 + 1.1) * Math.cos(wz2 * freq * 2.1 + 0.7)
            ) * 12;

            // Each zone uses an annular influence: 0 inside innerR gap, rises to 1 at outerR
            let valleyInfluence  = 0, valleyDepth   = 0;
            let mountainInfluence = 0, mountainHeight = 0;

            biomeZones.forEach(zone => {
                const du   = u - zone.cx, dv = v - zone.cz;
                const dist = Math.sqrt(du*du + dv*dv);

                if (zone.type === 'valley') {
                    // Valley fills inward from outerR to 0
                    if (dist <= zone.outerR) {
                        const t = 1 - dist / zone.outerR;
                        const ts = t * t * (3 - 2 * t);
                        if (ts > valleyInfluence) { valleyInfluence = ts; valleyDepth = zone.depth; }
                    }
                } else {
                    // Mountain is a ring: only influences between innerR and outerR
                    if (dist >= zone.innerR && dist <= zone.outerR) {
                        const span = zone.outerR - zone.innerR;
                        const t    = 1 - (dist - zone.innerR) / span;
                        const ts   = t * t * (3 - 2 * t);
                        if (ts > mountainInfluence) { mountainInfluence = ts; mountainHeight = zone.height; }
                    }
                }
            });

            let h = plainsBump;

            if (valleyInfluence > 0 && valleyInfluence >= mountainInfluence) {
                h = plainsBump * (1 - valleyInfluence) + valleyDepth * valleyInfluence;
            } else if (mountainInfluence > 0) {
                const ridgeNoise = Math.sin(wx2 * freq * 4.1 + 2.3) * Math.cos(wz2 * freq * 3.7 + 1.1) * 50;
                h = plainsBump * (1 - mountainInfluence) + (mountainHeight + ridgeNoise) * mountainInfluence;
            }

            heights[vi].push(Math.max(-320, h));

            // Biome tag — lower thresholds so valleys actually get tagged
            if (valleyInfluence >= mountainInfluence && valleyInfluence > 0.20) {
                biomeGrid[vi].push('valley');
            } else if (mountainInfluence > 0.20) {
                biomeGrid[vi].push('mountain');
            } else {
                biomeGrid[vi].push('plains');
            }
        }
    }

    // ── Step 3: Apply to mesh with biome-based vertex colours ───
    const positions = terrainMesh.geometry.attributes.position;
    const colorArr  = [];
    for (let i = 0; i <= segs; i++) {
        for (let j = 0; j <= segs; j++) {
            const idx    = i * (segs + 1) + j;
            const h      = heights[i][j];
            const biome  = biomeGrid[i][j];
            positions.setZ(idx, h);

            let r, g, b;
            if (biome === 'mountain') {
                // Grey rocky peaks → darker slate at very top
                if (h > 280) { r=0.75; g=0.72; b=0.68; }       // snow/rock
                else if (h > 160) { r=0.52; g=0.48; b=0.42; }  // grey rock
                else { r=0.32; g=0.40; b=0.22; }                // mountain grass
            } else if (biome === 'valley') {
                // Deep dark green / murky at the bottom
                if (h < -160) { r=0.08; g=0.18; b=0.10; }      // very deep, dark
                else if (h < -60) { r=0.12; g=0.28; b=0.14; }  // deep valley
                else { r=0.16; g=0.38; b=0.18; }                // valley slope
            } else {
                // Plains — bright grass with tiny variation
                r=0.20; g=0.52; b=0.20;
            }
            colorArr.push(r, g, b);
        }
    }
    positions.needsUpdate = true;
    terrainMesh.geometry.setAttribute('color', new THREE.Float32BufferAttribute(colorArr, 3));
    terrainMesh.material.vertexColors = true;
    terrainMesh.geometry.computeVertexNormals();

    // ── Step 4: Trees ────────────────────────────────────────────
    treeMeshes.forEach(t => grassScene.remove(t));
    treeMeshes = [];
    for (let t = 0; t < 200; t++) {
        const ru = rng(), rv = rng();
        const ui = Math.min(Math.round(ru * segs), segs);
        const vi2 = Math.min(Math.round(rv * segs), segs);
        const h   = heights[vi2][ui];
        const bm  = biomeGrid[vi2][ui];
        if (bm === 'mountain' && h > 150) continue; // no trees on high peaks
        if (bm === 'valley'   && h < -100) continue; // no trees in deep valley floor
        const wx = (ru - 0.5) * G_SIZE * 2;
        const wz = (rv - 0.5) * G_SIZE * 2;
        const tree = makeTree(rng);
        tree.position.set(wx, h, wz);
        grassScene.add(tree);
        treeMeshes.push(tree);
    }

    // ── Step 5: Save to Firebase (include biomeGrid for enemy spawning) ─
    const flat = heights.map(row => row.map(v => Math.round(v * 10) / 10));
    const flatBiome = biomeGrid.map(row => row.join(','));
    db.ref('cd_grasslands_terrain').set({ heights: flat, biomeGrid: flatBiome, segs, generated: Date.now() });

    spawnGrasslandsEnemies();
    showPetNotif('🌿 Grasslands generated!');
}

let currentBiomeGrid = null; // set after terrain loads

function applyTerrain(data) {
    if (!data.heights) return;
    const { heights, biomeGrid: rawBiome, segs: s } = data;

    // Parse biomeGrid
    currentBiomeGrid = rawBiome ? rawBiome.map(row => row.split(',')) : null;

    const positions = terrainMesh.geometry.attributes.position;
    const colorArr  = [];
    for (let i = 0; i <= s; i++) {
        for (let j = 0; j <= s; j++) {
            const idx   = i * (s + 1) + j;
            const h     = heights[i]?.[j] ?? 0;
            const biome = currentBiomeGrid?.[i]?.[j] ?? 'plains';
            positions.setZ(idx, h);

            let r, g, b;
            if (biome === 'mountain') {
                if (h > 280)      { r=0.75; g=0.72; b=0.68; }
                else if (h > 160) { r=0.52; g=0.48; b=0.42; }
                else              { r=0.32; g=0.40; b=0.22; }
            } else if (biome === 'valley') {
                if (h < -160)     { r=0.08; g=0.18; b=0.10; }
                else if (h < -60) { r=0.12; g=0.28; b=0.14; }
                else              { r=0.16; g=0.38; b=0.18; }
            } else {
                r=0.20; g=0.52; b=0.20;
            }
            colorArr.push(r, g, b);
        }
    }
    positions.needsUpdate = true;
    terrainMesh.geometry.setAttribute('color', new THREE.Float32BufferAttribute(colorArr, 3));
    terrainMesh.material.vertexColors = true;
    terrainMesh.geometry.computeVertexNormals();
}

function getTerrainY(wx, wz) {
    if (!terrainMesh) return 0;
    const u = (wx / (G_SIZE * 2) + 0.5);
    const v = (wz / (G_SIZE * 2) + 0.5);
    const ui = Math.round(u * TERRAIN_SEGS);
    const vi = Math.round(v * TERRAIN_SEGS);
    const pos = terrainMesh.geometry.attributes.position;
    const idx = Math.max(0, Math.min(TERRAIN_SEGS, vi)) * (TERRAIN_SEGS + 1) + Math.max(0, Math.min(TERRAIN_SEGS, ui));
    return pos.getZ(idx) || 0;
}

function makeTree(rng) {
    const g   = new THREE.Group();
    const h   = 40 + rng() * 40;
    const trunk = new THREE.Mesh(
        new THREE.CylinderGeometry(4, 6, h, 6),
        new THREE.MeshLambertMaterial({ color: 0x5c3317 })
    );
    trunk.position.y = h / 2;
    const foliage = new THREE.Mesh(
        new THREE.ConeGeometry(28 + rng() * 12, 60 + rng() * 30, 7),
        new THREE.MeshLambertMaterial({ color: 0x1e6b2e })
    );
    foliage.position.y = h + 20;
    g.add(trunk, foliage);
    return g;
}

// ════════════════════════════════════════════════
// ENEMIES — THREE.Sprite (depth-correct occlusion)
// ════════════════════════════════════════════════
const enemies = [];
let enemyElems = []; // kept for clearEnemies compat, unused now
let isEnemyHost = false;      // true = this client writes enemy positions to Firebase
let enemyHostId = null;       // Firebase key of current host
let lastEnemyPush = 0;
let remoteEnemySprites = {};  // id -> THREE.Sprite for grasslands remote render
let remoteGTSprites = {};     // id -> THREE.Sprite for ghosttown remote render
const ENEMY_DEFS = {
    buddy:         { img: 'enemies/buddy.png',         hostile: false, speed: 200,  size: 80,  y: 0,   minY: 0   },
    fly:           { img: 'enemies/fly.png',           hostile: false, speed: 280,  size: 55,  y: 40,  minY: 0   },
    mountainbuddy: { img: 'enemies/mountainbuddy.png', hostile: true,  speed: 320,  size: 90,  y: 0,   minY: 120 },
};

// Texture cache — tries local path first, falls back to a colored canvas
const GITHUB_BASE = 'https://raw.githubusercontent.com/bartelsfamily5/claredimensions/main/enemies/';
const _spriteTexCache = {};

function getSpriteTexture(type, def, cb) {
    if (_spriteTexCache[type]) { cb(_spriteTexCache[type]); return; }

    function makeFallback() {
        const c = document.createElement('canvas'); c.width = 128; c.height = 128;
        const ctx = c.getContext('2d');
        const colors = {
            buddy:'#f39c12', fly:'#7f8c8d', mountainbuddy:'#c0392b',
            statue:'#7f8c8d', falseBuddy:'#8e44ad', spider:'#2c3e50',
            lightguide:'#3498db', default:'#888'
        };
        ctx.fillStyle = colors[type] || colors.default;
        ctx.fillRect(0,0,128,128);
        // Border
        ctx.strokeStyle = 'rgba(255,255,255,0.6)'; ctx.lineWidth = 4;
        ctx.strokeRect(2,2,124,124);
        // Label
        ctx.fillStyle = 'white'; ctx.font = 'bold 18px monospace';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(type.toUpperCase().slice(0,8), 64, 64);
        const t2 = new THREE.CanvasTexture(c);
        _spriteTexCache[type] = t2; cb(t2);
    }

    // Try local path (works if served), then GitHub raw, then fallback
    const localPath = def.img;
    const githubPath = GITHUB_BASE + def.img.split('/').pop();

    const loader = new THREE.TextureLoader();
    loader.load(
        localPath,
        t => { _spriteTexCache[type] = t; cb(t); },
        undefined,
        () => {
            // Local failed — try GitHub raw
            loader.load(
                githubPath,
                t => { _spriteTexCache[type] = t; cb(t); },
                undefined,
                () => makeFallback()
            );
        }
    );
}

function clearEnemies() {
    enemies.forEach(e => { if (e.sprite && grassScene) grassScene.remove(e.sprite); });
    enemyElems = [];
    enemies.length = 0;
}

function spawnGrasslandsEnemies() {
    clearEnemies();
    const rng = seededRand(42);
    const segs = TERRAIN_SEGS;

    function getBiome(wx, wz) {
        if (!currentBiomeGrid) return 'plains';
        const u  = Math.round(((wx / (G_SIZE * 2)) + 0.5) * segs);
        const v  = Math.round(((wz / (G_SIZE * 2)) + 0.5) * segs);
        return currentBiomeGrid[Math.max(0,Math.min(segs,v))]?.[Math.max(0,Math.min(segs,u))] ?? 'plains';
    }

    // Buddies — Plains only
    let buddyCount = 0;
    for (let i = 0; i < 200 && buddyCount < 18; i++) {
        const wx = (rng() - 0.5) * G_SIZE * 1.8;
        const wz = (rng() - 0.5) * G_SIZE * 1.8;
        if (getBiome(wx, wz) !== 'plains') continue;
        const wy = getTerrainY(wx, wz);
        spawnEnemy('buddy', wx, wy, wz);
        buddyCount++;
    }

    // Flies — Valley biome, flying above the floor
    let flyCount = 0;
    for (let i = 0; i < 200 && flyCount < 14; i++) {
        const wx = (rng() - 0.5) * G_SIZE * 1.8;
        const wz = (rng() - 0.5) * G_SIZE * 1.8;
        if (getBiome(wx, wz) !== 'valley') continue;
        const wy = getTerrainY(wx, wz);
        spawnEnemy('fly', wx, wy, wz);
        flyCount++;
    }

    // Mountain Buddies — Mountain biome only
    let mbCount = 0;
    for (let i = 0; i < 200 && mbCount < 8; i++) {
        const wx = (rng() - 0.5) * G_SIZE * 1.8;
        const wz = (rng() - 0.5) * G_SIZE * 1.8;
        if (getBiome(wx, wz) !== 'mountain') continue;
        const wy = getTerrainY(wx, wz);
        if (wy < 80) continue;
        spawnEnemy('mountainbuddy', wx, wy, wz);
        mbCount++;
    }
}

function spawnEnemy(type, wx, wy, wz) {
    const def = ENEMY_DEFS[type];
    const enemy = {
        type, def,
        x: wx, y: wy + def.y, z: wz,
        sprite: null,
        vx: (Math.random() - 0.5) * def.speed,
        vz: (Math.random() - 0.5) * def.speed,
        circling: false, circleTimer: 0, circleAngle: 0,
        chasing: false,
    };

    getSpriteTexture(type, def, tex => {
        const mat    = new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: true, depthWrite: false, sizeAttenuation: true });
        const sprite = new THREE.Sprite(mat);
        sprite.scale.set(def.size, def.size, 1);
        sprite.position.set(enemy.x, enemy.y + def.size * 0.5, enemy.z);
        sprite.userData.enemyType = type;
        sprite.userData.clickable = true;
        grassScene.add(sprite);
        enemy.sprite = sprite;
    });

    enemies.push(enemy);
    return enemy;
}

// Click-to-pet via raycaster on the canvas
const _raycaster = new THREE.Raycaster();
const _mouse     = new THREE.Vector2();
wrap.addEventListener('click', () => {
    if (currentDim !== 'grasslands' || !locked) return;
    _mouse.set(0, 0);
    _raycaster.setFromCamera(_mouse, grassCamera);
    const spriteObjs = enemies.filter(e => e.sprite).map(e => e.sprite);
    const hits = _raycaster.intersectObjects(spriteObjs);
    if (hits.length === 0) return;

    const hit     = hits[0].object;
    const enemy   = enemies.find(e => e.sprite === hit);
    if (!enemy) return;

    if (enemy.type === 'buddy') {
        showPetNotif('🐾 You petted a Buddy! It loves you!');

    } else if (enemy.type === 'mountainbuddy') {
        if (enemy.tamed) {
            showPetNotif('💙 Your Mountain Buddy hugs you!');
            return;
        }
        // 1/10 chance to tame
        if (Math.random() < 0.1) {
            enemy.tamed   = true;
            enemy.chasing = false;
            // Blue tint on the sprite
            if (enemy.sprite) enemy.sprite.material.color.set(0x88bbff);
            showPetNotif('💙 The Mountain Buddy trusts you! It will follow you now.');
        } else {
            showPetNotif('😤 The Mountain Buddy swatted you away!');
            showMBDamage();
        }
    }
});

function updateEnemies(dt) {
    if (currentDim !== 'grasslands') return;

    enemies.forEach(enemy => {
        // ── Movement ──────────────────────────────────
        if (enemy.type === 'buddy') {
            if (Math.random() < 0.01) {
                enemy.vx = (Math.random() - 0.5) * enemy.def.speed;
                enemy.vz = (Math.random() - 0.5) * enemy.def.speed;
            }
            enemy.x += enemy.vx * dt;
            enemy.z += enemy.vz * dt;
            enemy.y = getTerrainY(enemy.x, enemy.z);

        } else if (enemy.type === 'fly') {
            const pdx = pos.x - enemy.x, pdz = pos.z - enemy.z;
            const pdist = Math.sqrt(pdx*pdx + pdz*pdz);
            if (enemy.circling) {
                enemy.circleTimer -= dt;
                enemy.circleAngle += dt * 1.8;
                enemy.x = pos.x + Math.cos(enemy.circleAngle) * 250;
                enemy.z = pos.z + Math.sin(enemy.circleAngle) * 250;
                enemy.y = pos.y + EYE_H * 0.5 + Math.sin(enemy.circleAngle * 2) * 10;
                if (enemy.circleTimer <= 0) {
                    enemy.circling = false;
                    enemy.vx = (Math.random() - 0.5) * enemy.def.speed;
                    enemy.vz = (Math.random() - 0.5) * enemy.def.speed;
                }
            } else {
                if (pdist < 600 && Math.random() < 0.005) {
                    enemy.circling = true;
                    enemy.circleTimer = 5 + Math.random() * 1;
                    enemy.circleAngle = Math.atan2(enemy.z - pos.z, enemy.x - pos.x);
                }
                enemy.x += enemy.vx * dt;
                enemy.z += enemy.vz * dt;
                if (Math.random() < 0.008) {
                    enemy.vx = (Math.random() - 0.5) * enemy.def.speed;
                    enemy.vz = (Math.random() - 0.5) * enemy.def.speed;
                }
            }

        } else if (enemy.type === 'mountainbuddy') {
            const pdx = pos.x - enemy.x, pdz = pos.z - enemy.z;
            const pdist = Math.sqrt(pdx*pdx + pdz*pdz);
            const curY = getTerrainY(enemy.x, enemy.z);

            if (enemy.tamed) {
                // Follow player at a comfortable distance, no terrain restriction
                if (pdist > 400) {
                    const len = pdist || 1;
                    enemy.x += (pdx/len) * enemy.def.speed * dt;
                    enemy.z += (pdz/len) * enemy.def.speed * dt;
                }
                enemy.y = getTerrainY(enemy.x, enemy.z);
            } else {
                if (pdist < 700 && curY >= enemy.def.minY) enemy.chasing = true;
                else if (pdist > 1200) enemy.chasing = false;
                if (enemy.chasing) {
                    const len = Math.sqrt(pdx*pdx + pdz*pdz) || 1;
                    const nextX = enemy.x + (pdx/len) * enemy.def.speed * dt;
                    const nextZ = enemy.z + (pdz/len) * enemy.def.speed * dt;
                    if (getTerrainY(nextX, nextZ) >= 120) { enemy.x = nextX; enemy.z = nextZ; }
                    else enemy.chasing = false;

                    const now2 = Date.now();
                    if (pdist < 200 && (!enemy.lastHit || now2 - enemy.lastHit > 2000)) {
                        enemy.lastHit = now2;
                        showMBDamage();
                    }
                } else {
                    if (Math.random() < 0.008) {
                        enemy.vx = (Math.random() - 0.5) * enemy.def.speed * 0.5;
                        enemy.vz = (Math.random() - 0.5) * enemy.def.speed * 0.5;
                    }
                    const nx = enemy.x + enemy.vx * dt;
                    const nz = enemy.z + enemy.vz * dt;
                    if (getTerrainY(nx, nz) >= 120) { enemy.x = nx; enemy.z = nz; }
                }
                enemy.y = getTerrainY(enemy.x, enemy.z);
            }
        }

        if (enemy.type !== 'fly') enemy.y = getTerrainY(enemy.x, enemy.z);

        // ── Update sprite position (Three.js handles occlusion) ──
        if (enemy.sprite) {
            enemy.sprite.position.set(enemy.x, enemy.y + enemy.def.size * 0.5, enemy.z);
            // Always face camera (sprites do this automatically, but keep scale consistent)
        }
    });
}

function electEnemyHost(dim) {
    const hostRef = db.ref('cd_enemy_host/' + dim);
    hostRef.transaction(current => {
        // If no host, or host is gone (we can't know, so we claim it and overwrite)
        // bartelsfamily5 always takes priority
        if (!current || myName === 'bartelsfamily5') return myId;
        return current; // keep existing
    }, (err, committed, snap) => {
        isEnemyHost = snap && snap.val() === myId;
        enemyHostId = snap && snap.val();
        if (isEnemyHost) {
            // Remove host claim on disconnect
            hostRef.onDisconnect().remove();
            // Actually spawn enemies now
            if (dim === 'grasslands') spawnGrasslandsEnemies();
            else if (dim === 'ghosttown') spawnGTEnemies();
            else if (dim === 'moon') spawnMoonEnemies();
        }
    });
    // Listen for host changes
    hostRef.on('value', snap => {
        const newHost = snap.val();
        if (!newHost && myId) {
            // Host left — try to claim
            isEnemyHost = false;
            electEnemyHost(dim);
        }
        isEnemyHost = newHost === myId;
    });
}

function pushEnemyState(dim) {
    const now = Date.now();
    if (!isEnemyHost || now - lastEnemyPush < 100) return;
    lastEnemyPush = now;

    if (dim === 'grasslands') {
        const state = {};
        enemies.forEach((e, i) => {
            state[i] = { type: e.type, x: +e.x.toFixed(1), y: +e.y.toFixed(1), z: +e.z.toFixed(1) };
        });
        db.ref('cd_enemy_state/grasslands').set(state);
    } else if (dim === 'ghosttown') {
        const state = {};
        gtEnemies.forEach((e, i) => {
            if (e.dead) return;
            state[i] = { type: e.type, x: +e.x.toFixed(1), z: +e.z.toFixed(1) };
        });
        db.ref('cd_enemy_state/ghosttown').set(state);
    } else if (dim === 'moon') {
        const state = {};
        moonEnemies.forEach((e, i) => {
            if (!e.sprite) return;
            state[i] = { type: e.type, x: +e.x.toFixed(1), z: +e.z.toFixed(1) };
        });
        db.ref('cd_enemy_state/moon').set(state);
    }
}

function applyRemoteEnemies(state, dim) {
    if (dim === 'grasslands') {
        // Remove old sprites not in new state
        const ids = new Set(Object.keys(state));
        for (const id in remoteEnemySprites) {
            if (!ids.has(id)) { grassScene.remove(remoteEnemySprites[id]); delete remoteEnemySprites[id]; }
        }
        for (const id in state) {
            const e = state[id];
            const def = ENEMY_DEFS[e.type];
            if (!def) continue;
            if (!remoteEnemySprites[id]) {
                getSpriteTexture(e.type, def, tex => {
                    const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: true, depthWrite: false, sizeAttenuation: true });
                    const sp = new THREE.Sprite(mat);
                    sp.scale.set(def.size, def.size, 1);
                    grassScene.add(sp);
                    remoteEnemySprites[id] = sp;
                });
            } else {
                remoteEnemySprites[id].position.set(e.x, e.y + def.size * 0.5, e.z);
            }
        }
    } else if (dim === 'ghosttown') {
        const ids = new Set(Object.keys(state));
        for (const id in remoteGTSprites) {
            if (!ids.has(id)) { gtScene.remove(remoteGTSprites[id]); delete remoteGTSprites[id]; }
        }
        for (const id in state) {
            const e = state[id];
            const def = GT_ENEMY_DEFS[e.type];
            if (!def) continue;
            if (!remoteGTSprites[id]) {
                getSpriteTexture(e.type, def, tex => {
                    const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: true, depthWrite: false, sizeAttenuation: true });
                    if (def.tint) mat.color.set(def.tint);
                    const sp = new THREE.Sprite(mat);
                    sp.scale.set(def.size, def.size, 1);
                    gtScene.add(sp);
                    remoteGTSprites[id] = sp;
                });
            } else {
                remoteGTSprites[id].position.set(e.x, getGTTerrainY(e.x, e.z) + def.size * 0.5, e.z);
            }
        }
    } else if (dim === 'moon') {
        const ids = new Set(Object.keys(state));
        for (const id in remoteMoonSprites) {
            if (!ids.has(id)) { moonScene?.remove(remoteMoonSprites[id]); delete remoteMoonSprites[id]; }
        }
        for (const id in state) {
            const e = state[id];
            const defMap = { martian1:{size:80}, martian2:{size:80}, martian3:{size:80}, mimic:{size:120} };
            const def = defMap[e.type]; if (!def) continue;
            const imgMap = { martian1:'enemies/martian1.png', martian2:'enemies/martian2.png', martian3:'enemies/martian3.png', mimic:'enemies/mimic.png' };
            if (!remoteMoonSprites[id]) {
                getSpriteTexture(e.type, {img: imgMap[e.type]||'enemies/mimic.png'}, tex => {
                    const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: true, depthWrite: false, sizeAttenuation: true });
                    const sp = new THREE.Sprite(mat);
                    sp.scale.set(def.size, def.size, 1);
                    moonScene?.add(sp);
                    remoteMoonSprites[id] = sp;
                });
            } else {
                remoteMoonSprites[id].position.set(e.x, getMoonTerrainY(e.x, e.z) + def.size * 0.5, e.z);
            }
        }
    }
}

function clearRemoteEnemies(dim) {
    if (dim === 'grasslands') {
        for (const id in remoteEnemySprites) { grassScene?.remove(remoteEnemySprites[id]); }
        remoteEnemySprites = {};
    } else if (dim === 'ghosttown') {
        for (const id in remoteGTSprites) { gtScene?.remove(remoteGTSprites[id]); }
        remoteGTSprites = {};
    } else if (dim === 'moon') {
        for (const id in remoteMoonSprites) { moonScene?.remove(remoteMoonSprites[id]); }
        remoteMoonSprites = {};
    }
}

// PORTAL CHECKING
// ════════════════════════════════════════════════
let lastPortalCheck = 0;

function checkPortals() {
    const now = Date.now();
    if (now - lastPortalCheck < 200) return;
    lastPortalCheck = now;

    const prompt = document.getElementById('portal-prompt');

    if (currentDim === 'hub') {
        let nearest = null, nearestDist = ENTER_DIST;
        hubPortalMeshes.forEach(pm => {
            const dx = pos.x - pm.px, dz = pos.z - pm.pz;
            const d  = Math.sqrt(dx*dx + dz*dz);
            if (d < nearestDist) { nearestDist = d; nearest = pm; }
        });

        if (nearest) {
            if (nearest.data.locked) {
                prompt.innerText = '🔒 Locked';
                prompt.style.display = 'block';
            } else {
                prompt.innerText = `[ E ] Enter ${nearest.data.label}`;
                prompt.style.display = 'block';
                if (keys['KeyE']) {
                    keys['KeyE'] = false;
                    if (nearest.data.id === 'grasslands') enterGrasslands();
                    else if (nearest.data.id === 'ghosttown') enterGhostTown();
                    else if (nearest.data.id === 'moon') enterMoon();
                    else if (nearest.data.id === 'plasticterrace') enterPlasticTerrace();
                }
            }
        } else {
            prompt.style.display = 'none';
        }

    } else if (currentDim === 'grasslands') {
        // Return portal
        const dx = pos.x - 0, dz = pos.z - (G_SIZE - 100);
        const d  = Math.sqrt(dx*dx + dz*dz);
        if (d < ENTER_DIST) {
            prompt.innerText = '[ E ] Return to Hub';
            prompt.style.display = 'block';
            if (keys['KeyE']) { keys['KeyE'] = false; enterHub(); }
        } else {
            prompt.style.display = 'none';
        }
    } else if (currentDim === 'ghosttown') {
        checkGTDoors();
    } else if (currentDim === 'moon') {
        checkMoonPortal();
    } else if (currentDim.startsWith('pt_')) {
        checkPTPortals();
    }
}

// ════════════════════════════════════════════════
// UPDATE
// ════════════════════════════════════════════════
function update(dt) {
    if (!myId) return;

    const sinY = Math.sin(yaw), cosY = Math.cos(yaw);
    let dx = 0, dz = 0;
    if (keys['KeyW']||keys['ArrowUp'])    { dx -= sinY; dz -= cosY; }
    if (keys['KeyS']||keys['ArrowDown'])  { dx += sinY; dz += cosY; }
    if (keys['KeyA']||keys['ArrowLeft'])  { dx -= cosY; dz += sinY; }
    if (keys['KeyD']||keys['ArrowRight']) { dx += cosY; dz -= sinY; }

    const len = Math.sqrt(dx*dx + dz*dz);
    if (len > 0) { dx /= len; dz /= len; }

    let newX = pos.x + dx * SPEED * dt;
    let newZ = pos.z + dz * SPEED * dt;

    if (currentDim === 'hub') {
        // Stay on hub floor circle
        const hr = Math.sqrt(newX*newX + newZ*newZ);
        if (hr < HUB_R - 10) { pos.x = newX; pos.z = newZ; }
        pos.y = 0;
    } else if (currentDim === 'ghosttown') {
        let nx = newX, nz = newZ;
        const PR = 40; // player radius

        if (gtInInterior && gtInteriorBuilding) {
            // ── Interior movement: clamp to room bounds + per-building wall boxes ──
            const b = gtInteriorBuilding;
            const hw = b.sz.w * 0.45 - PR, hd = b.sz.d * 0.45 - PR;
            nx = Math.max(-hw, Math.min(hw, nx));
            nz = Math.max(-hd, Math.min(hd, nz));
            // Build interior wall AABBs once
            if (!b.iWalls) buildInteriorWalls(b);
            let blocked = false;
            for (const box of b.iWalls) {
                if (nx > box.minX-PR && nx < box.maxX+PR && nz > box.minZ-PR && nz < box.maxZ+PR) { blocked=true; break; }
            }
            if (!blocked) { pos.x = nx; pos.z = nz; }
            else {
                let bX=false;
                for (const box of b.iWalls) {
                    if (nx > box.minX-PR && nx < box.maxX+PR && pos.z > box.minZ-PR && pos.z < box.maxZ+PR) { bX=true; break; }
                }
                if (!bX) pos.x = nx;
                let bZ=false;
                for (const box of b.iWalls) {
                    if (pos.x > box.minX-PR && pos.x < box.maxX+PR && nz > box.minZ-PR && nz < box.maxZ+PR) { bZ=true; break; }
                }
                if (!bZ) pos.z = nz;
            }
            pos.y = 0;
        } else {
            // ── Exterior movement: world-space wall collision ──
            nx = Math.max(-GT_SIZE+50, Math.min(GT_SIZE-50, nx));
            nz = Math.max(-GT_SIZE+50, Math.min(GT_SIZE-50, nz));
            let blocked = false;
            for (const box of gtCollisionBoxes) {
                if (nx > box.minX-PR && nx < box.maxX+PR && nz > box.minZ-PR && nz < box.maxZ+PR) { blocked=true; break; }
            }
            if (!blocked) { pos.x = nx; pos.z = nz; }
            else {
                let blockedX=false;
                for (const box of gtCollisionBoxes) {
                    if (nx > box.minX-PR && nx < box.maxX+PR && pos.z > box.minZ-PR && pos.z < box.maxZ+PR) { blockedX=true; break; }
                }
                if (!blockedX) pos.x = nx;
                let blockedZ=false;
                for (const box of gtCollisionBoxes) {
                    if (pos.x > box.minX-PR && pos.x < box.maxX+PR && nz > box.minZ-PR && nz < box.maxZ+PR) { blockedZ=true; break; }
                }
                if (!blockedZ) pos.z = nz;
            }
            pos.y = getGTTerrainY(pos.x, pos.z);
        }
    } else if (currentDim === 'moon') {
        newX = Math.max(-MOON_SIZE+50, Math.min(MOON_SIZE-50, newX));
        newZ = Math.max(-MOON_SIZE+50, Math.min(MOON_SIZE-50, newZ));
        pos.x = newX; pos.z = newZ;
        pos.y = getMoonTerrainY(pos.x, pos.z);
    } else if (currentDim.startsWith('pt_')) {
        // Plastic Terrace sub-rooms: clamp to a generous flat area
        pos.x = Math.max(-PT_ROOM_SIZE, Math.min(PT_ROOM_SIZE, newX));
        pos.z = Math.max(-PT_ROOM_SIZE, Math.min(PT_ROOM_SIZE, newZ));
        // Only reset y to 0 in rooms other than room 1 — room 1 manages y for sinking
        if (ptRoom !== 1) pos.y = 0;
    } else {
        // Grasslands — clamp to terrain bounds
        newX = Math.max(-G_SIZE + 50, Math.min(G_SIZE - 50, newX));
        newZ = Math.max(-G_SIZE + 50, Math.min(G_SIZE - 50, newZ));
        pos.x = newX; pos.z = newZ;
        pos.y = getTerrainY(pos.x, pos.z);
    }

    if (activeCamera) {
        activeCamera.position.set(pos.x, pos.y + EYE_H, pos.z);
        activeCamera.rotation.set(pitch, yaw, 0);
    }

    checkPortals();

    // Firebase push (include dim so others can sync)
    const now = Date.now();
    if (myRef && now - lastPush > 80) {
        myRef.update({ x: +pos.x.toFixed(1), y: +pos.y.toFixed(1), z: +pos.z.toFixed(1), yaw: +yaw.toFixed(3), dim: currentDim });
        lastPush = now;
    }

    // Sync other player meshes (only those in same dim)
    for (const id in otherPlayers) {
        const p = otherPlayers[id];
        if (p.dim !== currentDim) {
            if (playerMeshes[id]) { activeScene?.remove(playerMeshes[id]); delete playerMeshes[id]; }
            if (nameTags[id])     { nameTags[id].style.display = 'none'; }
            continue;
        }
        if (!playerMeshes[id]) {
            const hue   = Math.abs(hashStr(id)) % 360;
            const color = new THREE.Color(`hsl(${hue},70%,55%)`);
            const mesh  = makeSquareMesh(color.getHex());
            activeScene.add(mesh);
            playerMeshes[id] = mesh;
        }
        const groundY = currentDim === 'grasslands' ? getTerrainY(p.x, p.z) : currentDim === 'ghosttown' ? getGTTerrainY(p.x, p.z) : currentDim === 'moon' ? getMoonTerrainY(p.x, p.z) : 0;
        playerMeshes[id].position.set(p.x, groundY, p.z);
        playerMeshes[id].rotation.y = p.yaw || 0;
    }
    for (const id in playerMeshes) {
        if (!otherPlayers[id] || otherPlayers[id].dim !== currentDim) {
            activeScene?.remove(playerMeshes[id]);
            delete playerMeshes[id];
        }
    }

    updateNameTags();
    updateEnemies(dt);
    if (currentDim === 'ghosttown') updateGhostTown(dt);
    if (currentDim === 'moon') updateMoon(dt);
    if (currentDim === 'grasslands') pushEnemyState('grasslands');
    else if (currentDim === 'ghosttown') pushEnemyState('ghosttown');
    else if (currentDim === 'moon') pushEnemyState('moon');

    // Animate hub portal glow
    if (currentDim === 'hub' && hubPortalMeshes) {
        const t = now * 0.001;
        hubPortalMeshes.forEach((pm, i) => {
            if (!pm.data.locked) pm.mesh.material.opacity = 0.35 + Math.sin(t * 2 + i) * 0.1;
        });
    }
}

// NAMETAGS
// ════════════════════════════════════════════════
function updateNameTags() {
    if (!activeCamera) return;
    const W = wrap.clientWidth, H = wrap.clientHeight;

    for (const id in otherPlayers) {
        const p = otherPlayers[id];
        if (p.dim !== currentDim) { if (nameTags[id]) nameTags[id].style.display = 'none'; continue; }
        if (!nameTags[id]) {
            const el = document.createElement('div');
            el.style.cssText = `position:fixed;pointer-events:none;z-index:40;
                background:rgba(15,15,26,0.85);border:1px solid var(--primary);
                color:#a29bfe;font-size:10px;font-weight:600;
                padding:2px 7px;border-radius:4px;
                transform:translateX(-50%);white-space:nowrap;
                font-family:'Courier New',monospace;`;
            document.body.appendChild(el);
            nameTags[id] = el;
        }
        const tag = nameTags[id];
        const groundY = currentDim === 'grasslands' ? getTerrainY(p.x, p.z) : currentDim === 'ghosttown' ? getGTTerrainY(p.x, p.z) : currentDim === 'moon' ? getMoonTerrainY(p.x, p.z) : 0;
        const wp  = new THREE.Vector3(p.x, groundY + 75, p.z);
        const prj = wp.clone().project(activeCamera);
        const sx  = (prj.x * 0.5 + 0.5) * W;
        const sy  = (-prj.y * 0.5 + 0.5) * H;
        const beh = prj.z > 1;
        tag.innerText = p.name + (p.isAdmin ? ' ★' : '');
        if (p.isAdmin) tag.style.color = '#ffa502';
        if (beh || sx < 0 || sx > W || sy < 0 || sy > H) tag.style.display = 'none';
        else { tag.style.display = 'block'; tag.style.left = sx+'px'; tag.style.top = (sy-8)+'px'; }
    }
    for (const id in nameTags) {
        if (!otherPlayers[id]) { nameTags[id].remove(); delete nameTags[id]; }
    }
}

const GT_SIZE        = 18000;  // half-size of full map (3x bigger)
const TOWN_R         = 3600;   // radius of town zone (3x)
const DESERT_R       = 9000;   // desert zone outer radius (3x)
const MOUNTAIN_R     = 12600;  // mountain zone outer radius (3x)
// Beyond MOUNTAIN_R = Dark Region
const GT_SPEED       = 420;
const GT_TERRAIN_SEGS = 180;   // terrain resolution
const WEATHER_CYCLE  = 300000; // 5 minutes in ms
const WEATHERS       = ['day','night','rainy','reckoning'];

// ── State ─────────────────────────────────────────────────────────────
let gtScene = null, gtCamera = null;
let gtGenerated  = false;
let gtTerrainMesh = null;
let gtTerrainHeights = null; // 2D array [vi][ui]
let gtCollisionBoxes = []; // { minX, maxX, minZ, maxZ } world-space AABB per wall
let gtWeather    = 'day';
let gtWeatherTimer = 0;
let gtBuildings  = [];   // { type, x, z, mesh, interior:null }
let gtEnemies    = [];
let gtParticles  = null; // rain

// ── Scene ─────────────────────────────────────────────────────────────
function buildGTScene() {
    gtScene  = new THREE.Scene();
    gtScene.background = new THREE.Color(0x87ceeb);
    gtCamera = makeCamera();
    gtCamera.far = 40000;
    gtCamera.updateProjectionMatrix();

    gtAmbLight = new THREE.AmbientLight(0xffffff, 0.7);
    gtScene.add(gtAmbLight);
    gtSunLight = new THREE.DirectionalLight(0xfff5e0, 1.0);
    gtSunLight.position.set(2400, 3600, 1800);
    gtScene.add(gtSunLight);

    // Terrain mesh with height support
    const geo = new THREE.PlaneGeometry(GT_SIZE*2, GT_SIZE*2, GT_TERRAIN_SEGS, GT_TERRAIN_SEGS);
    gtTerrainMesh = new THREE.Mesh(geo, new THREE.MeshLambertMaterial({ color: 0xd4a96a, vertexColors: false }));
    gtTerrainMesh.rotation.x = -Math.PI/2;
    gtTerrainMesh.userData.isGTGround = true;
    gtTerrainMesh.receiveShadow = true;
    gtScene.add(gtTerrainMesh);
    gtScene.fog = new THREE.Fog(0x87ceeb, GT_SIZE*0.4, GT_SIZE*1.0);
}

// ── GT Terrain helpers ────────────────────────────────────────────────
function getGTTerrainY(wx, wz) {
    if (!gtTerrainMesh || !gtTerrainHeights) return 0;
    const u = (wx / (GT_SIZE * 2) + 0.5);
    const v = (wz / (GT_SIZE * 2) + 0.5);
    const ui = Math.max(0, Math.min(GT_TERRAIN_SEGS, Math.round(u * GT_TERRAIN_SEGS)));
    const vi = Math.max(0, Math.min(GT_TERRAIN_SEGS, Math.round(v * GT_TERRAIN_SEGS)));
    return gtTerrainHeights[vi]?.[ui] ?? 0;
}

function buildGTTerrain(rng) {
    const segs = GT_TERRAIN_SEGS;
    const heights = [];

    // Place mountain zones around the ring perimeter
    const mountainZones = [];
    const numPeaks = 60;
    for (let i = 0; i < numPeaks; i++) {
        const angle = (i / numPeaks) * Math.PI * 2 + (rng() - 0.5) * 0.2;
        const r = (MOUNTAIN_R / GT_SIZE) * 0.5 + (rng() - 0.5) * 0.04; // normalized 0-1
        mountainZones.push({
            cx: Math.cos(angle) * r + 0.5,
            cz: Math.sin(angle) * r + 0.5,
            outerR: 0.04 + rng() * 0.03,
            height: 500 + rng() * 600,
        });
    }
    // A few extra inland peaks in dark region
    for (let i = 0; i < 12; i++) {
        const angle = rng() * Math.PI * 2;
        const r = ((MOUNTAIN_R + 1000) / GT_SIZE) * 0.5 + rng() * 0.06;
        mountainZones.push({
            cx: Math.cos(angle) * r + 0.5,
            cz: Math.sin(angle) * r + 0.5,
            outerR: 0.02 + rng() * 0.025,
            height: 300 + rng() * 400,
        });
    }

    for (let vi = 0; vi <= segs; vi++) {
        heights.push([]);
        for (let ui = 0; ui <= segs; ui++) {
            const u = ui / segs, v = vi / segs;
            const wx = (u - 0.5) * GT_SIZE * 2;
            const wz = (v - 0.5) * GT_SIZE * 2;
            const distFromCenter = Math.sqrt(wx*wx + wz*wz);

            // Gentle rolling hills across the map
            const freq = 1 / 4000;
            const baseBump = (
                Math.sin(wx * freq * 1.1 + 0.5) * Math.cos(wz * freq * 0.9 + 0.3) +
                Math.sin(wx * freq * 2.3 + 1.2) * Math.cos(wz * freq * 2.0 + 0.8)
            ) * 30;

            // Mountain influence
            let mInfluence = 0, mHeight = 0;
            for (const z of mountainZones) {
                const du = u - z.cx, dv = v - z.cz;
                const dist = Math.sqrt(du*du + dv*dv);
                if (dist < z.outerR) {
                    const t = 1 - dist / z.outerR;
                    const ts = t * t * (3 - 2 * t);
                    if (ts > mInfluence) { mInfluence = ts; mHeight = z.height; }
                }
            }

            let h = baseBump;
            if (mInfluence > 0) {
                const ridgeNoise = Math.sin(wx * freq * 5 + 2.1) * Math.cos(wz * freq * 4 + 1.3) * 80;
                h = baseBump * (1 - mInfluence) + (mHeight + ridgeNoise) * mInfluence;
            }

            // Town area stays flat
            if (distFromCenter < TOWN_R * 0.7) {
                const blend = Math.max(0, 1 - distFromCenter / (TOWN_R * 0.7));
                h = h * (1 - blend * 0.9);
            }

            heights[vi].push(Math.max(0, h));
        }
    }

    gtTerrainHeights = heights;

    // Apply to mesh with vertex colors
    const positions = gtTerrainMesh.geometry.attributes.position;
    const colorArr = [];
    for (let vi = 0; vi <= segs; vi++) {
        for (let ui = 0; ui <= segs; ui++) {
            const idx = vi * (segs + 1) + ui;
            const h = heights[vi][ui];
            const wx = (ui / segs - 0.5) * GT_SIZE * 2;
            const wz = (vi / segs - 0.5) * GT_SIZE * 2;
            const dist = Math.sqrt(wx*wx + wz*wz);
            positions.setZ(idx, h);

            let r, g, b;
            if (mInfluenceAt(h, dist)) {
                // Mountain — rocky
                if (h > 700) { r=0.82; g=0.80; b=0.78; }       // snow cap
                else if (h > 350) { r=0.55; g=0.50; b=0.43; }  // grey rock
                else { r=0.38; g=0.34; b=0.26; }                // rocky base
            } else if (dist < TOWN_R) {
                r=0.72; g=0.62; b=0.42; // dirt beige
            } else if (dist < DESERT_R) {
                r=0.82; g=0.72; b=0.48; // sand
            } else if (dist < MOUNTAIN_R) {
                r=0.52; g=0.46; b=0.38; // rocky grey desert
            } else {
                r=0.28; g=0.22; b=0.15; // dark region
            }
            colorArr.push(r, g, b);
        }
    }
    positions.needsUpdate = true;
    gtTerrainMesh.geometry.setAttribute('color', new THREE.Float32BufferAttribute(colorArr, 3));
    gtTerrainMesh.material.vertexColors = true;
    gtTerrainMesh.geometry.computeVertexNormals();
}

function mInfluenceAt(h, dist) {
    return h > 200 && dist > DESERT_R * 0.6;
}

// ── Generation ────────────────────────────────────────────────────────
function generateGhostTown(force) {
    if (!force && myName !== 'bartelsfamily5') return;
    const rng = seededRand(Date.now() % 9999);

    // Clear old
    gtBuildings.forEach(b => { gtScene.remove(b.mesh); b.scene = null; b.camera = null; });
    gtBuildings = []; gtCollisionBoxes = []; clearGTEnemies();

    // ── Build terrain ──
    buildGTTerrain(rng);

    // ── Road down center (on terrain) ──
    const road = new THREE.Mesh(
        new THREE.PlaneGeometry(360, TOWN_R*2),
        new THREE.MeshLambertMaterial({ color: 0x555555 })
    );
    road.rotation.x = -Math.PI/2; road.position.y = 2;
    gtScene.add(road);
    const road2 = road.clone(); road2.rotation.z = Math.PI/2; gtScene.add(road2);

    // ── Cacti in desert ──
    for (let c=0; c<200; c++) {
        const angle = rng()*Math.PI*2;
        const r = TOWN_R + 500 + rng()*(MOUNTAIN_R - TOWN_R - 1000);
        const cx = Math.cos(angle)*r, cz = Math.sin(angle)*r;
        const cy = getGTTerrainY(cx, cz);
        const cactus = makeCactus(cx, cz);
        cactus.position.y = cy;
        gtScene.add(cactus);
    }

    // ── Town Hall (always 1, near center) ──
    placeTownHall(rng);

    // ── Museum (always 1) ──
    placeMuseum(rng);

    // ── Other buildings — no overlap ──
    const buildingPool = ['store','house1','house2','misc1','misc2','misc3','misc4'];
    const numBuildings = 18 + Math.floor(rng()*10);
    const placed = [
        { x: gtBuildings[0]?.x||0, z: gtBuildings[0]?.z||0, hw: 280, hd: 220 },
        { x: gtBuildings[1]?.x||0, z: gtBuildings[1]?.z||0, hw: 260, hd: 210 },
    ];
    for (let i=0; i<numBuildings; i++) {
        let attempts = 0, ok = false, bx, bz;
        while (attempts++ < 60 && !ok) {
            const angle = rng()*Math.PI*2;
            const r = 500 + rng()*(TOWN_R - 700);
            bx = Math.cos(angle)*r; bz = Math.sin(angle)*r;
            if (Math.abs(bx) < 300 || Math.abs(bz) < 300) continue;
            const sz = BLDG_SIZES[buildingPool[0]];
            const hw = (sz.w/2) + 150, hd = (sz.d/2) + 150;
            ok = placed.every(p => {
                return Math.abs(p.x - bx) > (p.hw + hw) || Math.abs(p.z - bz) > (p.hd + hd);
            });
        }
        if (!ok) continue;
        const type = buildingPool[Math.floor(rng()*buildingPool.length)];
        const sz = BLDG_SIZES[type];
        placeBuilding(type, bx, bz, rng);
        placed.push({ x:bx, z:bz, hw: sz.w/2+150, hd: sz.d/2+150 });
    }

    // ── Save ──
    const saveData = {
        buildings: gtBuildings.map(b=>({ type:b.type, x:+b.x.toFixed(1), z:+b.z.toFixed(1), rot:+(b.rot||0).toFixed(3) })),
        terrain: { heights: gtTerrainHeights.map(row => row.map(v => Math.round(v*10)/10)), segs: GT_TERRAIN_SEGS },
        generated: Date.now()
    };
    db.ref('cd_ghosttown').set(saveData);
    db.ref('cd_gt_weather').set('day');
    gtClockData = generateWeatherClock(Date.now() % 99999);
    gtGenerated = true;
    // Respawn enemies after regeneration
    clearGTEnemies();
    spawnGTEnemies();
    showGTMsg('🏚️ Ghost Town generated!'); setTimeout(()=>showGTMsg(''), 2500);
}

function applyGTData(data) {
    if (!data.buildings) return;
    gtBuildings.forEach(b => gtScene.remove(b.mesh));
    gtBuildings = []; gtCollisionBoxes = [];
    if (data.terrain && data.terrain.heights) {
        gtTerrainHeights = data.terrain.heights;
        const segs = data.terrain.segs || GT_TERRAIN_SEGS;
        const positions = gtTerrainMesh.geometry.attributes.position;
        const colorArr = [];
        for (let vi = 0; vi <= segs; vi++) {
            for (let ui = 0; ui <= segs; ui++) {
                const idx = vi * (segs + 1) + ui;
                const h = gtTerrainHeights[vi]?.[ui] ?? 0;
                const wx = (ui / segs - 0.5) * GT_SIZE * 2;
                const wz = (vi / segs - 0.5) * GT_SIZE * 2;
                const dist = Math.sqrt(wx*wx + wz*wz);
                positions.setZ(idx, h);
                let r, g, b;
                if (mInfluenceAt(h, dist)) {
                    if (h > 700)      { r=0.82; g=0.80; b=0.78; }
                    else if (h > 350) { r=0.55; g=0.50; b=0.43; }
                    else              { r=0.38; g=0.34; b=0.26; }
                } else if (dist < TOWN_R) {
                    r=0.72; g=0.62; b=0.42;
                } else if (dist < DESERT_R) {
                    r=0.82; g=0.72; b=0.48;
                } else if (dist < MOUNTAIN_R) {
                    r=0.52; g=0.46; b=0.38;
                } else {
                    r=0.28; g=0.22; b=0.15;
                }
                colorArr.push(r, g, b);
            }
        }
        positions.needsUpdate = true;
        gtTerrainMesh.geometry.setAttribute('color', new THREE.Float32BufferAttribute(colorArr, 3));
        gtTerrainMesh.material.vertexColors = true;
        gtTerrainMesh.geometry.computeVertexNormals();
    }

    const rng = seededRand(42);
    data.buildings.forEach(b => placeBuilding(b.type, b.x, b.z, rng, b.rot));

    // Cacti
    const rng2 = seededRand(13);
    for (let c=0; c<200; c++) {
        const angle = rng2()*Math.PI*2;
        const r = TOWN_R + 500 + rng2()*(MOUNTAIN_R - TOWN_R - 1000);
        const cx = Math.cos(angle)*r, cz = Math.sin(angle)*r;
        const cy = getGTTerrainY(cx, cz);
        const cactus = makeCactus(cx, cz);
        cactus.position.y = cy;
        gtScene.add(cactus);
    }
}

// ── Building placement ────────────────────────────────────────────────
const BLDG_SIZES = {
    store:    { w:200, d:200, h:160 },
    house1:   { w:200, d:200, h:150 },
    house2:   { w:320, d:280, h:160 },
    misc1:    { w:180, d:180, h:140 },
    misc2:    { w:180, d:180, h:140 },
    misc3:    { w:260, d:260, h:150 },
    misc4:    { w:400, d:400, h:180 },
    townhall: { w:500, d:400, h:240 },
    museum:   { w:480, d:380, h:220 },
};

function placeBuilding(type, bx, bz, rng, rot) {
    const sz   = BLDG_SIZES[type] || BLDG_SIZES.misc1;
    const brot = rot !== undefined ? rot : rng()*Math.PI*2;
    const grp  = new THREE.Group();
    const groundY = getGTTerrainY(bx, bz);

    // Walls
    const wallCol = { store:0xd4b483, house1:0xc8a870, house2:0xc09a60,
        misc1:0xd0aa7a, misc2:0xcc9966, misc3:0xc89050, misc4:0xd0a868,
        townhall:0xe8e0cc, museum:0xe0d8c0 }[type] || 0xc8a870;
    const wallMat = new THREE.MeshLambertMaterial({ color: wallCol });
    const roofMat = new THREE.MeshLambertMaterial({ color: 0x884422 });

    const W=sz.w, D=sz.d, H=sz.h, WT=10;
    grp.add(mkBox(W,H,WT, wallMat, 0,H/2,-D/2));
    grp.add(mkBox(WT,H,D, wallMat, -W/2,H/2,0));
    grp.add(mkBox(WT,H,D, wallMat,  W/2,H/2,0));
    const doorW=60, doorH=120;
    const sw=(W-doorW)/2;
    grp.add(mkBox(sw,H,WT, wallMat, -W/2+sw/2, H/2, D/2));
    grp.add(mkBox(sw,H,WT, wallMat,  W/2-sw/2, H/2, D/2));
    grp.add(mkBox(doorW,H-doorH,WT, wallMat, 0, doorH+(H-doorH)/2, D/2));

    const doorMat = new THREE.MeshLambertMaterial({ color: 0x5c3317 });
    grp.add(mkBox(doorW+8,8,WT+2, doorMat, 0, doorH, D/2));
    const doorTrigger = new THREE.Mesh(new THREE.BoxGeometry(doorW,doorH,30), new THREE.MeshBasicMaterial({visible:false}));
    doorTrigger.position.set(0, doorH/2, D/2);
    doorTrigger.userData.isDoor = true; doorTrigger.userData.buildingIdx = gtBuildings.length;
    grp.add(doorTrigger);

    grp.add(mkBox(W+WT*2, WT, D+WT*2, roofMat, 0, H+WT/2, 0));

    grp.rotation.y = brot;
    grp.position.set(bx, groundY, bz);
    gtScene.add(grp);

    // Per-wall AABBs — only the 4 exterior walls block the player.
    // Furniture/interior objects have no collision.
    // Each wall is a thin rectangle in local space; we rotate its corners to world space.
    const cosR = Math.cos(brot), sinR = Math.sin(brot);
    function addWallAABB(lx0, lz0, lx1, lz1) {
        // Convert two local-space corners to world space and get AABB
        const pts = [{lx:lx0,lz:lz0},{lx:lx1,lz:lz1}];
        let minX=Infinity,maxX=-Infinity,minZ=Infinity,maxZ=-Infinity;
        for (const p of pts) {
            const wx2 = bx + p.lx*cosR - p.lz*sinR;
            const wz2 = bz + p.lx*sinR + p.lz*cosR;
            if(wx2<minX)minX=wx2; if(wx2>maxX)maxX=wx2;
            if(wz2<minZ)minZ=wz2; if(wz2>maxZ)maxZ=wz2;
        }
        // Ensure minimum thickness so collision works even when wall is axis-aligned
        if(maxX-minX < WT*2) { maxX+=WT; minX-=WT; }
        if(maxZ-minZ < WT*2) { maxZ+=WT; minZ-=WT; }
        gtCollisionBoxes.push({ minX, maxX, minZ, maxZ });
    }
    const hw = W/2, hd = D/2;
    // Back wall  (local z = -D/2)
    addWallAABB(-hw, -hd-WT,  hw, -hd+WT);
    // Front wall (local z = +D/2) — same, door gap doesn't matter for AABB
    addWallAABB(-hw,  hd-WT,  hw,  hd+WT);
    // Left wall  (local x = -W/2)
    addWallAABB(-hw-WT, -hd, -hw+WT,  hd);
    // Right wall (local x = +W/2)
    addWallAABB( hw-WT, -hd,  hw+WT,  hd);

    const bldg = { type, x:bx, z:bz, rot:brot, mesh:grp, sz, interior:null };
    gtBuildings.push(bldg);
    return bldg;
}

function placeTownHall(rng) {
    placeBuilding('townhall', (rng()-0.5)*600, -(TOWN_R*0.6), rng, 0);

function applyWeather(w) {
    gtWeather = w;
    document.getElementById('dim-label').innerText = '🏚️ Ghost Town — ' + ({
        day:'☀️ Day', night:'🌙 Night', rainy:'🌧️ Rain', reckoning:'⚠️ Reckoning'
    }[w]||w);

    // Sky / lighting
    const configs = {
        day:       { sky:0x87ceeb, amb:0.75, sun:1.0,  fog:0x87ceeb },
        night:     { sky:0x080818, amb:0.12, sun:0.0,  fog:0x080818 },
        rainy:     { sky:0x445566, amb:0.35, sun:0.2,  fog:0x334455 },
        reckoning: { sky:0x220a00, amb:0.15, sun:0.05, fog:0x1a0500 },
    };
    const cfg = configs[w] || configs.day;
    if (gtScene)  gtScene.background = new THREE.Color(cfg.sky);
    if (gtScene)  gtScene.fog = new THREE.Fog(cfg.fog, GT_SIZE*0.3, GT_SIZE*0.8);
    if (gtAmbLight) gtAmbLight.intensity = cfg.amb;
    if (gtSunLight) gtSunLight.intensity = cfg.sun;

    // Rain particles
    if (gtRainParticles) { gtScene.remove(gtRainParticles); gtRainParticles = null; }
    if (w === 'rainy' || w === 'reckoning') buildRain();

    // Reckoning warning
    if (w === 'reckoning') {
        showGTMsg('Something is wrong. Get inside.');
        setTimeout(() => showGTMsg(''), 4000);
        startShake();
    } else {
        stopShake();
    }

    // Respawn enemies for new weather
    clearGTEnemies();
    if (gtGenerated || Object.keys(gtBuildings).length > 0) spawnGTEnemies();
    updateWeatherTimerUI();
}

function buildRain() {
    const count = 2000;
    const geo   = new THREE.BufferGeometry();
    const verts = [];
    for (let i=0; i<count; i++) {
        verts.push((Math.random()-0.5)*GT_SIZE*0.3, Math.random()*800, (Math.random()-0.5)*GT_SIZE*0.3);
    }
