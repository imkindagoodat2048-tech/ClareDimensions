// ── ROOM 7 — Lost 404 ─────────────────────────────────────────────
function buildPTRoom7() {
    document.getElementById('dim-label').innerText = '📡 Lost 404';
    // Abstract glitch world — black & white with checker and noise patterns
    ptScene.background = new THREE.Color(0xf0f0f0);
    ptScene.fog = new THREE.FogExp2(0xf0f0f0, 0.00012);
    ptScene.add(new THREE.AmbientLight(0xffffff, 0.6));
    ptScene.add(new THREE.DirectionalLight(0xffffff, 0.8));

    // Floor: alternating black/white checker pattern
    const checkerSize = 400;
    for (let i = -12; i <= 12; i++) {
        for (let j = -12; j <= 12; j++) {
            const tile = new THREE.Mesh(
                new THREE.PlaneGeometry(checkerSize, checkerSize),
                new THREE.MeshLambertMaterial({ color: (i+j)%2===0 ? 0xffffff : 0x111111 })
            );
            tile.rotation.x = -Math.PI/2;
            tile.position.set(i*checkerSize, -0.5, j*checkerSize);
            ptScene.add(tile);
        }
    }

    // Scattered abstract shapes — boxes, diamonds at random scales
    const rng4 = seededRand(404);
    const geoBMats = [
        new THREE.MeshBasicMaterial({ color: 0x000000 }),
        new THREE.MeshBasicMaterial({ color: 0xffffff }),
        new THREE.MeshBasicMaterial({ wireframe: true, color: 0x000000 }),
    ];
    for (let i = 0; i < 80; i++) {
        const tx = (rng4()-0.5)*16000, tz = (rng4()-0.5)*16000;
        const s = 50 + rng4()*400;
        const sh = new THREE.Mesh(new THREE.BoxGeometry(s, s*2, s),
            geoBMats[Math.floor(rng4()*3)]);
        sh.position.set(tx, s, tz);
        sh.rotation.y = rng4()*Math.PI;
        ptScene.add(sh);
    }

    // Floating diamonds
    for (let i = 0; i < 30; i++) {
        const tx = (rng4()-0.5)*10000, tz = (rng4()-0.5)*10000;
        const s = 100 + rng4()*300;
        const dia = new THREE.Mesh(new THREE.OctahedronGeometry(s),
            geoBMats[Math.floor(rng4()*2)]);
        dia.position.set(tx, 200 + rng4()*800, tz);
        ptScene.add(dia);
    }

    // Swirly horizon cylinders (like distant objects in Image 3)
    for (let i = 0; i < 20; i++) {
        const ang = rng4()*Math.PI*2, dist = 4000 + rng4()*8000;
        const h = 400 + rng4()*1200;
        const cyl = new THREE.Mesh(new THREE.CylinderGeometry(80+rng4()*120, 80+rng4()*120, h, 8),
            geoBMats[Math.floor(rng4()*2)]);
        cyl.position.set(Math.cos(ang)*dist, h/2, Math.sin(ang)*dist);
        ptScene.add(cyl);
    }

    // Text sequence
    const texts = [
        { delay: 30000, msg: "I've been watching you since you first started playing this game." },
        { delay: 60000, msg: "You're not bad at it, not at all." },
        { delay: 90000, msg: "I will have to send you to the end. This is not by my choice." },
    ];
    texts.forEach(t => {
        setTimeout(() => {
            ptShowOverlay(t.msg, '#cc44ee', 10000, null);
        }, t.delay);
    });
    // 10s after text 3 → Placeholder
    setTimeout(() => { enterPTRoom(6); }, 100000);

    ptScene.userData.onUpdate = () => {};
}

// ── PT portal / door checks ───────────────────────────────────────
function checkPTPortals() {
    const prompt = document.getElementById('portal-prompt');

    if (ptRoom === 1) {
        // ── Wall collision — clamp player inside room interior ────
        const ud = ptScene.userData;
        if (ud.halfW) {
            const PR = 28;
            const innerW = ud.halfW - ud.wallT - PR;
            const innerD = ud.halfD - ud.wallT - PR;
            // Left / right walls
            if (pos.x < -innerW) pos.x = -innerW;
            if (pos.x >  innerW) pos.x =  innerW;
            // Front wall
            if (pos.z > innerD) pos.z = innerD;
            // Back wall — allow exit gap (x between -35..35 lets player through)
            const inGap = ud.exitGap && pos.x > ud.exitGap.minX && pos.x < ud.exitGap.maxX;
            if (!inGap && pos.z < -innerD) pos.z = -innerD;
        }

        // ── Exit door ─────────────────────────────────────────────
        const ed = ptScene.userData.exitDoor;
        if (ed) {
            const edx = pos.x - ed.x, edz = pos.z - ed.z;
            if (Math.sqrt(edx*edx + edz*edz) < 80) {
                prompt.innerText = '[ E ] Exit to Hub';
                prompt.style.display = 'block';
                if (keys['KeyE']) { keys['KeyE'] = false; exitPlasticTerrace(); }
            } else {
                prompt.style.display = 'none';
            }
        } else {
            prompt.style.display = 'none';
        }

    } else if (ptRoom === 2) {
        // Door proximity checks
        if (ptScene.userData.doors) {
            let nearDoor = null;
            ptScene.userData.doors.forEach(d => {
                const dx = pos.x-d.x, dz2 = pos.z-d.z;
                if (Math.sqrt(dx*dx+dz2*dz2) < 160) nearDoor = d;
            });
            if (nearDoor) {
                prompt.innerText = nearDoor.label;
                prompt.style.color = nearDoor.color;
                prompt.style.display = 'block';
                if (keys['KeyE']) { keys['KeyE']=false; prompt.style.color=''; enterPTRoom(nearDoor.dest); }
            } else { prompt.style.display='none'; prompt.style.color=''; }
        }

    } else if (ptRoom === 3) {
        // Near the empty door → enter Cubicle Farm
        const DOOR_Z = ptScene.userData.everpurpleDoorZ || 50000;
        const dx = pos.x, dz2 = pos.z - DOOR_Z;
        if (Math.sqrt(dx*dx+dz2*dz2) < 250) {
            prompt.innerText = '[ E ] Enter the door';
            prompt.style.display = 'block';
            if (keys['KeyE']) { keys['KeyE']=false; enterPTRoom(5); }
        } else {
            prompt.style.display = 'none';
            // Clamp to everpurple map size
            const maxR = PT_EVERPURPLE_SIZE * 0.95;
            const d2 = Math.sqrt(pos.x*pos.x+pos.z*pos.z);
            if (d2 > maxR && !ptTransporting) {
                // Hit border → Lost 404 path
                ptTransporting = true;
                ptFadeToBlack(800, () => {
                    ptTransporting = false;
                    if (ptOverlay) {
                        ptOverlay.style.background = 'transparent';
                        ptOverlay.style.color = '#cc44ee';
                        ptOverlay.style.opacity = '0';
                        ptOverlay.innerText = 'Are you lost?';
                        ptOverlay.style.transition = 'opacity 1s ease';
                        requestAnimationFrame(() => { ptOverlay.style.opacity='1'; });
                    }
                    setTimeout(() => { ptTransporting=false; _buildPTRoom(7); }, 5000);
                });
            }
        }

    } else if (ptRoom === 5) {
        // Check near on-computer
        let nearPC = null;
        ptComputersOn.forEach(pc => {
            const dx = pos.x-pc.x, dz2 = pos.z-pc.z;
            if (Math.sqrt(dx*dx+dz2*dz2) < 200) nearPC = pc;
        });
        if (nearPC) {
            prompt.innerText = '[ E ] Enter';
            prompt.style.display = 'block';
            if (keys['KeyE']) { keys['KeyE']=false; enterPTRoom(6); }
        } else {
            prompt.style.display = 'none';
        }

    } else {
        prompt.style.display = 'none';
    }

    // Run per-room update hook
    if (ptScene && ptScene.userData.onUpdate) {
        const dt = clock3 ? clock3.getDelta() : 0.016;
        // NOTE: dt is consumed by main loop already so we pass 0 here to avoid double-step
        // instead we re-read from a stored lastPTDt
    }
}

// ── PT update (called from main loop, receives dt from loop) ─────
let _ptLastFrameTime = 0;
function updatePT(dt) {
    if (!currentDim.startsWith('pt_') || !ptScene) return;
    if (ptScene.userData.onUpdate) ptScene.userData.onUpdate(dt);
}

// ── Exit plastic terrace → Hub ────────────────────────────────────
function exitPlasticTerrace() {
    ptClearOverlay();
    if (ptTextTimeout) { clearTimeout(ptTextTimeout); ptTextTimeout = null; }
    ptTransporting = false;
    enterHub();
}

// ── Portal ────────────────────────────────────────────────────────
function checkMoonPortal() {
    const prompt = document.getElementById('portal-prompt');
    // Return portal near spawn (0,0)
    const d = Math.sqrt(pos.x*pos.x + pos.z*pos.z);
    if (d < 300) {
        prompt.innerText = '[ E ] Return to Hub'; prompt.style.display = 'block';
        if (keys['KeyE']) { keys['KeyE'] = false; exitMoon(); }
    } else {
        prompt.style.display = 'none';
    }
}
