function getNeighborTypes(gx, gz) {
    const types = [];
    [[gx,gz-1],[gx,gz+1],[gx-1,gz],[gx+1,gz]].forEach(([nx,nz]) => {
        const r = bsmtRooms[`${nx},${nz}`];
        if(r) types.push(r.type);
    });
    return types;
}

// ── Procedural room generation ────────────────────────────────────────
function generateBasement() {
    if (myName !== 'bartelsfamily5') return;
    // Wipe existing
    Object.keys(bsmtMeshes).forEach(k => { bsmtScene.remove(bsmtMeshes[k]); delete bsmtMeshes[k]; });
    bsmtRooms = {}; generatorExists = false;

    // Build a grid of rooms via BFS from 0,0
    const queue = [{gx:0,gz:0,type:'starting'}];
    const visited = new Set(['0,0']);
    bsmtRooms['0,0'] = makeRoom('starting',0,0);

    while(queue.length) {
        const {gx,gz} = queue.shift();
        const DIRS_GRID = [{dx:0,dz:-1,door:'N',opp:'S'},{dx:0,dz:1,door:'S',opp:'N'},{dx:1,dz:0,door:'E',opp:'W'},{dx:-1,dz:0,door:'W',opp:'E'}];
        const currentRoom = bsmtRooms[`${gx},${gz}`];
        const isStarting  = currentRoom.type === 'starting';

        // Starting room: expand in all 4 dirs. All other rooms: only expand from their OWN door count.
        // Each non-starting room already has its entry door set. Give it 0-1 EXIT doors so hallways stay linear.
        const shuffled = DIRS_GRID.sort(()=>Math.random()-0.5);
        const exitDoors = isStarting ? 4 : (Math.random() < 0.55 ? 1 : 0); // 55% chance of 1 exit, rest are dead ends
        let added = 0;

        for (const d of shuffled) {
            if (added >= exitDoors) break;
            // Don't put a door where one already exists (the entry)
            if (currentRoom.doors[d.door]) continue;
            const nk = `${gx+d.dx},${gz+d.dz}`;
            if (visited.has(nk)) continue;
            const neighborTypes = getNeighborTypesFromGrid(gx+d.dx, gz+d.dz);
            const rtype = pickRoomType(neighborTypes);
            visited.add(nk);
            const nr = makeRoom(rtype, gx+d.dx, gz+d.dz);
            bsmtRooms[nk] = nr;
            currentRoom.doors[d.door] = true;
            nr.doors[d.opp] = true;
            if (visited.size < 50) queue.push({gx:gx+d.dx,gz:gz+d.dz});
            added++;
        }
    }

    // Build all meshes
    Object.entries(bsmtRooms).forEach(([k,v]) => buildRoomMesh(k,v));

    // Save to Firebase
    db.ref('cd_basement_rooms').set({ rooms: bsmtRooms, generatorExists, generated: Date.now() });
    db.ref('cd_basement_lights').set(true);
    showPetNotif('🔦 Basement generated!');
}

function getNeighborTypesFromGrid(gx,gz) {
    const types=[];
    [[gx,gz-1],[gx,gz+1],[gx-1,gz],[gx+1,gz]].forEach(([nx,nz])=>{
        const r=bsmtRooms[`${nx},${nz}`]; if(r) types.push(r.type);
    });
    return types;
}

function pickRoomType(neighborTypes) {
    const pool = [...RTYPES];
    // Remove types that are already adjacent (no 2 same touching, except plain)
    const filteredPool = pool.filter(t => t==='plain' || !neighborTypes.includes(t));
    // Generator: only 1 allowed, 1/75 chance
    if (!generatorExists && Math.random() < 1/75) {
        generatorExists = true;
        return 'generator';
    }
    // No generator in pool if already exists
    const finalPool = filteredPool.filter(t => t!=='generator');
    if (finalPool.length === 0) return 'plain';
    return finalPool[Math.floor(Math.random()*finalPool.length)];
}

// ── Check and generate rooms when player walks into doorways ─────────
function checkBasementDoors() {
    const prompt = document.getElementById('portal-prompt');
    // Find which room player is in
    const gx = Math.round(pos.x / ROOM_W);
    const gz = Math.round(pos.z / ROOM_W);
    const roomKey = `${gx},${gz}`;
    const room = bsmtRooms[roomKey];
    if (!room) { prompt.style.display='none'; return; }

    const rx = gx * ROOM_W, rz = gz * ROOM_W;
    const isBig = false;
    const half = ROOM_W / 2;

    // Check if near a door gap → generate neighbor room
    const DIRS_GRID = [{dx:0,dz:-1,door:'N',opp:'S'},{dx:0,dz:1,door:'S',opp:'N'},{dx:1,dz:0,door:'E',opp:'W'},{dx:-1,dz:0,door:'W',opp:'E'}];
    DIRS_GRID.forEach(d => {
        if (!room.doors[d.door]) return;
        const nk = `${gx+d.dx},${gz+d.dz}`;
        if (!bsmtRooms[nk]) {
            // Generate new room on the fly
            const neighborTypes = getNeighborTypes(gx+d.dx, gz+d.dz);
            const rtype = pickRoomType(neighborTypes);
            const nr = makeRoom(rtype, gx+d.dx, gz+d.dz);
            nr.doors[d.opp] = true;
            bsmtRooms[nk] = nr;
            buildRoomMesh(nk, nr);
            db.ref(`cd_basement_rooms/rooms/${nk.replace(',','_')}`).set(nr);
        }
    });

    // Return to hub prompt near entry door (south edge of starting room)
    const distToStart = Math.sqrt(pos.x*pos.x + pos.z*pos.z);
    if (gx===0&&gz===0 && pos.z > half-60) {
        prompt.innerText='[ E ] Return to Hub'; prompt.style.display='block';
        if(keys['KeyE']){keys['KeyE']=false; exitBasement();}
    } else {
        prompt.style.display='none';
    }

    // Chair interaction
    checkChairInteraction(room, rx, rz);
    checkObjectInteraction(room, rx, rz);
}

// ── Chair sitting ──────────────────────────────────────────────────────
function checkChairInteraction(room, rx, rz) {
    const interact = document.getElementById('bsmt-interact');
    if(room.type!=='meeting'&&room.type!=='falsemeeting'&&room.type!=='plain'&&room.type!=='hostile') { interact.style.display='none'; return; }

    // Check if player is near a sittable object
    const grp = bsmtMeshes[`${room.gx},${room.gz}`];
    if(!grp) return;

    let nearChair = null;
    grp.traverse(obj => {
        if(!obj.userData.isSittable) return;
        const wp = new THREE.Vector3();
        obj.getWorldPosition(wp);
        const d = Math.sqrt((wp.x-pos.x)**2+(wp.z-pos.z)**2);
        if(d < 60) nearChair = obj;
    });

    if(nearChair) {
        interact.innerText='[ E ] Sit down'; interact.style.display='block';
        if(keys['KeyE']) {
            keys['KeyE']=false;
            startSitting(nearChair, room);
        }
    } else {
        if(sittingChair) stopSitting();
        interact.style.display='none';
    }
}

let sittingInterval = null;
function startSitting(chairObj, room) {
    if(sittingChair) return;
    sittingChair = { obj: chairObj, room, time: Date.now() };
    const interact = document.getElementById('bsmt-interact');
    interact.innerText='[ E ] Stand up';

    if(room.type==='falsemeeting' && chairObj.userData.chairIdx === 0) {
        // Awaken False Buddy after 3s
        setTimeout(()=>{
            if(!sittingChair) return;
            showBsmtMsg('Something feels wrong...');
            setTimeout(()=>{
                if(!sittingChair) return;
                showBsmtMsg('');
                spawnFalseBuddy(room.gx*ROOM_W, room.gz*ROOM_W);
            }, 2000);
        }, 3000);
    }

    if(room.type==='meeting') {
        sittingInterval = setInterval(()=>{
            if(!sittingChair) { clearInterval(sittingInterval); return; }
            const elapsed = (Date.now()-sittingChair.time)/1000;
            if(elapsed > 20) {
                showBsmtMsg('He has arrived. Leave immediately.');
                setTimeout(()=>showBsmtMsg(''), 4000);
                clearInterval(sittingInterval);
                sittingChair = null;
            }
        }, 1000);
    }

    // Stand back up on E
    keys['KeyE'] = false;
}
function stopSitting() {
    sittingChair = null;
    clearInterval(sittingInterval);
    document.getElementById('bsmt-interact').style.display='none';
}

// ── Object interactions ────────────────────────────────────────────────
function checkObjectInteraction(room, rx, rz) {
    const grp = bsmtMeshes[`${room.gx},${room.gz}`];
    if(!grp) return;

    bRay.setFromCamera(bMouse, bsmtCamera);
    const objects = [];
    grp.traverse(obj=>{ if(obj.isMesh) objects.push(obj); });
    const hits = bRay.intersectObjects(objects);
    if(!hits.length) { bsmtInteract=null; return; }
    const hit = hits[0].object;

    if(hit.userData.isToilet) {
        document.getElementById('bsmt-interact').innerText='[ E ] Flush'; document.getElementById('bsmt-interact').style.display='block';
        if(keys['KeyE']) {
            keys['KeyE']=false; toiletClicks++;
            if(toiletClicks <= 10)        showBsmtMsg("It's a toilet.");
            else if(toiletClicks <= 50)   showBsmtMsg("It's still a toilet.");
            else if(toiletClicks <= 100)  showBsmtMsg("You don't get anything from clicking on this toilet.");
            else { toiletClicks=0; showBsmtMsg("It's a toilet."); }
            setTimeout(()=>showBsmtMsg(''),2000);
        }
    } else if(hit.userData.isGenerator || hit.userData.isSwitch) {
        document.getElementById('bsmt-interact').innerText='[ E ] Toggle Power'; document.getElementById('bsmt-interact').style.display='block';
        if(keys['KeyE']) {
            keys['KeyE']=false;
            db.ref('cd_basement_lights').set(!lightsOn);
        }
    } else if(hit.userData.isSoccerBall) {
        document.getElementById('bsmt-interact').innerText='[ E ] Kick'; document.getElementById('bsmt-interact').style.display='block';
        if(keys['KeyE']) { keys['KeyE']=false; showBsmtMsg('Made of concrete.'); setTimeout(()=>showBsmtMsg(''),2000); }
    } else if(hit.userData.isSlide) {
        document.getElementById('bsmt-interact').innerText='[ E ] Slide!'; document.getElementById('bsmt-interact').style.display='block';
        if(keys['KeyE']) { keys['KeyE']=false; showBsmtMsg('Wheee!'); setTimeout(()=>showBsmtMsg(''),1500); }
    } else if(hit.userData.isPaper1) {
        document.getElementById('bsmt-interact').innerText='[ E ] Read'; document.getElementById('bsmt-interact').style.display='block';
        if(keys['KeyE']) { keys['KeyE']=false; showBsmtMsg("DON'T TURN OFF THE LIGHTS"); setTimeout(()=>showBsmtMsg(''),3000); }
    } else if(hit.userData.isPaper2) {
        document.getElementById('bsmt-interact').innerText='[ E ] Read'; document.getElementById('bsmt-interact').style.display='block';
        if(keys['KeyE']) { keys['KeyE']=false; showBsmtMsg('Come Visit The Play Room!'); setTimeout(()=>showBsmtMsg(''),2500); }
    } else if(hit.userData.isWatch) {
        document.getElementById('bsmt-interact').innerText='[ E ] Check time'; document.getElementById('bsmt-interact').style.display='block';
        if(keys['KeyE']) {
            keys['KeyE']=false;
            const now2=new Date();
            const est = now2.toLocaleTimeString('en-US',{timeZone:'America/New_York',hour:'2-digit',minute:'2-digit',second:'2-digit'});
            showBsmtMsg(est); setTimeout(()=>showBsmtMsg(''),3000);
        }
    } else if(hit.userData.isHazard) {
        triggerHazard(hit.userData.hazardType);
    } else {
        document.getElementById('bsmt-interact').style.display='none';
    }
}

// ── Hazards ────────────────────────────────────────────────────────────
const HAZARD_DEBUFFS = {};
function triggerHazard(type) {
    const now2=Date.now();
    if(now2-lastDmgTime<1500) return;
    lastDmgTime=now2;
    let dmg=0, msg='';
    switch(type){
        case 'acid_pipe':     dmg=30; msg='💚 Acid burns you!'; break;
        case 'puddle':        dmg=20; msg='💧 You slipped!'; break;
        case 'hot_pipe':      dmg=15; msg='🔥 You burned your hand!'; break;
        case 'toxic_puddle':  dmg=30; msg='☣️ Toxic waste!'; break;
        case 'stuck_door':    dmg=10; msg='🚪 Your hand got stuck in the door!'; break;
        case 'bite_tongue':   dmg=5;  msg='😬 You bit your tongue slipping!'; break;
        case 'rust_tetanus':
            dmg=0; msg='🩹 The rust gave you tetanus!';
            if(!HAZARD_DEBUFFS.tetanus){
                HAZARD_DEBUFFS.tetanus=true;
                let ticks=0;
                const iv=setInterval(()=>{
                    ticks++;
                    dealDmg(20/30);
                    if(ticks>=30){clearInterval(iv);HAZARD_DEBUFFS.tetanus=false;}
                },1000);
            }
            break;
    }
    if(dmg>0) dealDmg(dmg);
    showBsmtMsg(msg); setTimeout(()=>showBsmtMsg(''),2000);
}

function dealDmg(amount) {
    playerHP = Math.max(0, playerHP - amount);
    updateHPUI();
    const flash = document.createElement('div');
    flash.style.cssText='position:fixed;inset:0;background:rgba(235,77,75,0.3);pointer-events:none;z-index:9000;';
    document.body.appendChild(flash); setTimeout(()=>flash.remove(),180);
    if(playerHP<=0) { showBsmtMsg('You died... returning to Hub.'); setTimeout(()=>{ playerHP=MAX_HP; exitBasement(); },2500); }
}

function updateHPUI() {
    document.getElementById('hp-val').innerText = Math.ceil(playerHP);
    const pct = playerHP/MAX_HP*100;
    const fill=document.getElementById('hp-fill');
    fill.style.width=pct+'%';
    fill.style.background=pct>60?'var(--primary)':pct>30?'#f39c12':'#eb4d4b';
}

// ── Light state ─────────────────────────────────────────────────────────
function applyLightState() {
    if(!bsmtScene) return;
    bsmtScene.traverse(obj => {
        if(obj.isLight && obj.userData.isRoomLight) {
            obj.intensity = lightsOn ? 1.8 : 0;
        }
    });
    if(!lightsOn) spawnLightGuides();
    else clearLightGuides();
}
function spawnLightGuides() {
    clearLightGuides();
    for(let i=0;i<3;i++) {
        getSpriteTexture('lightguide', {img:'enemies/lightguide.png'}, tex=>{
            const mat = new THREE.SpriteMaterial({map:tex,transparent:true,depthTest:true,depthWrite:false});
            const sp = new THREE.Sprite(mat);
            sp.scale.set(20,20,1);
            // Start near player
            sp.position.set(pos.x+(Math.random()-0.5)*60, 40, pos.z+(Math.random()-0.5)*60);
            sp.userData.isLightGuide=true;
            bsmtScene.add(sp);
            lightGuides.push({ mesh:sp, offset:{x:(i-1)*30,z:0} });
            // Give off glow
            const gl=new THREE.PointLight(0x8888ff,1.5,120);
            gl.position.copy(sp.position);
            sp.add(gl);
        });
    }
}
function clearLightGuides() {
    lightGuides.forEach(g=>bsmtScene?.remove(g.mesh));
    lightGuides=[];
}

// ── Enemies ──────────────────────────────────────────────────────────
function spawnRoomEnemies(room, wx, wz, RW, RD) {
    const rng3 = seededRand((room.gx*53+room.gz*37+7)%9999);

    if (room.type === 'darkplace') {
        const count = 1 + Math.floor(rng3()*2);
        for (let i=0; i<count; i++) {
            const ex = wx+(rng3()-0.5)*RW*0.5, ez = wz+(rng3()-0.5)*RD*0.5;
            spawnBsmtEnemy('statue', ex, 0, ez, room);
        }
    }

    if (room.type === 'buddyspace' || room.type === 'plain') {
        const count = 1 + Math.floor(rng3()*3);
        for (let i=0; i<count; i++) {
            const ex = wx+(rng3()-0.5)*RW*0.4, ez = wz+(rng3()-0.5)*RD*0.4;
            spawnBsmtEnemy('buddy', ex, 0, ez, room);
        }
    }

    // Spiders spawn in ANY room, 40% chance, 1-2 per room
    if (rng3() < 0.4) {
        const count = 1 + Math.floor(rng3() * 2);
        for (let i=0; i<count; i++) {
            const ex = wx+(rng3()-0.5)*RW*0.4, ez = wz+(rng3()-0.5)*RD*0.4;
            spawnBsmtEnemy('spider', ex, 0, ez, room);
        }
    }
}

const BSMT_ENEMY_DEFS = {
    statue:     {img:'enemies/statue.png',    speed:BSMT_SPEED*2, size:70, dmg:40},
    buddy:      {img:'enemies/buddy.png',     speed:BSMT_SPEED*0.5, size:50, dmg:0},
    spider:     {img:'enemies/giantspider.png', speed:0,              size:40, dmg:0,  tint:0xff4444},
    falseBuddy: {img:'enemies/notbuddy.png',  speed:BSMT_SPEED*1.2, size:80, dmg:30},
};

function spawnBsmtEnemy(type, wx, wy, wz, room) {
    const def = BSMT_ENEMY_DEFS[type];
    if(!def) return;
    const enemy = {type, def, x:wx, y:wy, z:wz, room,
        vx:(Math.random()-0.5)*def.speed*0.3, vz:(Math.random()-0.5)*def.speed*0.3,
        sprite:null, lastHit:0};
    getSpriteTexture(type, def, tex=>{
        const mat=new THREE.SpriteMaterial({map:tex,transparent:true,depthTest:true,depthWrite:false,sizeAttenuation:true});
        if (def.tint) mat.color.set(def.tint);
        const sp=new THREE.Sprite(mat);
        sp.scale.set(def.size,def.size,1);
        sp.position.set(wx,wy+def.size*0.5,wz);
        sp.userData.enemyType=type;
        sp.userData.clickable=true;
        bsmtScene.add(sp);
        enemy.sprite=sp;
    });
    bsmtEnemies.push(enemy);
    return enemy;
}

function spawnFalseBuddy(wx, wz) {
    const fb = spawnBsmtEnemy('falseBuddy', wx, 0, wz, null);
    db.ref('cd_basement_falseBuddy').set({x:wx,z:wz,spawner:myName,time:Date.now()});
}

// ── Dark Room flicker ──────────────────────────────────────────────────
let flickerTimeout = null;
let darkRoomLightOn = false; // tracks current state for statue movement

function getDarkRoomLight() {
    // Find the PointLight for the current dark room
    const gx = Math.round(pos.x / ROOM_W), gz = Math.round(pos.z / ROOM_W);
    const grp = bsmtMeshes[`${gx},${gz}`];
    if (!grp) return null;
    let found = null;
    grp.traverse(obj => { if (obj.isLight && obj.userData.isDarkRoomLight) found = obj; });
    return found;
}

function startDarkRoomFlicker() {
    darkRoomLightOn = false;
    function flick() {
        const light = getDarkRoomLight();
        // Turn light ON for 0.5s
        darkRoomLightOn = true;
        if (light) light.intensity = 2.2;
        flickerTimeout = setTimeout(() => {
            // Turn light OFF
            darkRoomLightOn = false;
            if (light) light.intensity = 0;
            // Wait 2-3s before next flicker
            flickerTimeout = setTimeout(flick, 2000 + Math.random() * 1000);
        }, 500);
    }
    flick();
}

function stopDarkRoomFlicker() {
    clearTimeout(flickerTimeout);
    darkRoomLightOn = false;
    // Make sure light is off when leaving
    const light = getDarkRoomLight();
    if (light) light.intensity = 0;
}

// ── Carousel effect ────────────────────────────────────────────────────
let carouselTimer = 0;
let carouselTilt  = 0;
function clearCarouselEffect() {
    carouselInRoom=false; carouselTilt=0;
    document.getElementById('c').style.transform='';
}

// ── Checkerboard messages ──────────────────────────────────────────────
let lastCheckerMsg = 0;
function triggerCheckerMsg() {
    const now2=Date.now();
    if(now2-lastCheckerMsg<4000) return;
    lastCheckerMsg=now2;
    if(Math.random()<0.3) {
        const msg=CHECKER_MSGS[Math.floor(Math.random()*CHECKER_MSGS.length)];
        showBsmtMsg(msg); setTimeout(()=>showBsmtMsg(''),1500);
    }
}

// ── Update ─────────────────────────────────────────────────────────────
let inDarkRoom=false;
function updateBasement(dt) {
    if(currentDim!=='basement') return;
    const now2=Date.now();

    // Which room is the player in?
    const gx=Math.round(pos.x/ROOM_W), gz=Math.round(pos.z/ROOM_W);
    const room=bsmtRooms[`${gx},${gz}`];

    // Dark room flicker
    const nowInDark = room?.type==='darkplace';
    if(nowInDark&&!inDarkRoom){ inDarkRoom=true; startDarkRoomFlicker(); }
    else if(!nowInDark&&inDarkRoom){ inDarkRoom=false; stopDarkRoomFlicker(); }

    // Carousel tilt
    carouselInRoom = room?.type==='carousel';
    if(carouselInRoom) {
        carouselTilt += dt*0.8;
        document.getElementById('c').style.transform=`rotate(${Math.sin(carouselTilt)*4}deg)`;
        // Spin carousel walls
        const grp=bsmtMeshes[`${gx},${gz}`];
        if(grp) grp.rotation.y+=dt*0.5;
    } else {
        if(document.getElementById('c').style.transform) clearCarouselEffect();
    }

    // Checkerboard messages
    if(room?.type==='checkerboard') triggerCheckerMsg();

    // Light guides follow player toward generator
    lightGuides.forEach((g,i)=>{
        const angle=now2*0.001+i*Math.PI*2/3;
        g.mesh.position.set(pos.x+Math.cos(angle)*40, 40, pos.z+Math.sin(angle)*40);
    });

    // Enemy AI
    bsmtEnemies.forEach(e=>{
        if(!e.sprite) return;
        const pdx=pos.x-e.x, pdz=pos.z-e.z;
        const pdist=Math.sqrt(pdx*pdx+pdz*pdz);

        if(e.type==='statue') {
            // Only moves when the dark room light is ON AND player is NOT looking at it
            if(darkRoomLightOn && !isLookingAt(e)) {
                e.x+=pdx/(pdist||1)*e.def.speed*dt;
                e.z+=pdz/(pdist||1)*e.def.speed*dt;
            }
            // Must stay inside dark room
            if(e.room) {
                const rx2=e.room.gx*ROOM_W, rz2=e.room.gz*ROOM_W;
                e.x=Math.max(rx2-ROOM_W*0.7,Math.min(rx2+ROOM_W*0.7,e.x));
                e.z=Math.max(rz2-ROOM_W*0.7,Math.min(rz2+ROOM_W*0.7,e.z));
            }
            if(pdist<60&&now2-e.lastHit>2000){
                e.lastHit=now2; dealDmg(e.def.dmg);
                showBsmtMsg('The Statue got you!'); setTimeout(()=>showBsmtMsg(''),2000);
            }
        } else if(e.type==='buddy') {
            if(Math.random()<0.01){e.vx=(Math.random()-0.5)*e.def.speed;e.vz=(Math.random()-0.5)*e.def.speed;}
            e.x+=e.vx*dt; e.z+=e.vz*dt;
        } else if(e.type==='falseBuddy') {
            // Chase player, pass through doors, repelled by meeting room
            const curRoom=bsmtRooms[`${Math.round(e.x/ROOM_W)},${Math.round(e.z/ROOM_W)}`];
            if(curRoom?.type==='meeting'||curRoom?.type==='falsemeeting') {
                // Sink and die
                e.y-=60*dt;
                if(e.y<-100){
                    bsmtScene.remove(e.sprite);
                    bsmtEnemies.splice(bsmtEnemies.indexOf(e),1);
                    db.ref('cd_basement_falseBuddy').remove();
                    showBsmtMsg('The False Buddy has been vanquished!');
                    setTimeout(()=>showBsmtMsg(''),3000);
                    return;
                }
            } else {
                e.x+=pdx/(pdist||1)*e.def.speed*dt;
                e.z+=pdz/(pdist||1)*e.def.speed*dt;
            }
            if(pdist<70&&now2-e.lastHit>2000){
                e.lastHit=now2; dealDmg(e.def.dmg);
                showBsmtMsg('The False Buddy grabbed you!'); setTimeout(()=>showBsmtMsg(''),2000);
            }
        }
        // Spider — stationary
        if(e.sprite) e.sprite.position.set(e.x, e.y+e.def.size*0.5, e.z);
    });

    // Spider click to pet (raycaster)
    const spiderSprites=bsmtEnemies.filter(e=>e.type==='spider'&&e.sprite).map(e=>e.sprite);
    if(spiderSprites.length&&keys['KeyE']) {
        bRay.setFromCamera(bMouse,bsmtCamera);
        const hits=bRay.intersectObjects(spiderSprites);
        if(hits.length){ keys['KeyE']=false; showBsmtMsg('The spider appreciates you! 🕸️'); setTimeout(()=>showBsmtMsg(''),2000); }
    }
}

function isLookingAt(enemy) {
    // Check if enemy is roughly in the centre of the screen
    const wp=new THREE.Vector3(enemy.x,enemy.y+35,enemy.z);
    const projected=wp.clone().project(bsmtCamera);
    return Math.abs(projected.x)<0.35&&Math.abs(projected.y)<0.35&&projected.z<1;
}

// ── Helpers ────────────────────────────────────────────────────────────
function showBsmtMsg(msg) {
    const el=document.getElementById('bsmt-msg');
    el.innerText=msg;
    el.style.display=msg?'block':'none';
}

// ── Basement wall collision ───────────────────────────────────────────
const PLAYER_R = 18;

function resolveBasementCollision() {
    const gx = Math.round(pos.x / ROOM_W);
    const gz = Math.round(pos.z / ROOM_W);

    // Check current room and immediate neighbors so doorway transitions work
    for (let ox = -1; ox <= 1; ox++) {
        for (let oz = -1; oz <= 1; oz++) {
            const rk   = `${gx+ox},${gz+oz}`;
            const room = bsmtRooms[rk];
            if (!room) continue;

            // Always use fixed grid size — no big rooms, stops clipping
            const half = ROOM_W / 2 - WALL_T / 2;
            const rx   = room.gx * ROOM_W;
            const rz2  = room.gz * ROOM_W;

            const lx = pos.x - rx;
            const lz = pos.z - rz2;

            if (Math.abs(lx) > half + PLAYER_R * 4 || Math.abs(lz) > half + PLAYER_R * 4) continue;

            const walls = [
                { perpAxis:'z', perpLocal: lz, wallFace: -half, side: -1, door: 'N', paraLocal: lx },
                { perpAxis:'z', perpLocal: lz, wallFace:  half, side:  1, door: 'S', paraLocal: lx },
                { perpAxis:'x', perpLocal: lx, wallFace:  half, side:  1, door: 'E', paraLocal: lz },
                { perpAxis:'x', perpLocal: lx, wallFace: -half, side: -1, door: 'W', paraLocal: lz },
            ];

            walls.forEach(w => {
                const crossed = w.side > 0
                    ? (w.perpLocal + PLAYER_R > w.wallFace)
                    : (w.perpLocal - PLAYER_R < w.wallFace);
                if (!crossed) return;

                // Wider gap check — no PLAYER_R subtraction so doorways feel natural
                if (room.doors[w.door] && Math.abs(w.paraLocal) < DOOR_W / 2) return;

                if (w.perpAxis === 'z') {
                    pos.z = rz2 + w.wallFace - w.side * PLAYER_R;
                } else {
                    pos.x = rx  + w.wallFace - w.side * PLAYER_R;
                }
            });
        }
    }
}

function loop() {
    requestAnimationFrame(loop);
    const dt = Math.min(clock3.getDelta(), 0.05);
    update(dt);
    if (activeScene && activeCamera) renderer.render(activeScene, activeCamera);
}

// UTILS

function hashStr(s) {
    let h = 0;
    for (let i = 0; i < s.length; i++) h = s.charCodeAt(i) + ((h << 5) - h);
    return h;
}

let petNotifTimer = null;
function showPetNotif(msg) {
    const el = document.getElementById('pet-notif');
    el.innerText = msg; el.style.display = 'block';
    clearTimeout(petNotifTimer);
    petNotifTimer = setTimeout(() => el.style.display = 'none', 2500);
}

function showMBDamage() {
    showPetNotif('💥 A Mountain Buddy hit you!');
    // Red flash overlay
    const flash = document.createElement('div');
    flash.style.cssText = 'position:fixed;inset:0;background:rgba(235,77,75,0.35);pointer-events:none;z-index:9000;';
    document.body.appendChild(flash);
    setTimeout(() => flash.remove(), 200);
}
