// ── Weather cycling — fully serverless, computed from a saved timeline ──
let gtWeatherInterval = null;
let gtWeatherCountdown = 0;
let gtClockData = null; // { startTime, cycles: [{weather, duration}] }

// Generate a long pre-planned sequence of cycles and save it to Firebase.
// Called when the town is generated, or when a player enters and no clock exists.
function generateWeatherClock(seed) {
    const rng = seededRand(seed || (Date.now() % 99999));
    const cycles = [];
    let lastWeather = 'day';
    // Pre-generate 200 cycles (~16 hours at 5min each)
    for (let i = 0; i < 200; i++) {
        const reckoningChance = 1/15;
        let next;
        let attempts = 0;
        do {
            if (rng() < reckoningChance) {
                next = 'reckoning';
            } else {
                const safe = ['day','night','rainy'];
                next = safe[Math.floor(rng() * safe.length)];
            }
            attempts++;
        } while (next === lastWeather && next !== 'rainy' && attempts < 10);
        lastWeather = next;
        // Reckoning lasts 60s, everything else WEATHER_CYCLE ms
        cycles.push({ weather: next, duration: next === 'reckoning' ? 60000 : WEATHER_CYCLE });
        // After reckoning always insert a day cycle
        if (next === 'reckoning') {
            cycles.push({ weather: 'day', duration: WEATHER_CYCLE });
            lastWeather = 'day';
        }
    }
    const clockData = { startTime: Date.now(), cycles };
    db.ref('cd_gt_clock').set(clockData);
    return clockData;
}

// Compute current weather and seconds-to-next-cycle from the saved clock
function computeWeatherFromClock(clock) {
    if (!clock || !clock.cycles || !clock.startTime) return { weather: 'day', secsLeft: 300 };
    let t = Date.now() - clock.startTime;
    // Wrap through the cycle list
    const totalDur = clock.cycles.reduce((a, c) => a + c.duration, 0);
    t = ((t % totalDur) + totalDur) % totalDur;
    let acc = 0;
    for (const c of clock.cycles) {
        acc += c.duration;
        if (t < acc) {
            const secsLeft = Math.ceil((acc - t) / 1000);
            return { weather: c.weather, secsLeft };
        }
    }
    return { weather: 'day', secsLeft: 300 };
}

function startWeatherCycle() {
    // Read existing clock, or create one if missing
    db.ref('cd_gt_clock').once('value', snap => {
        if (snap.exists()) {
            gtClockData = snap.val();
        } else {
            gtClockData = generateWeatherClock();
        }
        tickWeather();
    });

    // Every second, each client locally computes current weather
    if (gtWeatherInterval) clearInterval(gtWeatherInterval);
    gtWeatherInterval = setInterval(tickWeather, 1000);
}

function tickWeather() {
    if (!gtClockData || currentDim !== 'ghosttown') return;
    const { weather, secsLeft } = computeWeatherFromClock(gtClockData);
    // Apply reckoning chance boost if Peeping Tom is active
    // (already baked into the sequence, but we can re-roll on the fly for active sessions)
    gtWeatherCountdown = secsLeft;
    if (weather !== gtWeather) {
        applyWeather(weather);
    }
    updateWeatherTimerUI();
}

function updateWeatherTimerUI() {
    const el = document.getElementById('weather-timer');
    if (!el) return;
    if (currentDim !== 'ghosttown') { el.style.display = 'none'; return; }
    const secs = Math.ceil(gtWeatherCountdown);
    const mins = Math.floor(secs / 60), s = secs % 60;
    const label = gtWeather === 'reckoning' ? '⚠️ Reckoning ends' : '🌤 Next cycle';
    el.innerText = `${label}: ${mins}:${String(s).padStart(2,'0')}`;
    el.style.display = 'block';
    el.style.borderColor = gtWeather === 'reckoning' ? '#eb4d4b' : 'var(--primary)';
    el.style.color       = gtWeather === 'reckoning' ? '#eb4d4b' : 'var(--accent)';
}

// ── Interiors ─────────────────────────────────────────────────────────
function enterInterior(bldgIdx) {
    const b = gtBuildings[bldgIdx];
    if (!b) return;
    gtInInterior = true;
    gtInteriorBuilding = b;

    // Each building gets its own scene + camera, built once and cached
    if (!b.scene) {
        b.scene  = new THREE.Scene();
        b.scene.background = new THREE.Color(0x221a10);
        b.camera = makeCamera();
        b.camera.far = 3000;
        b.camera.updateProjectionMatrix();
        b.scene.add(new THREE.AmbientLight(0xffeecc, 0.5));
        const iL = new THREE.PointLight(0xffeeaa, 1.8, 800);
        iL.position.set(0, b.sz.h * 0.8, 0); b.scene.add(iL);
        buildInterior(b);
    }

    gtInteriorScene  = b.scene;
    gtInteriorCamera = b.camera;
    activeScene  = b.scene;
    activeCamera = b.camera;

    // Spawn inside, away from the front wall (front wall inner edge ~sz.d*0.45)
    pos.x = 0; pos.y = 0; pos.z = b.sz.d * 0.25;
    yaw = Math.PI;

    document.getElementById('bsmt-interact').innerText = '[ E ] Exit building';
    document.getElementById('bsmt-interact').style.display = 'block';
}

function leaveInterior() {
    gtInInterior = false;
    activeScene  = gtScene;
    activeCamera = gtCamera;
    document.getElementById('bsmt-interact').style.display = 'none';
    // Pop player out just in front of the door in world space
    if (gtInteriorBuilding) {
        const b = gtInteriorBuilding;
        const cosR = Math.cos(b.rot), sinR = Math.sin(b.rot);
        const localZ = b.sz.d / 2 + 80;
        pos.x = b.x + localZ * sinR;
        pos.z = b.z + localZ * cosR;
        pos.y = getGTTerrainY(pos.x, pos.z);
    }
}

function buildInterior(b) {
    const s    = b.scene;
    const W = b.sz.w*0.9, D = b.sz.d*0.9, H = b.sz.h*0.9, WT=8;
    const floorMat = new THREE.MeshLambertMaterial({ color:0x5c4020 });
    const wallMat  = new THREE.MeshLambertMaterial({ color:0x9a7a50 });

    function iBox(w,h,d,mat,x,y,z) { const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat); m.position.set(x,y,z); s.add(m); return m; }

    // Floor, ceiling, 4 walls
    iBox(W,WT,D, floorMat, 0, 0, 0);
    iBox(W,WT,D, new THREE.MeshLambertMaterial({color:0x3a2a10}), 0,H,0);
    iBox(W,H,WT, wallMat, 0,H/2,-D/2);
    iBox(W,H,WT, wallMat, 0,H/2, D/2);
    iBox(WT,H,D, wallMat, -W/2,H/2,0);
    iBox(WT,H,D, wallMat,  W/2,H/2,0);

    // Furniture based on type
    const tblMat = new THREE.MeshLambertMaterial({color:0x5c3a1e});
    const chairMat = new THREE.MeshLambertMaterial({color:0x3a2010});

    if (b.type === 'store') {
        // Shelves along walls
        for (let i=-1;i<=1;i++) {
            const shelf=new THREE.Mesh(new THREE.BoxGeometry(W*0.6,8,30), tblMat);
            shelf.position.set(i*W*0.22, 60+i*20, -D*0.3); s.add(shelf);
        }
        iBox(80,4,50, tblMat, 0,40,0); // counter
    } else if (b.type === 'house1') {
        // Bed
        iBox(80,20,100, new THREE.MeshLambertMaterial({color:0x4444aa}), -W/2+60,10,-D/2+70);
        // Table near entrance
        iBox(60,4,40, tblMat, W/2-60,35,D/2-60);
    } else if (b.type === 'house2') {
        // 4 rooms via internal walls
        iBox(WT,H,D/2, wallMat, 0,H/2,-D/4); // divider
        iBox(W/2,H,WT, wallMat, W/4,H/2,0);  // divider
        // Bed (bedroom)
        iBox(70,18,90, new THREE.MeshLambertMaterial({color:0x4444aa}), -W/2+50,9,-D/4);
        // Chair + table (living room)
        iBox(40,4,40, tblMat, W/4,30,D/4);
        iBox(30,50,30, new THREE.MeshLambertMaterial({color:0x334455}), W/4,50,D/4);        // TV box on table
        iBox(40,28,6, new THREE.MeshBasicMaterial({color:0x111111}), W/4,44,D/4);
        // Bathroom — checkerboard floor tile
        const cbC = document.createElement('canvas'); cbC.width=cbC.height=64;
        const cbCtx=cbC.getContext('2d');
        for(let ci=0;ci<4;ci++) for(let cj=0;cj<4;cj++){cbCtx.fillStyle=(ci+cj)%2===0?'#eee':'#888';cbCtx.fillRect(ci*16,cj*16,16,16);}
        const cbTex=new THREE.CanvasTexture(cbC); cbTex.wrapS=cbTex.wrapT=THREE.RepeatWrapping; cbTex.repeat.set(4,4);
        const bathFloor=new THREE.Mesh(new THREE.PlaneGeometry(W/2,D/2),new THREE.MeshLambertMaterial({map:cbTex}));
        bathFloor.rotation.x=-Math.PI/2; bathFloor.position.set(-W/4,1,D/4); s.add(bathFloor);
        // Toilet
        const toiletG=makeGTToilet(); toiletG.position.set(-W/4,0,D/4); s.add(toiletG);
    } else if (b.type === 'misc2') {
        iBox(60,4,40, tblMat, 0,40,0);
        const ch=makeGTChair(chairMat); ch.position.set(0,0,60); s.add(ch);
    } else if (b.type === 'misc3') {
        for(let i=0;i<4;i++){
            const cx=(Math.random()-0.5)*W*0.5, cz=(Math.random()-0.5)*D*0.5;
            iBox(40,40,40, new THREE.MeshLambertMaterial({color:0x7a6a50}), cx,20,cz);
        }
    } else if (b.type === 'misc4') {
        // Completely empty — just the room
    } else if (b.type === 'misc1') {
        // Crate in corner
        iBox(50,50,50, new THREE.MeshLambertMaterial({color:0x7a6a50}), -W/2+40,25,-D/2+40);
    } else if (b.type === 'townhall') {
        // Stage + chairs
        iBox(W*0.5, 30, D*0.25, new THREE.MeshLambertMaterial({color:0x8a7050}), 0,15,-D*0.3);
        for(let row=0;row<4;row++) for(let col=0;col<6;col++){
            const ch=makeGTChair(chairMat);
            ch.position.set(-W/2+60+col*55, 0, -D*0.1+row*70);
            s.add(ch);
            const ch2=makeGTChair(chairMat);
            ch2.position.set(W/2-60-col*55, 0, -D*0.1+row*70);
            s.add(ch2);
        }
    } else if (b.type === 'museum') {
        // Paintings on walls — use enemy PNGs
        const imgs = ['buddy.png','fly.png','mountainbuddy.png','statue.png','notbuddy.png','giantspider.png'];
        imgs.forEach((img,i) => {
            const tx = new THREE.TextureLoader();
            const tryLoad = (path, fallback) => tx.load(path, t=>{
                const frame=new THREE.Mesh(new THREE.PlaneGeometry(80,80),new THREE.MeshBasicMaterial({map:t,side:THREE.DoubleSide}));
                frame.position.set(-W/2+40+(i%3)*110, 80, fallback ? D/2-5 : -D/2+5);
                frame.rotation.y = fallback ? 0 : Math.PI;
                s.add(frame);
            }, undefined, fallback ? ()=>{} : ()=>tryLoad(GITHUB_BASE+img, true));
            tryLoad('enemies/'+img, false);
        });
    }
}

// Build AABBs for the 4 interior walls so collision works inside
function buildInteriorWalls(b) {
    const W = b.sz.w*0.9, D = b.sz.d*0.9, WT = 8;
    const hw = W/2, hd = D/2;
    b.iWalls = [
        { minX: -hw-WT, maxX: -hw+WT, minZ: -hd,    maxZ: hd    }, // left wall
        { minX:  hw-WT, maxX:  hw+WT, minZ: -hd,    maxZ: hd    }, // right wall
        { minX: -hw,    maxX:  hw,    minZ: -hd-WT,  maxZ: -hd+WT }, // back wall
        { minX: -hw,    maxX:  hw,    minZ:  hd-WT,  maxZ:  hd+WT }, // front wall (door gap handled by room clamp)
    ];
    // Also add internal divider walls for house2
    if (b.type === 'house2') {
        b.iWalls.push({ minX: -WT/2, maxX: WT/2, minZ: -hd, maxZ: 0 }); // vertical divider (back half)
        b.iWalls.push({ minX: 0,     maxX: W/2,  minZ: -WT/2, maxZ: WT/2 }); // horizontal divider (right half)
    }
}

function makeGTToilet() {
    const g=new THREE.Group();
    g.add(mkBox(30,30,40,new THREE.MeshLambertMaterial({color:0xeeeeee}),0,15,0));
    g.add(mkBox(32,6,42, new THREE.MeshLambertMaterial({color:0xdddddd}),0,33,0));
    g.add(mkBox(28,34,14,new THREE.MeshLambertMaterial({color:0xeeeeee}),0,32,-18));
    return g;
}
function makeGTChair(mat) {
    const g=new THREE.Group();
    g.add(mkBox(28,4,28,mat,0,28,0));
    g.add(mkBox(28,36,4,mat,0,48,-12));
    for(const [lx,lz] of [[-10,-10],[-10,10],[10,-10],[10,10]]) g.add(mkBox(4,28,4,mat,lx,14,lz));
    return g;
}

// ── Enemies ────────────────────────────────────────────────────────────
function clearGTEnemies() {
    gtEnemies.forEach(e=>{ if(e.sprite) gtScene?.remove(e.sprite); });
    gtEnemies = [];
    peepingTomActive = false;
    megaSpiderExists = false;
}

const GT_ENEMY_DEFS = {
    spider:      {img:'enemies/giantspider.png',  size:55,  speed:GT_SPEED*0.75, dmg:15, hostile:false, tint:null},
    spiderRed:   {img:'enemies/giantspider.png',  size:55,  speed:GT_SPEED*0.75, dmg:15, hostile:true,  tint:0xff3333},
    statue:      {img:'enemies/statue.png',       size:70,  speed:GT_SPEED*3,    dmg:30, hostile:true,  tint:null},
    falseBuddy:  {img:'enemies/notbuddy.png',     size:75,  speed:GT_SPEED*1.5,  dmg:25, hostile:true,  tint:null},
    megaSpider:  {img:'enemies/giantspider.png',  size:340, speed:GT_SPEED*0.75, dmg:75, hostile:true,  tint:null},
    peepingTom:  {img:'enemies/peepingtom.png',   size:80,  speed:0,             dmg:0,  hostile:false, tint:null},
};
let peepingTomActive = false;
let megaSpiderExists = false;

function spawnGTEnemies() {
    clearGTEnemies();
    peepingTomActive = false;
    megaSpiderExists = false;
    if (!isEnemyHost) return; // non-hosts get enemy positions from Firebase
    const w = gtWeather;
    const rng = seededRand(Date.now()%9999);

    // Spiders — day:non-hostile, night+rain+reckoning:hostile red
    const spiderType = (w==='day') ? 'spider' : 'spiderRed';
    const spiderCount = w==='reckoning' ? 12 : w==='day' ? 6 : 8;
    for (let i=0;i<spiderCount;i++) {
        const angle=rng()*Math.PI*2, r=600+rng()*TOWN_R*0.8;
        spawnGTEnemy(spiderType, Math.cos(angle)*r, Math.sin(angle)*r);
    }

    // Statues — max 2 at a time
    if (w==='day') {
        if (rng()<0.3) spawnGTEnemy('statue', (rng()-0.5)*TOWN_R*0.8, (rng()-0.5)*TOWN_R*0.8);
    } else if (w==='night') {
        for(let i=0;i<2;i++) spawnGTEnemy('statue',(rng()-0.5)*TOWN_R*1.2,(rng()-0.5)*TOWN_R*1.2);
    } else if (w==='reckoning') {
        for(let i=0;i<2;i++) spawnGTEnemy('statue',(rng()-0.5)*TOWN_R*1.5,(rng()-0.5)*TOWN_R*1.5);
    }

    // False Buddy — always in Dark Place (beyond MOUNTAIN_R), PLUS town during Reckoning
    for(let i=0;i<3;i++){
        const angle=rng()*Math.PI*2, r=MOUNTAIN_R+800+rng()*2400;
        spawnGTEnemy('falseBuddy',Math.cos(angle)*r,Math.sin(angle)*r);
    }
    if (w==='reckoning') {
        for(let i=0;i<5;i++){
            const angle=rng()*Math.PI*2, r=TOWN_R+rng()*(MOUNTAIN_R-TOWN_R);
            spawnGTEnemy('falseBuddy',Math.cos(angle)*r,Math.sin(angle)*r);
        }
    }

    // Mega Spider — one, deep in the Dark Place
    {
        const angle=rng()*Math.PI*2, r=MOUNTAIN_R+800+rng()*2000;
        const mx = Math.cos(angle)*r, mz = Math.sin(angle)*r;
        spawnGTEnemy('megaSpider', mx, mz);
        megaSpiderExists = true;
    }

    // Peeping Tom — deep desert, far from center, only one
    {
        const angle=rng()*Math.PI*2, r=DESERT_R+800+rng()*(MOUNTAIN_R-DESERT_R-1200);
        spawnGTEnemy('peepingTom', Math.cos(angle)*r, Math.sin(angle)*r);
        peepingTomActive = true;
    }
}

function spawnGTEnemy(type, wx, wz) {
    const def = GT_ENEMY_DEFS[type];
    if (!def) return;
    const enemy = { type, def, x:wx, y:0, z:wz, vx:0, vz:0,
        sprite:null, lastHit:0, statuePhase:0, statuePhaseTimer:0, lastMove:0,
        spreadOffset: (Math.random() - 0.5) * 2.4, // anti-clump angle offset (~±137 degrees)
        wanderTimer: Math.random() * 20,            // stagger initial wander so they don't all go at once
        wanderDir: null };
    getSpriteTexture(type, def, tex => {
        const mat = new THREE.SpriteMaterial({map:tex,transparent:true,depthTest:true,depthWrite:false,sizeAttenuation:true});
        if (def.tint) mat.color.set(def.tint);
        const sp = new THREE.Sprite(mat);
        sp.scale.set(def.size, def.size, 1);
        sp.position.set(wx, def.size*0.5, wz);
        sp.userData.enemyType = type;
        gtScene.add(sp);
        enemy.sprite = sp;
    });
    gtEnemies.push(enemy);
    return enemy;
}

// ── Update ────────────────────────────────────────────────────────────
let gtLastCheck = 0;

function updateGhostTown(dt) {
    if (currentDim !== 'ghosttown') return;
    const now = Date.now();

    // Rain particle drift
    if (gtRainParticles) {
        const pos3 = gtRainParticles.geometry.attributes.position;
        for (let i=0; i<pos3.count; i++) {
            let y = pos3.getY(i) - 300*dt;
            if (y < 0) y = 600;
            pos3.setY(i, y);
            pos3.setX(i, pos3.getX(i) + 20*dt);
        }
        pos3.needsUpdate = true;
    }

    // Reckoning screen shake
    if (gtReckoningShake) {
        const s = Math.sin(now*0.02)*2.5;
        document.getElementById('c').style.transform = `translate(${s}px,${s*0.5}px)`;
    }

    // Wet / slow from rain
    if (gtWeather === 'rainy' && !gtInInterior) {
        if (!gtWet) { gtWet=true; gtWetTimer=now; }
        if (now - gtWetTimer > 30000 && gtSlowTimer === 0) {
            gtSlowTimer = now;
            showGTMsg('You got drenched! Movement slowed.');
            setTimeout(()=>showGTMsg(''),3000);
        }
    } else {
        gtWet = false;
        if (gtSlowTimer > 0 && now - gtSlowTimer > 60000) gtSlowTimer = 0;
    }

    // Interior E-key exit
    if (gtInInterior && keys['KeyE']) {
        keys['KeyE'] = false;
        leaveInterior();
        return;
    }

    // Door proximity check
    if (!gtInInterior && now - gtLastCheck > 300) {
        gtLastCheck = now;
        checkGTDoors();
    }

    // Enemy AI — only the host runs AI and pushes state; non-hosts render via applyRemoteEnemies
    if (!isEnemyHost) return;
    const spd = (gtSlowTimer > 0) ? GT_SPEED * 0.4 : GT_SPEED;
    gtEnemies.forEach(e => {
        if (!e.sprite) return;
        // When player is inside a building, use the building's world position
        // so enemies can't track or damage the player through walls
        const _epx = (gtInInterior && gtInteriorBuilding) ? gtInteriorBuilding.x : pos.x;
        const _epz = (gtInInterior && gtInteriorBuilding) ? gtInteriorBuilding.z : pos.z;
        const pdx = _epx - e.x, pdz = _epz - e.z;
        const pdist = Math.sqrt(pdx*pdx + pdz*pdz);
        // Skip all damage and aggro if player is safely inside
        const playerSafe = gtInInterior;

        if (e.type === 'statue') {
            e.statuePhaseTimer += dt;
            if (e.statuePhase === 0 && e.statuePhaseTimer > 2.0) {
                e.statuePhase = 1; e.statuePhaseTimer = 0;
            } else if (e.statuePhase === 1 && e.statuePhaseTimer > 0.5) {
                e.statuePhase = 0; e.statuePhaseTimer = 0;
            }
            if (e.statuePhase === 1) {
                const len = pdist || 1;
                e.x += (pdx/len)*e.def.speed*dt;
                e.z += (pdz/len)*e.def.speed*dt;
            }
            if (!playerSafe && pdist < 60 && now - e.lastHit > 2000) {
                e.lastHit = now; dealGTDmg(30); showGTMsg('A Statue got you!'); setTimeout(()=>showGTMsg(''),2000);
            }

        } else if (e.type === 'spiderRed') {
            // Spider view range: 825 units (15x 55-unit body) in all directions
            const SPIDER_SIGHT_R = 825;
            const canSeePlayer = !playerSafe && pdist < SPIDER_SIGHT_R;

            // Every 20s pick a random wander direction for 3s, then resume chasing
            if (!e.wanderTimer) e.wanderTimer = 0;
            if (!e.wanderDir) e.wanderDir = null;
            e.wanderTimer += dt;
            if (e.wanderDir) {
                // Wandering
                e.x += e.wanderDir.x * e.def.speed * 0.6 * dt;
                e.z += e.wanderDir.z * e.def.speed * 0.6 * dt;
                if (e.wanderTimer >= 3) { e.wanderDir = null; e.wanderTimer = 0; }
            } else if (canSeePlayer) {
                // Chase — spider has spotted the player
                const len = pdist || 1;
                const perpAngle = Math.atan2(pdz, pdx) + (e.spreadOffset || 0);
                e.x += Math.cos(perpAngle) * e.def.speed * dt;
                e.z += Math.sin(perpAngle) * e.def.speed * dt;
                if (e.wanderTimer >= 20) {
                    const sideAngle = Math.atan2(pdz, pdx) + (Math.random() < 0.5 ? Math.PI/2 : -Math.PI/2);
                    e.wanderDir = { x: Math.cos(sideAngle), z: Math.sin(sideAngle) };
                    e.wanderTimer = 0;
                }
            } else {
                // Wander randomly — player not in sight
                if (!e.wanderDir || e.wanderTimer >= 4) {
                    const randAngle = Math.random() * Math.PI * 2;
                    e.wanderDir = { x: Math.cos(randAngle), z: Math.sin(randAngle) };
                    e.wanderTimer = 0;
                }
            }
            if (!playerSafe && canSeePlayer && pdist < 60 && now - e.lastHit > 1500) {
                e.lastHit = now; dealGTDmg(15); showGTMsg('A spider bit you!'); setTimeout(()=>showGTMsg(''),1500);
            }

        } else if (e.type === 'spider') {
            if (Math.random() < 0.01) { e.vx=(Math.random()-0.5)*80; e.vz=(Math.random()-0.5)*80; }
            e.x += e.vx*dt; e.z += e.vz*dt;

        } else if (e.type === 'falseBuddy') {
            // Confined to Dark Place (beyond MOUNTAIN_R) unless Reckoning
            const distFromCenter = Math.sqrt(e.x*e.x+e.z*e.z);
            const inDarkPlace = distFromCenter > MOUNTAIN_R;
            if (!inDarkPlace && gtWeather !== 'reckoning') {
                // Push back into dark place
                const len = distFromCenter || 1;
                e.x += (e.x/len)*e.def.speed*dt;
                e.z += (e.z/len)*e.def.speed*dt;
            } else {
                const len = pdist || 1;
                e.x += (pdx/len)*e.def.speed*dt;
                e.z += (pdz/len)*e.def.speed*dt;
            }
            if (!playerSafe && pdist < 70 && now - e.lastHit > 2000) {
                e.lastHit = now; dealGTDmg(25); showGTMsg('The False Buddy hit you!'); setTimeout(()=>showGTMsg(''),2000);
            }

        } else if (e.type === 'megaSpider') {
            // Confined to Dark Place — cannot cross into mountain zone
            const distFromCenter = Math.sqrt(e.x*e.x+e.z*e.z);
            if (distFromCenter < MOUNTAIN_R + 200) {
                // Push back out into dark place
                const len = distFromCenter || 1;
                e.x -= (e.x/len)*e.def.speed*dt*2;
                e.z -= (e.z/len)*e.def.speed*dt*2;
            } else if (pdist < 3000) {
                // Pursue player if within range
                const len = pdist || 1;
                e.x += (pdx/len)*e.def.speed*dt;
                e.z += (pdz/len)*e.def.speed*dt;
            } else {
                // Wander slowly
                if (Math.random() < 0.005) { e.vx=(Math.random()-0.5)*100; e.vz=(Math.random()-0.5)*100; }
                e.x += e.vx*dt; e.z += e.vz*dt;
            }
            // Deal big damage
            if (pdist < 120 && now - e.lastHit > 2500) {
                e.lastHit = now; dealGTDmg(75); showGTMsg('💀 The Mega Spider got you!'); setTimeout(()=>showGTMsg(''),2500);
            }
            // Occasionally spawn a hostile spider (max every 8s, despawn after 15s)
            if (!e.spawnCooldown) e.spawnCooldown = 0;
            e.spawnCooldown -= dt;
            if (e.spawnCooldown <= 0 && Math.random() < 0.015) {
                e.spawnCooldown = 8;
                const sx = e.x + (Math.random()-0.5)*400, sz = e.z + (Math.random()-0.5)*400;
                const child = spawnGTEnemy('spiderRed', sx, sz);
                if (child) {
                    child.isMegaChild = true;
                    child.lifetime = 15;
                }
            }

        } else if (e.type === 'peepingTom') {
            // Teleport away if player gets within 1800 units
            if (pdist < 1800) {
                // Vanish — reappear far away in deep desert
                const angle = Math.random()*Math.PI*2;
                const r = DESERT_R + 1500 + Math.random()*2000;
                e.x = Math.cos(angle)*r; e.z = Math.sin(angle)*r;
                peepingTomActive = true; // still exists, just moved
                if (e.sprite) e.sprite.position.set(e.x, getGTTerrainY(e.x,e.z)+e.def.size*0.5, e.z);
                return; // skip normal position update
            }
        }

        // Mega spider children lifetime
        if (e.isMegaChild) {
            e.lifetime -= dt;
            if (e.lifetime <= 0) {
                if (e.sprite) { gtScene.remove(e.sprite); e.sprite = null; }
                e.dead = true;
                return;
            }
        }

        if (e.sprite) e.sprite.position.set(e.x, getGTTerrainY(e.x, e.z) + e.def.size*0.5, e.z);
    });
    // Prune dead children
    for (let i = gtEnemies.length-1; i >= 0; i--) {
        if (gtEnemies[i].dead) gtEnemies.splice(i,1);
    }
}

function checkGTDoors() {
    const prompt = document.getElementById('portal-prompt');
    const interact = document.getElementById('bsmt-interact');

    // Return portal — near world edge north
    if (pos.z < -GT_SIZE + 200 || (pos.x*pos.x+pos.z*pos.z) < 50*50 && gtInInterior===false) {
        // Check near hub exit (centre start)
    }

    // Check building doors
    let nearDoor = null;
    for (let i=0; i<gtBuildings.length; i++) {
        const b = gtBuildings[i];
        const dx = pos.x - b.x, dz = pos.z - b.z;
        const dist = Math.sqrt(dx*dx+dz*dz);
        if (dist < b.sz.d/2 + 80) { nearDoor = i; break; }
    }

    if (nearDoor !== null) {
        interact.innerText = '[ E ] Enter building'; interact.style.display='block';
        prompt.style.display = 'none';
        if (keys['KeyE']) { keys['KeyE']=false; enterInterior(nearDoor); }
    } else {
        interact.style.display = 'none';
        // Return to hub
        const distCenter = Math.sqrt(pos.x*pos.x + pos.z*pos.z);
        if (distCenter < 100 && pos.z > -50) {
            // near spawn — check for hub exit sign
        }
        // Hub portal on south edge of town
        const dHub = Math.sqrt(pos.x*pos.x + (pos.z - (TOWN_R-240))**2);
        if (dHub < 200) {
            prompt.innerText='[ E ] Return to Hub'; prompt.style.display='block';
            if(keys['KeyE']){keys['KeyE']=false; exitGhostTown();}
        } else {
            prompt.style.display='none';
        }
    }
}

    gtDmgTime=now;

    updateHPUI_gt();
    const flash=document.createElement('div');

function hashStr(s) {
    let h = 0;
    for (let i = 0; i < s.length; i++) h = s.charCodeAt(i) + ((h << 5) - h);
    return h;
}

const MOON_TERRAIN_SEGS = 200;
const MOON_SPEED       = SPEED;

// ── State ─────────────────────────────────────────────────────────
let moonScene = null, moonCamera = null;
let moonTerrainMesh = null;
let moonTerrainHeights = null;
let moonEnemies = [];
let playerHP_moon = 100;
let moonDmgTime = 0;
let moonGenerated = false;
// Mimic state

let mimicStalkTimer = 0;

// ── Enter ─────────────────────────────────────────────────────────
function enterMoon() {
    currentDim = 'moon';
    document.getElementById('dim-label').innerText = '🌕 Moon';
    document.getElementById('gen-btn').style.display = myName === 'bartelsfamily5' ? 'block' : 'none';
    document.getElementById('gen-btn').innerText = '🌕 Generate Moon';

    activeCamera = moonCamera;

    db.ref('cd_moon').once('value', snap => {
        if (snap.exists()) applyMoonData(snap.val());
        else generateMoon(true);

    db.ref('cd_moon_mimic').on('value', snap => {

// ── Scene ─────────────────────────────────────────────────────────
function buildMoonScene() {
    moonScene = new THREE.Scene();
    moonScene.background = new THREE.Color(0x000008);
    moonScene.fog = new THREE.FogExp2(0x000008, 0.000018);
    moonCamera = makeCamera();
    moonCamera.far = 80000;
    moonCamera.updateProjectionMatrix();

    moonScene.add(new THREE.AmbientLight(0x334455, 0.5));
    const sun = new THREE.DirectionalLight(0xfff0dd, 0.9);
    sun.position.set(5000, 8000, 3000);
    moonScene.add(sun);

    // Stars
    const starGeo = new THREE.BufferGeometry();
    const sv = [];
    for (let i = 0; i < 3000; i++) {
        const th = Math.random()*Math.PI*2, ph = Math.acos(2*Math.random()-1);
        const r = 60000 + Math.random()*10000;
        sv.push(r*Math.sin(ph)*Math.cos(th), r*Math.cos(ph), r*Math.sin(ph)*Math.sin(th));
    }
    starGeo.setAttribute('position', new THREE.Float32BufferAttribute(sv, 3));
    moonScene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 8 })));

    // Terrain
    const geo = new THREE.PlaneGeometry(MOON_SIZE*2, MOON_SIZE*2, MOON_TERRAIN_SEGS, MOON_TERRAIN_SEGS);
    moonTerrainMesh = new THREE.Mesh(geo, new THREE.MeshLambertMaterial({ color: 0x888880, vertexColors: false }));
    moonTerrainMesh.rotation.x = -Math.PI/2;
    moonTerrainMesh.receiveShadow = true;
    moonScene.add(moonTerrainMesh);
}

// ── Terrain helpers ───────────────────────────────────────────────
function getMoonTerrainY(wx, wz) {
    if (!moonTerrainMesh || !moonTerrainHeights) return 0;
    const u = Math.max(0, Math.min(MOON_TERRAIN_SEGS, Math.round((wx/(MOON_SIZE*2)+0.5)*MOON_TERRAIN_SEGS)));
    const v = Math.max(0, Math.min(MOON_TERRAIN_SEGS, Math.round((wz/(MOON_SIZE*2)+0.5)*MOON_TERRAIN_SEGS)));
    return moonTerrainHeights[v]?.[u] ?? 0;
}

// ── Generation ────────────────────────────────────────────────────
function generateMoon(force) {
    if (!force && myName !== 'bartelsfamily5') return;
    const rng = seededRand(Date.now() % 9999);
    const segs = MOON_TERRAIN_SEGS;
    const heights = [];

    // ── Guaranteed biome layout using 4 quadrant slots ────────────
    // Map is divided into 4 diagonal quadrants from centre.
    // Each biome gets one quadrant so none can be missing.
    // Quadrant angles (NE, SE, SW, NW) shuffled per generation.
    const quadAngles = [Math.PI*0.25, Math.PI*0.75, Math.PI*1.25, Math.PI*1.75];
    // Shuffle quadrants
    for (let i = quadAngles.length-1; i > 0; i--) {
        const j = Math.floor(rng()*(i+1));
        [quadAngles[i], quadAngles[j]] = [quadAngles[j], quadAngles[i]];
    }
    // Assign: [0]=BigCrater, [1]=MimicGrounds, [2]=CraterField1, [3]=CraterField2
    // Colony is always centre, no quadrant needed.

    // ── Big Crater — guaranteed in quadrant 0 ─────────────────────
    const bigCraterAngle = quadAngles[0] + (rng()-0.5)*0.4;
    const bigCraterDist  = 0.20 + rng()*0.08;
    const bigCX = Math.cos(bigCraterAngle)*bigCraterDist + 0.5;
    const bigCZ = Math.sin(bigCraterAngle)*bigCraterDist + 0.5;
    const bigCR    = 0.04 + rng()*0.02; // kept small so it doesn't eat the whole map
    const bigCDepth = -(450 + rng()*250);
    const bigCRimH  = 140 + rng()*100;

    // ── Mimic Mountain — guaranteed in quadrant 1 ─────────────────
    const mimicAngle = quadAngles[1] + (rng()-0.5)*0.3;
    const mimicDist  = 0.30 + rng()*0.10;
    const mimicU = Math.cos(mimicAngle)*mimicDist + 0.5;
    const mimicV = Math.sin(mimicAngle)*mimicDist + 0.5;
    const mimicMtnR = 0.055 + rng()*0.025;
    const mimicMtnH = 1400 + rng()*700;
    mimicMountainPos = {
        x: (mimicU - 0.5)*MOON_SIZE*2,
        z: (mimicV - 0.5)*MOON_SIZE*2
    };

    // ── Crater Fields — guaranteed clusters in quadrants 2 & 3 ────
    // Each cluster has a centre point; craters are placed near it.
    const craterFields = [];
    for (let f = 0; f < 2; f++) {
        const fAngle = quadAngles[2+f] + (rng()-0.5)*0.3;
        const fDist  = 0.22 + rng()*0.12;
        const fcx    = Math.cos(fAngle)*fDist + 0.5;
        const fcz    = Math.sin(fAngle)*fDist + 0.5;
        const numCraters = 4 + Math.floor(rng()*5);
        for (let i = 0; i < numCraters; i++) {
            const spread = 0.06 + rng()*0.06;
            const ca = rng()*Math.PI*2;
            const cd = rng()*spread;
            const cu2 = fcx + Math.cos(ca)*cd;
            const cv2 = fcz + Math.sin(ca)*cd;
            const dBig2 = Math.sqrt((cu2-bigCX)**2+(cv2-bigCZ)**2);
            if (dBig2 < bigCR*1.4) continue; // skip inside big crater
            craterFields.push({
                cu: cu2, cv: cv2,
                r:  0.015 + rng()*0.025,
                depth: -(50 + rng()*140),
                rimH:   25 + rng()*55,
            });
        }
    }

    // ── 50 scattered craters (avoid big crater zone) ─────────────────
    const loneCraters = [];
    let lcAttempts = 0;
    while (loneCraters.length < 50 && lcAttempts++ < 400) {
        const cu = 0.03 + rng()*0.94, cv = 0.03 + rng()*0.94;
        const dBig = Math.sqrt((cu-bigCX)**2+(cv-bigCZ)**2);
        if (dBig < bigCR*1.4) continue;
        loneCraters.push({
            cu, cv,
            r:     0.004 + rng()*0.018,
            depth: -(20 + rng()*100),
            rimH:  10 + rng()*45,
        });
    }

    // ── 30 random hills scattered everywhere ─────────────────────────
    const randHills = [];
    for (let i = 0; i < 30; i++) {
        randHills.push({
            hu: 0.03 + rng()*0.94, hv: 0.03 + rng()*0.94,
            r:  0.06 + rng()*0.12,   // large radius in UV space (covers big area)
            height: 150 + rng()*400, // tall enough to clearly see
        });
    }
    const allSmallCraters = [...craterFields, ...loneCraters];

    // ── Build heightmap — same approach as Grasslands ────────────
    // freq scaled to MOON_SIZE so hills look similar density
    const mFreq = 1 / (MOON_SIZE * 0.035); // ~equiv to Grasslands 1/1200 scaled up

    // Place hill zones across the map (like Grasslands biome complexes but all hills)
    const hillZones = [];
    const hillSlots = [
        {u:0.15,v:0.20}, {u:0.80,v:0.15}, {u:0.50,v:0.55},
        {u:0.20,v:0.75}, {u:0.75,v:0.70}, {u:0.40,v:0.35},
        {u:0.65,v:0.40}, {u:0.30,v:0.55}, {u:0.70,v:0.85},
    ];
    // Add extra random ones
    for (let i = 0; i < 4 + Math.floor(rng()*4); i++) {
        hillSlots.push({ u: 0.08 + rng()*0.84, v: 0.08 + rng()*0.84 });
    }
    hillSlots.forEach(slot => {
        const cx = Math.max(0.08, Math.min(0.92, slot.u + (rng()-0.5)*0.06));
        const cz = Math.max(0.08, Math.min(0.92, slot.v + (rng()-0.5)*0.06));
        const hillR = 0.06 + rng()*0.07;
        const hillH = 250 + rng()*400;
        hillZones.push({ cx, cz, outerR: hillR, height: hillH });
    });

    for (let vi = 0; vi <= segs; vi++) {
        heights.push([]);
        for (let ui = 0; ui <= segs; ui++) {
            const u = ui/segs, v = vi/segs;
            const wx = (u-0.5)*MOON_SIZE*2, wz = (v-0.5)*MOON_SIZE*2;

            // Plains base — same formula as Grasslands plainsBump
            const plainsBump = (
                Math.sin(wx * mFreq * 1.3 + 0.3) * Math.cos(wz * mFreq * 0.9) +
                Math.sin(wx * mFreq * 2.8 + 1.1) * Math.cos(wz * mFreq * 2.1 + 0.7)
            ) * 80;

            // Hill zone influence — smoothstep blend like Grasslands mountains
            let hillInfluence = 0, hillHeight = 0;
            hillZones.forEach(zone => {
                const du = u - zone.cx, dv = v - zone.cz;
                const dist = Math.sqrt(du*du + dv*dv);
                if (dist <= zone.outerR) {
                    const t = 1 - dist / zone.outerR;
                    const ts = t * t * (3 - 2 * t);
                    if (ts > hillInfluence) { hillInfluence = ts; hillHeight = zone.height; }
                }
            });

            let h = plainsBump;
            if (hillInfluence > 0) {
                const ridgeNoise = Math.sin(wx * mFreq * 4.1 + 2.3) * Math.cos(wz * mFreq * 3.7 + 1.1) * 120;
                h = plainsBump * (1 - hillInfluence) + (hillHeight + ridgeNoise) * hillInfluence;
            }

            // Colony centre — flatten but leave slight imperfection
            const colonyCenterDist = Math.sqrt((u-0.5)**2+(v-0.5)**2);
            if (colonyCenterDist < 0.09) {
                const blend = Math.max(0, (colonyCenterDist-0.03)/0.06);
                h *= blend * blend;
            }

            // Big crater
            const bdu = u-bigCX, bdv = v-bigCZ;
            const bdist = Math.sqrt(bdu*bdu+bdv*bdv);
            if (bdist < bigCR*1.35) {
                const t = bdist/bigCR;
                if (t < 0.65) {
                    const tb = t/0.65; const ts = tb*tb*(3-2*tb);
                    h = h*(1-ts) + bigCDepth*ts;
                } else {
                    const tr = (t-0.65)/0.7; const ts = Math.max(0, 1-tr*tr);
                    h += bigCRimH*ts;
                }
            }

            // Mimic mountain — jagged peak
            const mdu = u-mimicU, mdv = v-mimicV;
            const mdist = Math.sqrt(mdu*mdu+mdv*mdv);
            if (mdist < mimicMtnR*1.6) {
                const t = Math.max(0, 1 - mdist/mimicMtnR);
                const ts = t*t*(3-2*t);
                const jagged = Math.sin(wx*mFreq*22+2.1)*Math.cos(wz*mFreq*19+1.3)*180
                             + Math.sin(wx*mFreq*55+0.7)*Math.cos(wz*mFreq*48+1.8)*60;
                h = h*(1-ts) + (mimicMtnH + jagged)*ts;
            }

            // Crater fields + lone craters
            for (const sc of allSmallCraters) {
                const sdu = u-sc.cu, sdv = v-sc.cv;
                const sdist = Math.sqrt(sdu*sdu+sdv*sdv);
                if (sdist < sc.r*1.35) {
                    const t = sdist/sc.r;
                    if (t < 0.65) {
                        const tb = t/0.65; const ts = tb*tb*(3-2*tb);
                        h = h*(1-ts) + sc.depth*ts;
                    } else {
                        const tr = (t-0.65)/0.7; const tts = Math.max(0, 1-tr*tr);
                        h += sc.rimH*tts;
                    }
                }
            }

            // Random hills
            for (const rh of randHills) {
                const hdu = u-rh.hu, hdv = v-rh.hv;
                const hdist = Math.sqrt(hdu*hdu+hdv*hdv);
                if (hdist < rh.r) {
                    const t = 1 - hdist/rh.r;
                    const ts = t*t*(3-2*t);
                    h += rh.height * ts;
                }
            }

            heights[vi].push(h);
        }
    }

    moonTerrainHeights = heights;
    applyMoonHeights(heights);
    buildMoonRoads();

    const flat = heights.map(row => row.map(v2 => Math.round(v2*10)/10));
    db.ref('cd_moon').set({
        heights: flat, segs,
        mimicMountain: mimicMountainPos,
        generated: Date.now()
    });

    clearMoonEnemies();
    spawnMoonEnemies(rng);
    moonGenerated = true;
    // Respawn enemies after regeneration
    clearMoonEnemies();
    spawnMoonEnemies(rng);
    showPetNotif('🌕 Moon generated!');
}

function applyMoonHeights(heights) {
    const segs = MOON_TERRAIN_SEGS;
    const positions = moonTerrainMesh.geometry.attributes.position;
    const colorArr = [];
    for (let vi = 0; vi <= segs; vi++) {
        for (let ui = 0; ui <= segs; ui++) {
            const idx = vi*(segs+1)+ui;
            const h = heights[vi]?.[ui] ?? 0;
            positions.setZ(idx, h);
            // Colour by height
            let r, g, b;
            if (h > 600)       { r=0.85; g=0.84; b=0.82; } // peak
            else if (h > 200)  { r=0.70; g=0.69; b=0.67; } // upper slope
            else if (h < -100) { r=0.42; g=0.41; b=0.40; } // crater floor
            else               { r=0.58; g=0.57; b=0.55; } // plains
            colorArr.push(r, g, b);
        }
    }
    positions.needsUpdate = true;
    moonTerrainMesh.geometry.setAttribute('color', new THREE.Float32BufferAttribute(colorArr, 3));
    moonTerrainMesh.material.vertexColors = true;
    moonTerrainMesh.geometry.computeVertexNormals();
}

function buildMoonRoads() {
    const roadMat = new THREE.MeshLambertMaterial({ color: 0x666660 });
    const roadLen = 6000;
    [-1,1].forEach(dir => {
        const r1 = new THREE.Mesh(new THREE.PlaneGeometry(200, roadLen), roadMat);
        r1.rotation.x = -Math.PI/2; r1.position.set(dir*800, 2, 0);
        moonScene.add(r1);
        const r2 = new THREE.Mesh(new THREE.PlaneGeometry(200, roadLen), roadMat);
        r2.rotation.x = -Math.PI/2; r2.rotation.z = Math.PI/2; r2.position.set(0, 2, dir*800);
        moonScene.add(r2);
    });
}

function applyMoonData(data) {
    if (data.heights) {
        moonTerrainHeights = data.heights;
        applyMoonHeights(data.heights);
    }
    if (data.mimicMountain) mimicMountainPos = data.mimicMountain;
    clearMoonEnemies();
    spawnMoonEnemies(seededRand(42));
    moonGenerated = true;
    // Spawn player in colony centre
    pos.x = 0; pos.y = getMoonTerrainY(0,0); pos.z = 0;
}

// ── Enemies ───────────────────────────────────────────────────────
const MOON_ENEMY_DEFS = {
    martian1: { img:'enemies/martian1.png', size:70, speed:MOON_SPEED*0.75, dmg:0,  hostile:false },
    martian2: { img:'enemies/martian2.png', size:70, speed:MOON_SPEED*0.75, dmg:0,  hostile:false },
    martian3: { img:'enemies/martian3.png', size:70, speed:MOON_SPEED*0.75, dmg:0,  hostile:false },
    mimic:    { img:'enemies/mimic.png',    size:120, speed:MOON_SPEED*1.1,  dmg:50, hostile:true  },
};

function clearMoonEnemies() {
    moonEnemies.forEach(e => {
        if (e.sprite) moonScene?.remove(e.sprite);
        if (e.disguiseMesh) moonScene?.remove(e.disguiseMesh);
        if (e.disguiseTag) e.disguiseTag.remove();
    });
    moonEnemies = [];
}

function spawnMoonEnemies(rng) {
    clearMoonEnemies();
    if (!isEnemyHost) return;
    // Martians in colony (centre) — 15-20
    const colCount = 15 + Math.floor(rng()*6);
    for (let i = 0; i < colCount; i++) {
        const angle = rng()*Math.PI*2, r = 300 + rng()*4000;
        spawnMoonEnemy(['martian1','martian2','martian3'][Math.floor(rng()*3)],
            Math.cos(angle)*r, Math.sin(angle)*r);
    }
    // Martians in crater field — 6-10
    const cfCount = 6 + Math.floor(rng()*5);
    for (let i = 0; i < cfCount; i++) {
        const angle = rng()*Math.PI*2, r = 8000 + rng()*10000;
        spawnMoonEnemy(['martian1','martian2','martian3'][Math.floor(rng()*3)],
            Math.cos(angle)*r, Math.sin(angle)*r);
    }
    // Mimic — on its mountain
    spawnMoonEnemy('mimic', mimicMountainPos.x, mimicMountainPos.z);
}

function spawnMoonEnemy(type, wx, wz) {
    const def = MOON_ENEMY_DEFS[type];
    if (!def) return;
    const enemy = {
        type, def, x: wx, z: wz,
        y: getMoonTerrainY(wx, wz),
        sprite: null,
        vx: (Math.random()-0.5)*def.speed,
        vz: (Math.random()-0.5)*def.speed,
        // Mimic-specific
        mode: type==='mimic' ? 'mountain' : null,
        stalkTimer: 0,
        disguiseColor: null,
        lastHit: 0,
        opacity: 1,
    };
    getSpriteTexture(type, def, tex => {
        const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: true, depthWrite: false, sizeAttenuation: true });
        const sp = new THREE.Sprite(mat);
        sp.scale.set(def.size, def.size, 1);
        sp.position.set(wx, getMoonTerrainY(wx,wz)+def.size*0.5, wz);
        moonScene.add(sp);
        enemy.sprite = sp;
    });
    moonEnemies.push(enemy);
    return enemy;
}

// ── Update ────────────────────────────────────────────────────────
function updateMoon(dt) {
    if (currentDim !== 'moon') return;
    const now = Date.now();

    if (!isEnemyHost) return; // non-hosts render via applyRemoteEnemies
    moonEnemies.forEach(e => {
        if (!e.sprite) return;
        const pdx = pos.x - e.x, pdz = pos.z - e.z;
        const pdist = Math.sqrt(pdx*pdx+pdz*pdz);

        if (e.type === 'mimic') {
            updateMimic(e, dt, pdx, pdz, pdist, now);
        } else {
            // Martians — passive wander
            if (Math.random() < 0.008) {
                e.vx = (Math.random()-0.5)*e.def.speed;
                e.vz = (Math.random()-0.5)*e.def.speed;
            }
            e.x += e.vx*dt; e.z += e.vz*dt;
            // Clamp to map
            e.x = Math.max(-MOON_SIZE+50, Math.min(MOON_SIZE-50, e.x));
            e.z = Math.max(-MOON_SIZE+50, Math.min(MOON_SIZE-50, e.z));
        }

        e.y = getMoonTerrainY(e.x, e.z);
        if (e.sprite) e.sprite.position.set(e.x, e.y+e.def.size*0.5, e.z);
        if (e.sprite && e.opacity !== undefined) e.sprite.material.opacity = e.opacity;
    });
}

function updateMimic(e, dt, pdx, pdz, pdist, now) {
    const mtnDist = Math.sqrt(
        (e.x-mimicMountainPos.x)**2+(e.z-mimicMountainPos.z)**2
    );

    if (e.mode === 'mountain') {
        e.x = mimicMountainPos.x; e.z = mimicMountainPos.z;
        e.opacity = 1;
        if (pdist < 8000) {
            e.mode = 'stalk';
            e.stalkTimer = 20 + Math.random()*10;
            // Place behind player — opposite of their facing direction
            const behindAng = yaw + Math.PI;
            const stalkDist = 1400 + Math.random()*600;
            e.x = pos.x + Math.sin(behindAng)*stalkDist;
            e.z = pos.z + Math.cos(behindAng)*stalkDist;
            db.ref('cd_moon_mimic').set({ mode:'stalk', targetId: myId, x: e.x, z: e.z, stalkEnd: Date.now() + e.stalkTimer*1000 });
        }

    } else if (e.mode === 'stalk') {
        // If nobody left on moon, abort back to mountain
        const moonCount = 1 + Object.values(otherPlayers).filter(p => p.dim === 'moon').length;
        if (moonCount === 0) {
            e.mode = 'mountain';
            e.x = mimicMountainPos.x; e.z = mimicMountainPos.z;
            db.ref('cd_moon_mimic').set({ mode:'mountain', x: e.x, z: e.z });
            return;
        }
        e.opacity = (mimicTarget === myId) ? 1 : 0.5;
        // Target a point BEHIND the player (not toward them)
        const behindAng = yaw + Math.PI;
        const targetX = pos.x + Math.sin(behindAng) * 900;
        const targetZ = pos.z + Math.cos(behindAng) * 900;
        const tdx = targetX - e.x, tdz = targetZ - e.z;
        const tdist = Math.sqrt(tdx*tdx + tdz*tdz);
        if (tdist > 120) {
            e.x += (tdx/tdist) * SPEED * 0.5 * dt;
            e.z += (tdz/tdist) * SPEED * 0.5 * dt;
        }
        // Use server timestamp so all clients agree on when hunt starts
        e.stalkTimer -= dt;
        if (e.stalkTimer <= 0) {
            e.mode = 'hunt';
            db.ref('cd_moon_mimic').set({ mode:'hunt', targetId: myId, x: e.x, z: e.z });
        }

    } else if (e.mode === 'hunt') {
        // If nobody left on moon, abort back to mountain
        const moonCount2 = 1 + Object.values(otherPlayers).filter(p => p.dim === 'moon').length;
        if (moonCount2 === 0) {
            e.mode = 'mountain';
            e.x = mimicMountainPos.x; e.z = mimicMountainPos.z;
            db.ref('cd_moon_mimic').set({ mode:'mountain', x: e.x, z: e.z });
            return;
        }
        e.opacity = 1;
        const huntSpeed = SPEED * 1.1;
        const len = pdist || 1;
        e.x += (pdx/len) * huntSpeed * dt;
        e.z += (pdz/len) * huntSpeed * dt;
        if (pdist < 150 && now - e.lastHit > 1500) {
            e.lastHit = now;
            dealMoonDmg(40, '💀 The Mimic got you!');
            if (playerHP_moon <= 0) {
                e.mode = 'disguise';
                e.disguiseColor = myColor;
                e.disguiseName = myName;
                // Hide sprite, show player mesh disguise
                if (e.sprite) e.sprite.visible = false;
                buildMimicDisguise(e, myColor, myName);
                // Broadcast to all clients: mimic is now disguised as this player
                db.ref('cd_moon_mimic').set({ mode:'disguise', color: myColor, name: myName, x: e.x, z: e.z });
                // Also update the nametag text to definitely be the victim's username
                if (e.disguiseTag) e.disguiseTag.innerText = myName;
            }
        }

    } else if (e.mode === 'disguise') {
        e.opacity = 1;
        // Start 5-minute return timer when entering disguise mode
        if (!e.disguiseReturnAt) e.disguiseReturnAt = now + 5 * 60 * 1000;

        // Count players on moon (host + others)
        const moonPlayerCount = 1 + Object.values(otherPlayers).filter(p => p.dim === 'moon').length;

        if (now >= e.disguiseReturnAt || moonPlayerCount === 0) {
            // Time's up or nobody left — return to mountain
            e.mode = 'mountain';
            e.disguiseReturnAt = 0;
            e.x = mimicMountainPos.x; e.z = mimicMountainPos.z;
            if (e.sprite) e.sprite.visible = true;
            if (e.disguiseMesh) { moonScene.remove(e.disguiseMesh); e.disguiseMesh = null; }
            if (e.disguiseTag)  { e.disguiseTag.remove(); e.disguiseTag = null; }
            db.ref('cd_moon_mimic').set({ mode:'mountain', x: e.x, z: e.z });
            return;
        }

        if (pdist > 200) {
            const len = pdist || 1;
            e.x += (pdx/len) * SPEED * 0.9 * dt;
            e.z += (pdz/len) * SPEED * 0.9 * dt;
        }
        // Update disguise mesh + nametag position, face player
        if (e.disguiseMesh) {
            e.disguiseMesh.position.set(e.x, getMoonTerrainY(e.x,e.z), e.z);
            // Face the player (negate because mesh faces +Z by default)
            const faceAngle = Math.atan2(-pdx, -pdz);
            e.disguiseMesh.rotation.y = faceAngle;
        }
        if (e.disguiseTag && activeCamera) {
            const wp = new THREE.Vector3(e.x, getMoonTerrainY(e.x,e.z)+75, e.z);
            const prj = wp.clone().project(activeCamera);
            const sx = (prj.x*0.5+0.5)*wrap.clientWidth;
            const sy = (-prj.y*0.5+0.5)*wrap.clientHeight;
            if (prj.z > 1 || sx<0||sx>wrap.clientWidth||sy<0||sy>wrap.clientHeight) {
                e.disguiseTag.style.display='none';
            } else {
                e.disguiseTag.style.display='block';
                e.disguiseTag.style.left=sx+'px';
                e.disguiseTag.style.top=(sy-8)+'px';
            }
        }
        if (pdist < 150 && now - e.lastHit > 2000) {
            e.lastHit = now;
            dealMoonDmg(20, '😈 Something is wrong with that player...');
        }
    }
}

// Build a player-shaped mesh as the mimic disguise
function buildMimicDisguise(e, color, name) {
    if (e.disguiseMesh) { moonScene.remove(e.disguiseMesh); e.disguiseMesh = null; }
    if (e.disguiseTag)  { e.disguiseTag.remove(); e.disguiseTag = null; }

    // Parse color string into a Three hex int
    const threeColor = new THREE.Color(color);
    const hexColor = threeColor.getHex();
    const mesh = makeSquareMesh(hexColor);

    // ── Smiley face overlay ──
    // Remove the default black eyes added by makeSquareMesh (they're on the mesh group as children 0 & 1)
    // Actually makeSquareMesh puts eyes at positions [-5,44,-11] and [5,44,-11] — we keep those.
    // Add a curved smile using a torus arc
    const smileMat = new THREE.MeshBasicMaterial({ color: 0x000000 });

    // Wide smile arc (half-torus facing down = smile)
    const smileGeo = new THREE.TorusGeometry(6, 1.4, 6, 12, Math.PI);
    const smile = new THREE.Mesh(smileGeo, smileMat);
    smile.position.set(0, 37, -11); // lower on face than eyes
    smile.rotation.z = Math.PI;    // arc opens downward = :)
    mesh.add(smile);

    // Bright white sclera eyes (wider, over the standard black eyes)
    const scleraMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
    [-5, 5].forEach(ex => {
        const sclera = new THREE.Mesh(new THREE.BoxGeometry(5, 5, 2), scleraMat);
        sclera.position.set(ex, 44, -11.5);
        mesh.add(sclera);
        // Black pupil dot on top
        const pupil = new THREE.Mesh(new THREE.BoxGeometry(2.5, 2.5, 2), smileMat);
        pupil.position.set(ex, 44, -12.5);
        mesh.add(pupil);
    });

    mesh.position.set(e.x, getMoonTerrainY(e.x, e.z), e.z);
    moonScene.add(mesh);
    e.disguiseMesh = mesh;

    // Nametag — styled exactly like real player nametags
    const tag = document.createElement('div');
    tag.style.cssText = `position:fixed;pointer-events:none;z-index:40;
        background:rgba(15,15,26,0.85);border:1px solid var(--primary);
        color:#a29bfe;font-size:10px;font-weight:600;
        padding:2px 7px;border-radius:4px;
        transform:translateX(-50%);white-space:nowrap;
        font-family:'Courier New',monospace;`;
    tag.innerText = name;
    document.body.appendChild(tag);
    e.disguiseTag = tag;
}

function applyMimicState(data) {
    mimicMode = data.mode;
    mimicTarget = data.targetId || null;
    const mimic = moonEnemies.find(e => e.type === 'mimic');
    if (!mimic) return;
    mimic.mode = data.mode;
    if (data.x !== undefined) { mimic.x = data.x; mimic.z = data.z; }
    if (data.mode === 'stalk') {
        // Use server timestamp so timer is authoritative across clients
        mimic.stalkEnd = data.stalkEnd || (Date.now() + 25000);
        mimic.stalkTimer = (mimic.stalkEnd - Date.now()) / 1000;
        mimic.opacity = (mimicTarget === myId) ? 1 : 0.5;
        if (mimic.sprite) mimic.sprite.visible = true;
        if (mimic.disguiseMesh) { moonScene.remove(mimic.disguiseMesh); mimic.disguiseMesh = null; }
        if (mimic.disguiseTag)  { mimic.disguiseTag.remove(); mimic.disguiseTag = null; }
    }
    if (data.mode === 'hunt') {
        mimic.opacity = 1;
        if (mimic.sprite) mimic.sprite.visible = true;
    }
    if (data.mode === 'disguise' && data.color) {
        mimic.disguiseColor = data.color;
        mimic.disguiseName  = data.name || mimicTarget || '???';
        mimic.disguiseReturnAt = Date.now() + 5 * 60 * 1000; // 5 min timer
        if (mimic.sprite) mimic.sprite.visible = false;
        buildMimicDisguise(mimic, data.color, mimic.disguiseName);
    }
    if (data.mode === 'mountain') {
        mimic.disguiseReturnAt = 0;
        if (mimic.disguiseMesh) { moonScene?.remove(mimic.disguiseMesh); mimic.disguiseMesh = null; }
        if (mimic.disguiseTag)  { mimic.disguiseTag.remove(); mimic.disguiseTag = null; }
        if (mimic.sprite) mimic.sprite.visible = true;
    }
}

function dealMoonDmg(amount, msg) {
    const now = Date.now();
    if (now - moonDmgTime < 500) return;
    moonDmgTime = now;
    playerHP_moon = Math.max(0, playerHP_moon - amount);
    updateHPUI();
    showPetNotif(msg);
    const flash = document.createElement('div');
    flash.style.cssText = 'position:fixed;inset:0;background:rgba(235,77,75,0.3);pointer-events:none;z-index:9000;';
    document.body.appendChild(flash); setTimeout(()=>flash.remove(), 180);
    if (playerHP_moon <= 0) {
        showPetNotif('You died on the Moon... returning to Hub.');
        setTimeout(()=>{ playerHP_moon=100; exitMoon(); }, 2500);
    }
}

// ════════════════════════════════════════════════════════════════════
// PLASTIC TERRACE — dreamlike multi-room dimension
// ════════════════════════════════════════════════════════════════════

const PT_ROOM_SIZE = 2000; // movement clamp half-size

// ── State ─────────────────────────────────────────────────────────
let ptScene = null, ptCamera = null;
let ptRoom = 0; // current room index
let ptRoomEnteredAt = 0;
let ptTextTimeout = null;
let ptTransporting = false;
let ptOverlay = null; // the full-screen text/fade overlay div
let ptEverPurpleDir = null; // random walk direction for Route 2

// ── Overlay helper ────────────────────────────────────────────────
function ptShowOverlay(text, color, fadeOutAfter, onFadeOut) {
    if (!ptOverlay) {
        ptOverlay = document.createElement('div');
        ptOverlay.style.cssText = `
            position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
            pointer-events:none;z-index:9500;transition:opacity 1.2s ease;
            font-family:'Courier New',monospace;font-size:22px;letter-spacing:0.12em;
            text-shadow:0 0 18px currentColor;text-align:center;`;
        document.body.appendChild(ptOverlay);
    }
    ptOverlay.style.background = 'transparent';
    ptOverlay.style.color = color || 'white';
    ptOverlay.style.opacity = '0';
    ptOverlay.innerText = text;
    requestAnimationFrame(() => { ptOverlay.style.opacity = '1'; });
    if (fadeOutAfter > 0) {
        setTimeout(() => {
            ptOverlay.style.opacity = '0';
            if (onFadeOut) setTimeout(onFadeOut, 1200);
        }, fadeOutAfter);
    }
}

function ptFadeToBlack(dur, cb) {
    if (!ptOverlay) {
        ptOverlay = document.createElement('div');
        ptOverlay.style.cssText = `position:fixed;inset:0;pointer-events:none;z-index:9500;
            transition:opacity ${dur/1000}s ease;background:black;`;
        document.body.appendChild(ptOverlay);
    }
    ptOverlay.style.background = 'black';
    ptOverlay.style.color = 'transparent';
    ptOverlay.innerText = '';
    ptOverlay.style.opacity = '0';
    ptOverlay.style.transition = `opacity ${dur/1000}s ease`;
    requestAnimationFrame(() => { ptOverlay.style.opacity = '1'; });
    setTimeout(cb, dur);
}

function ptClearOverlay() {
    if (ptOverlay) { ptOverlay.style.opacity = '0'; ptOverlay.innerText = ''; }
}

// ── Enter Plastic Terrace ─────────────────────────────────────────
function enterPlasticTerrace() {
    document.getElementById('portal-prompt').style.display = 'none';
    enterPTRoom(1); // start at Room 1: The Playcenter
}

function enterPTRoom(room) {
    if (ptTransporting) return;
    ptTransporting = true;
    document.getElementById('portal-prompt').style.display = 'none';

    ptFadeToBlack(600, () => {
        _buildPTRoom(room);
        ptTransporting = false;
        // Fade back in
        setTimeout(() => { if (ptOverlay) { ptOverlay.style.opacity = '0'; } }, 300);
    });
}

function _buildPTRoom(room) {
    ptRoom = room;
    ptRoomEnteredAt = Date.now();
    ptClearOverlay();
    if (ptTextTimeout) { clearTimeout(ptTextTimeout); ptTextTimeout = null; }
    ptEverPurpleDir = null;

    // Tear down old scene if any
    if (ptScene) {
        while (ptScene.children.length) ptScene.remove(ptScene.children[0]);
    } else {
        ptScene = new THREE.Scene();
        ptCamera = makeCamera();
    }

    // Update dim label
    currentDim = 'pt_' + room;
    document.getElementById('dim-label').style.display = 'block';

    // Reset position
    pos.x = 0; pos.z = 0; pos.y = 0;
    ptCamera.position.set(0, EYE_H, 0);
    activeScene  = ptScene;
    activeCamera = ptCamera;
    activeCamera.far = 30000;
    activeCamera.updateProjectionMatrix();

    if (room === 0) buildPTRoom0();
    else if (room === 1) buildPTRoom1();
    else if (room === 2) buildPTRoom2();
    else if (room === 3) buildPTRoom3();
    else if (room === 4) buildPTRoom4();
    else if (room === 5) buildPTRoom5();
    else if (room === 6) buildPTRoom6();
    else if (room === 7) buildPTRoom7();
}

// ── Shared scene helpers ───────────────────────────────────────────
function ptFloor(color, size) {
    const f = new THREE.Mesh(
        new THREE.PlaneGeometry(size*2, size*2),
        new THREE.MeshLambertMaterial({ color })
    );
    f.rotation.x = -Math.PI/2; f.position.y = -0.5;
    ptScene.add(f);
}

function ptWallBox(w, h, d, x, y, z, color) {
    const mesh = new THREE.Mesh(
        new THREE.BoxGeometry(w, h, d),
        new THREE.MeshLambertMaterial({ color })
    );
    mesh.position.set(x, y, z);
    ptScene.add(mesh);
    return mesh;
}

    wallCeil.position.set(0, WALL_H, 0);
    ptScene.add(wallCeil);

    // ── Painted "field" details on the back wall ───────────────────

    const hillMat = new THREE.MeshLambertMaterial({ color: 0x2e8b2e });
    const hill = new THREE.Mesh(new THREE.BoxGeometry(ROOM_W-2, 60, 4), hillMat);

    ptScene.add(hill);

    // Painted trees on back wall
    [-160, 0, 160].forEach(bx => {
        // Trunk
        const trunk = new THREE.Mesh(new THREE.BoxGeometry(14, 70, 4),
            new THREE.MeshLambertMaterial({ color: 0x7a5230 }));
        trunk.position.set(bx, 55, -HALF_D+12);
        ptScene.add(trunk);
        // Leaves blob
        const leaves = new THREE.Mesh(new THREE.SphereGeometry(32, 8, 6),
            new THREE.MeshLambertMaterial({ color: 0x228b22 }));
        leaves.position.set(bx, 118, -HALF_D+12);
        ptScene.add(leaves);
    });
    // Thin cypress-style trees
    [80, -80].forEach(bx => {
        const cyp = new THREE.Mesh(new THREE.ConeGeometry(10, 90, 7),
            new THREE.MeshLambertMaterial({ color: 0x1a6b1a }));
        cyp.position.set(bx, 105, -HALF_D+12);
        ptScene.add(cyp);
    });

    // Sky details on upper back wall — painted clouds (white boxes)
    [[60, 230, 0x5], [-80, 250, 0x6], [150, 240, 0x5]].forEach(([bx, by]) => {
        const cloud = new THREE.Mesh(new THREE.SphereGeometry(28, 7, 5),
            new THREE.MeshLambertMaterial({ color: 0xffffff, transparent: true, opacity: 0.85 }));
        cloud.position.set(bx, by, -HALF_D+14);
        ptScene.add(cloud);
    });

    // ── Fluorescent ceiling light strip ──────────────────────────
    const lightStrip = new THREE.Mesh(new THREE.BoxGeometry(300, 8, 60),
        new THREE.MeshBasicMaterial({ color: 0xffffee }));
    lightStrip.position.set(0, WALL_H-WALL_T/2-1, 0);
    ptScene.add(lightStrip);
    const ceilLight = new THREE.PointLight(0xfff8e0, 1.2, 1200);
    ceilLight.position.set(0, WALL_H-30, 0);
    ptScene.add(ceilLight);

    // ── Hollow plastic log (crawl-through sized) ──────────────────
    const logMat  = new THREE.MeshLambertMaterial({ color: 0xb85c18 });
    const logR    = 38; // just big enough for player to fit
    const logLen  = 220;
    const logOuter = new THREE.Mesh(new THREE.CylinderGeometry(logR, logR+4, logLen, 14), logMat);
    logOuter.rotation.z = Math.PI/2;
    logOuter.position.set(130, logR, 80);
    ptScene.add(logOuter);
    const logInner = new THREE.Mesh(new THREE.CylinderGeometry(logR-6, logR-6, logLen+10, 14),
        new THREE.MeshLambertMaterial({ color: 0x3a1800, side: THREE.BackSide }));
    logInner.rotation.z = Math.PI/2;
    logInner.position.set(130, logR, 80);
    ptScene.add(logInner);
    // Log grain lines
    for (let i = -2; i <= 2; i++) {
        const grain = new THREE.Mesh(new THREE.TorusGeometry(logR-2, 1.5, 4, 14),
            new THREE.MeshLambertMaterial({ color: 0x8a3a08 }));
        grain.rotation.y = Math.PI/2;
        grain.position.set(130 + i*38, logR, 80);
        ptScene.add(grain);
    }

    // ── Stone arch ────────────────────────────────────────────────
    ptWallBox(22, 90, 22,  70, 45, 80, 0x888899); // left pillar
    ptWallBox(22, 90, 22, 120, 45, 80, 0x888899); // right pillar
    ptWallBox(72, 22, 22,  95, 95, 80, 0x888899); // top lintel

    // ── Stump seat ────────────────────────────────────────────────
    const stump = new THREE.Mesh(new THREE.CylinderGeometry(22, 26, 28, 10),
        new THREE.MeshLambertMaterial({ color: 0xa0632a }));
    stump.position.set(50, 14, -80);
    ptScene.add(stump);

    // ── Ball pit (kid-sized, stone-rimmed, blue water) ────────────
    const PIT_X = -120, PIT_Z = 130;
    const PIT_RX = 90, PIT_RZ = 65; // oval radii
    const pitEdgeMat = new THREE.MeshLambertMaterial({ color: 0x888899 });
    for (let a = 0; a < Math.PI*2; a += Math.PI/9) {
        const ex = Math.cos(a)*PIT_RX, ez = Math.sin(a)*PIT_RZ;
        const eb = new THREE.Mesh(new THREE.BoxGeometry(28, 18, 16), pitEdgeMat);
        eb.position.set(PIT_X+ex, 9, PIT_Z+ez);
        eb.rotation.y = a;
        ptScene.add(eb);
    }
    const waterMat = new THREE.MeshLambertMaterial({ color: 0x1a8fc1, transparent: true, opacity: 0.9 });
    const water = new THREE.Mesh(new THREE.CylinderGeometry(PIT_RX-12, PIT_RX-12, 4, 24), waterMat);
    water.scale.z = PIT_RZ / PIT_RX;
    water.position.set(PIT_X, 7, PIT_Z);
    ptScene.add(water);

    // Ladybugs on pit rim
    [-30, 30].forEach(ox => {
        const lb = new THREE.Mesh(new THREE.SphereGeometry(8, 8, 7),
            new THREE.MeshLambertMaterial({ color: 0xdd2222 }));
        lb.position.set(PIT_X+ox, 20, PIT_Z+PIT_RZ+4);
        ptScene.add(lb);
        const dot = new THREE.Mesh(new THREE.SphereGeometry(2.5, 6, 6),
            new THREE.MeshLambertMaterial({ color: 0x111111 }));
        dot.position.set(PIT_X+ox, 27, PIT_Z+PIT_RZ+1);
        ptScene.add(dot);
    });

    // ── Pond (leads to The Decision when stepped in) ──────────────
    // Safely inside room: HALF_W=275, HALF_D=250. Pond at (160, 60) — right side, centre-ish
    const POND_X = 150, POND_Z = 60;
    const POND_RX = 65, POND_RZ = 50;
    // Stone rim around pond
    const pondRimMat = new THREE.MeshLambertMaterial({ color: 0x778899 });
    for (let a = 0; a < Math.PI*2; a += Math.PI/8) {
        const ex = Math.cos(a)*POND_RX, ez = Math.sin(a)*POND_RZ;
        const rb = new THREE.Mesh(new THREE.BoxGeometry(24, 14, 14), pondRimMat);
        rb.position.set(POND_X+ex, 7, POND_Z+ez);
        rb.rotation.y = a;
        ptScene.add(rb);
    }
    // Pond water surface — dark teal, slightly transparent
    const pondWaterMat = new THREE.MeshLambertMaterial({ color: 0x1a5f6e, transparent: true, opacity: 0.88 });
    const pondWater = new THREE.Mesh(new THREE.CylinderGeometry(POND_RX-10, POND_RX-10, 3, 32), pondWaterMat);
    pondWater.scale.z = POND_RZ / POND_RX;
    pondWater.position.set(POND_X, 5, POND_Z);
    ptScene.add(pondWater);
    // Subtle ripple rings
    for (let r = 0; r < 3; r++) {
        const ring = new THREE.Mesh(
            new THREE.TorusGeometry(20 + r*18, 1.2, 4, 28),
            new THREE.MeshBasicMaterial({ color: 0x3a9cb0, transparent: true, opacity: 0.35 - r*0.09 })
        );
        ring.rotation.x = Math.PI/2;
        ring.position.set(POND_X, 7.2, POND_Z);
        ptScene.add(ring);
    }
    // A lily pad or two
    [-18, 12].forEach((ox, i) => {
        const lily = new THREE.Mesh(new THREE.CylinderGeometry(9+i*2, 9+i*2, 1.5, 8),
            new THREE.MeshLambertMaterial({ color: 0x2d7a2d }));
        lily.position.set(POND_X+ox, 7.5, POND_Z + (i===0?10:-8));
        ptScene.add(lily);
    });
    // Store pond data for sinking check
    ptScene.userData.pondCenter = { x: POND_X, z: POND_Z };
    ptScene.userData.pondRX = POND_RX - 10;
    ptScene.userData.pondRZ = POND_RZ - 10;

    // ── Exit door back to Hub — near spawn ───────────────────────
    // A simple wooden door frame at the back wall (behind spawn)
    const exitDoorMat = new THREE.MeshLambertMaterial({ color: 0x8b5e3c, emissive: 0x2a1a0a, emissiveIntensity: 0.2 });
    const exitFrame = new THREE.Mesh(new THREE.BoxGeometry(70, 110, WALL_T+4), exitDoorMat);
    exitFrame.position.set(0, 55, -HALF_D);
    ptScene.add(exitFrame);
    const exitOpening = new THREE.Mesh(new THREE.BoxGeometry(50, 90, WALL_T+8),
        new THREE.MeshBasicMaterial({ color: 0x111111 }));
    exitOpening.position.set(0, 50, -HALF_D);
    ptScene.add(exitOpening);
    // Small "EXIT" sign above door
    const exitSign = new THREE.Mesh(new THREE.BoxGeometry(60, 16, 4),
        new THREE.MeshLambertMaterial({ color: 0x22cc44 }));
    exitSign.position.set(0, 115, -HALF_D+12);
    ptScene.add(exitSign);
    ptScene.userData.exitDoor = { x: 0, z: -HALF_D+10 };

    // ── Wall collision — store inner bounds for clamping ─────────
    // Player is clamped to stay inside the room interior.
    // The exit gap in the back wall (x: -35..35) is handled separately.
    ptScene.userData.wallBoxes = []; // legacy field kept for compatibility
    ptScene.userData.halfW = HALF_W;
    ptScene.userData.halfD = HALF_D;
    ptScene.userData.wallT = WALL_T;
    ptScene.userData.exitGap = { minX: -35, maxX: 35 };

    // ── Room bounds & sinking mechanic ───────────────────────────
    ptScene.userData.roomW = ROOM_W;
    ptScene.userData.roomD = ROOM_D;
    ptScene.userData.halfW = HALF_W;
    ptScene.userData.halfD = HALF_D;
    ptScene.userData.ballPitCenter = { x: PIT_X, z: PIT_Z };
    ptScene.userData.ballPitRadius = PIT_RX - 10;
    ptScene.userData.sinkY = 0;
    ptScene.userData.sunk  = false;
    ptScene.userData.sinkDest = 2; // default sink destination

    ptScene.userData.onUpdate = (dt) => {
        if (ptScene.userData.sunk) return;
        const bpc = ptScene.userData.ballPitCenter;
        const bpr = ptScene.userData.ballPitRadius;
        const dx2 = pos.x - bpc.x, dz2 = pos.z - bpc.z;
        const inPit = (dx2*dx2)/(bpr*bpr) + (dz2*dz2)/(bpr*bpr) < 1;

        const pnc = ptScene.userData.pondCenter;
        const pnRX = ptScene.userData.pondRX, pnRZ = ptScene.userData.pondRZ;
        const pdx = pos.x - pnc.x, pdz = pos.z - pnc.z;
        const inPond = pnc && (pdx*pdx)/(pnRX*pnRX) + (pdz*pdz)/(pnRZ*pnRZ) < 1;

        if (inPit || inPond) {
            if (inPond) ptScene.userData.sinkDest = 2; // pond → The Decision
            ptScene.userData.sinkY -= dt * (inPond ? 40 : 55); // pond sinks a bit slower
            pos.y = ptScene.userData.sinkY;
            if (pos.y < -140) {
                ptScene.userData.sunk = true;
                enterPTRoom(ptScene.userData.sinkDest);
            }
        } else {
            ptScene.userData.sinkY = Math.min(0, ptScene.userData.sinkY + dt * 80);
            pos.y = ptScene.userData.sinkY;
        }
    };
}

// ── ROOM 3 — Everpurple Terrace ──────────────────────────────────
const PT_EVERPURPLE_SIZE = 80000; // very large

function buildPTRoom3() {
    document.getElementById('dim-label').innerText = '🌸 Everpurple Terrace';
    ptScene.background = new THREE.Color(0x5a2d82);
    ptScene.fog = new THREE.FogExp2(0x3d1f5a, 0.00003);
    ptScene.add(new THREE.AmbientLight(0xcc88ff, 0.7));
    ptScene.add(new THREE.DirectionalLight(0xdd99ff, 0.5));

    // Ground — deep purple
    const ground = new THREE.Mesh(new THREE.PlaneGeometry(PT_EVERPURPLE_SIZE*2, PT_EVERPURPLE_SIZE*2),
        new THREE.MeshLambertMaterial({ color: 0x2d1040 }));
    ground.rotation.x = -Math.PI/2; ground.position.y = -0.5;
    ptScene.add(ground);

    // Flowers everywhere — no collision, dense
    const flowerColors = [0x9944cc, 0xcc44aa, 0xaa22ee, 0x7722bb];
    const rng2 = seededRand(77);
    for (let i = 0; i < 2400; i++) {
        const fx = (rng2()-0.5)*PT_EVERPURPLE_SIZE*1.8;
        const fz = (rng2()-0.5)*PT_EVERPURPLE_SIZE*1.8;
        const stem = new THREE.Mesh(new THREE.CylinderGeometry(3, 3, 40+rng2()*30, 5),
            new THREE.MeshLambertMaterial({ color: 0x226622 }));
        stem.position.set(fx, 20, fz); ptScene.add(stem);
        const petal = new THREE.Mesh(new THREE.SphereGeometry(12+rng2()*10, 7, 7),
            new THREE.MeshLambertMaterial({ color: flowerColors[Math.floor(rng2()*4)] }));
        petal.position.set(fx, 50+rng2()*20, fz); ptScene.add(petal);
    }

    // The empty door — very far away on the +Z axis
    const DOOR_Z = PT_EVERPURPLE_SIZE * 0.65;
    const doorMat = new THREE.MeshLambertMaterial({ color: 0x888888, side: THREE.DoubleSide });
    const doorFrame = new THREE.Mesh(new THREE.BoxGeometry(180, 300, 18), doorMat);
    doorFrame.position.set(0, 150, DOOR_Z);
    ptScene.add(doorFrame);
    // The "empty" door opening (darker)
    const doorOpen = new THREE.Mesh(new THREE.PlaneGeometry(150, 270),
        new THREE.MeshBasicMaterial({ color: 0x111111, side: THREE.DoubleSide }));
    doorOpen.position.set(0, 150, DOOR_Z-9);
    ptScene.add(doorOpen);
    // Glow
    ptScene.add(Object.assign(new THREE.PointLight(0xcc88ff, 1.5, 3000), { position: new THREE.Vector3(0, 200, DOOR_Z) }));

    ptScene.userData.everpurpleDoorZ = DOOR_Z;
    ptScene.userData.onUpdate = () => {
        // Check if player hits the map border → Lost 404
        if (!ptEverPurpleDir) return;
        const d = Math.sqrt(pos.x*pos.x + pos.z*pos.z);
        if (d > PT_EVERPURPLE_SIZE * 0.92) {
            ptEverPurpleDir = null;
            // Screen goes black, purple text, then → Lost 404
            ptFadeToBlack(800, () => {
                if (ptOverlay) {
                    ptOverlay.style.background = 'transparent';
                    ptOverlay.style.color = '#cc44ee';
                    ptOverlay.style.opacity = '0';
                    ptOverlay.innerText = 'Are you lost?';
                    ptOverlay.style.transition = 'opacity 1s ease';
                    requestAnimationFrame(() => { ptOverlay.style.opacity = '1'; });
                }
                setTimeout(() => { enterPTRoom(7); }, 5000);
            });
        }
    };
}

// ── ROOM 4 — Blind Future (Thorns) ───────────────────────────────
function buildPTRoom4() {
    document.getElementById('dim-label').innerText = '🌫️ Blind Future';
    const GT_LIKE = 18000;

    ptScene.background = new THREE.Color(0xb0a898);
    ptScene.fog = new THREE.FogExp2(0xb0a898, 0.00018);
    ptScene.add(new THREE.AmbientLight(0xccbbaa, 0.6));
    ptScene.add(new THREE.DirectionalLight(0xfff5e0, 0.4));

    // Barren grey-tan ground
    ptFloor(0xa09080, 60000);

    // Thorns: vary from house-sized to tiny, scattered, none at origin
    const rng3 = seededRand(42);
    const thornMat = new THREE.MeshLambertMaterial({ color: 0x888880 });
    const bigThornMat = new THREE.MeshLambertMaterial({ color: 0x6a6460 });

    for (let i = 0; i < 200; i++) {
        const angle = rng3() * Math.PI * 2;
        const dist  = 600 + rng3() * 14000;
        const tx = Math.cos(angle)*dist, tz = Math.sin(angle)*dist;

        // Size varies: large house (h ~400-700) down to half-player (~30)
        const h = 30 + rng3() * 670;
        const baseR = h * 0.08;
        const mat = h > 300 ? bigThornMat : thornMat;

        // Cone-like thorn — ConeGeometry(baseRadius, height, sides)
        const thorn = new THREE.Mesh(new THREE.ConeGeometry(baseR, h, 5), mat);
        thorn.position.set(tx, h/2, tz);
        // Slight random tilt
        thorn.rotation.z = (rng3()-0.5)*0.3;
        thorn.rotation.x = (rng3()-0.5)*0.15;
        ptScene.add(thorn);
    }

    // Sign at spawn
    const signPost = new THREE.Mesh(new THREE.BoxGeometry(12, 200, 12),
        new THREE.MeshLambertMaterial({ color: 0x6a5040 }));
    signPost.position.set(0, 100, -300); ptScene.add(signPost);
    const signBoard = new THREE.Mesh(new THREE.BoxGeometry(350, 100, 16),
        new THREE.MeshLambertMaterial({ color: 0x8a7060 }));
    signBoard.position.set(0, 220, -300); ptScene.add(signBoard);

    // 2 minutes after entering, fade to black → Room 0
    ptScene.userData.onUpdate = () => {
        const elapsed = Date.now() - ptRoomEnteredAt;
        if (elapsed > 120000 && !ptTransporting) {
            ptTransporting = true;
            ptFadeToBlack(3000, () => { ptTransporting=false; _buildPTRoom(0); });
        }
    };
}

// ── ROOM 5 — Cubicle Farm ────────────────────────────────────────
let ptComputersOn = [];

function buildPTRoom5() {
    document.getElementById('dim-label').innerText = '🖥️ Cubicle Farm';
    ptScene.background = new THREE.Color(0xd4d0c8);
    ptScene.add(new THREE.AmbientLight(0xffffff, 0.9));
    ptScene.add(new THREE.DirectionalLight(0xfff5e0, 0.5));

    ptFloor(0xc8c4bc, 8000);
    // Ceiling
    const ceil = new THREE.Mesh(new THREE.PlaneGeometry(8000, 8000),
        new THREE.MeshLambertMaterial({ color: 0xdddddd }));
    ceil.rotation.x = Math.PI/2; ceil.position.y = 500; ptScene.add(ceil);

    // Fluorescent-style rect lights (just bright boxes)
    [[-1200,490,0],[0,490,0],[1200,490,0],[-1200,490,1800],[0,490,1800],[1200,490,1800]].forEach(([x,y,z]) => {
        const light = new THREE.Mesh(new THREE.BoxGeometry(400, 10, 80),
            new THREE.MeshBasicMaterial({ color: 0xffffee }));
        light.position.set(x, y, z); ptScene.add(light);
    });

    // 32 cubicles in a grid (8x4)
    ptComputersOn = [];
    const cubW=280, cubD=280, wallH=200, wallT=14;
    const wallMat = new THREE.MeshLambertMaterial({ color: 0xb0a898 });
    const deskMat = new THREE.MeshLambertMaterial({ color: 0x8a7060 });
    const monOffMat= new THREE.MeshLambertMaterial({ color: 0x111111 });
    const monOnMat = new THREE.MeshBasicMaterial({ color: 0x00ff88 });

    // Pick ONE random on computer
    const onIndex = Math.floor(Math.random() * 32);

    let idx = 0;
    for (let row = 0; row < 4; row++) {
        for (let col = 0; col < 8; col++, idx++) {
            const cx = (col - 3.5) * (cubW + 40);
            const cz = (row - 1.5) * (cubD + 40);

            // Three walls (U-shape opening to south)
            const back = new THREE.Mesh(new THREE.BoxGeometry(cubW, wallH, wallT), wallMat);
            back.position.set(cx, wallH/2, cz - cubD/2);
            const left = new THREE.Mesh(new THREE.BoxGeometry(wallT, wallH, cubD), wallMat);
            left.position.set(cx - cubW/2, wallH/2, cz);
            const right = new THREE.Mesh(new THREE.BoxGeometry(wallT, wallH, cubD), wallMat);
            right.position.set(cx + cubW/2, wallH/2, cz);
            ptScene.add(back, left, right);

            // Desk
            const desk = new THREE.Mesh(new THREE.BoxGeometry(cubW-30, 18, 100), deskMat);
            desk.position.set(cx, 90, cz - cubD/2 + 60);
            ptScene.add(desk);

            // Monitor
            const isOn = (idx === onIndex);
            const mon = new THREE.Mesh(new THREE.BoxGeometry(90, 65, 12), isOn ? monOnMat : monOffMat);
            mon.position.set(cx, 130, cz - cubD/2 + 60);
            ptScene.add(mon);

            if (isOn) {
                ptComputersOn.push({ x: cx, z: cz-cubD/2+60 });
            }
        }
    }

    ptScene.userData.onUpdate = () => {};
}
