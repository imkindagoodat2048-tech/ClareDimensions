// ── Constants ────────────────────────────────────────────────────────
const GT_SIZE        = 18000;  // half-size of full map (3x bigger)
const TOWN_R         = 3600;   // radius of town zone (3x)
const DESERT_R       = 9000;   // desert zone outer radius (3x)
const MOUNTAIN_R     = 12600;  // mountain zone outer radius (3x)
// Beyond MOUNTAIN_R = Dark Region
const GT_SPEED       = 420;
const GT_TERRAIN_SEGS = 180;   // terrain resolution
const WEATHER_CYCLE  = 300000; // 5 minutes in ms
const WEATHERS       = ['day','night','rainy','reckoning'];

// ── State ─────────────────────────────────────────────────────────────
let gtScene = null, gtCamera = null;
let gtGenerated  = false;
let gtTerrainMesh = null;
let gtTerrainHeights = null; // 2D array [vi][ui]
let gtCollisionBoxes = []; // { minX, maxX, minZ, maxZ } world-space AABB per wall
let gtWeather    = 'day';
let gtWeatherTimer = 0;
let gtBuildings  = [];   // { type, x, z, mesh, interior:null }
let gtEnemies    = [];
let gtParticles  = null; // rain
let gtInteriorScene = null, gtInteriorCamera = null;
let gtInInterior = false;
let gtInteriorBuilding = null;
let gtWet = false, gtWetTimer = 0;
let gtSlowTimer  = 0;
let gtReckoningShake = false;
let gtLastWeatherChange = 0;
let gtSunLight = null, gtAmbLight = null, gtSkyColor = null;
let gtStatueLastTick = 0;
let playerHP_gt = 100;
let gtDmgTime   = 0;
let gtMsg        = null; // cached element

const BUILDING_TYPES = ['store','house1','house2','misc1','misc2','misc3','misc4','townhall','museum'];

// ── Enter / Exit ──────────────────────────────────────────────────────
function enterGhostTown() {
    currentDim = 'ghosttown';
    document.getElementById('dim-label').innerText = '🏚️ Ghost Town';
    document.getElementById('gen-btn').style.display = myName==='bartelsfamily5' ? 'block' : 'none';
    document.getElementById('gen-btn').innerText = '🏚️ Generate Town';
    document.getElementById('gen-btn').onclick = generateGhostTown;
    document.getElementById('hp-bar').style.display = 'block';
    clearEnemies();
    gtMsg = document.getElementById('bsmt-msg');

    if (!gtScene) buildGTScene();
    activeScene  = gtScene;
    activeCamera = gtCamera;
    activeCamera.far = 40000;
    activeCamera.updateProjectionMatrix();
    pos.x = 0; pos.y = 0; pos.z = 0;
    playerHP_gt = 100; updateHPUI();
    startWeatherCycle();

    // Load from Firebase
    db.ref('cd_ghosttown').once('value', snap => {
        if (snap.exists()) {
            applyGTData(snap.val());
            electEnemyHost('ghosttown');
        }
    });
    // Live weather sync
    db.ref('cd_gt_weather').on('value', snap => {
        if (snap.exists()) applyWeather(snap.val());
    });
    // Listen for enemy state from host
    db.ref('cd_enemy_state/ghosttown').on('value', snap => {
        if (isEnemyHost || !snap.exists()) return;
        applyRemoteEnemies(snap.val(), 'ghosttown');
    });
}

function exitGhostTown() {
    if (gtInInterior) leaveInterior();
    document.getElementById('hp-bar').style.display = 'none';
    document.getElementById('weather-timer').style.display = 'none';
    gtMsg.style.display = 'none';
    document.getElementById('bsmt-interact').style.display = 'none';
    document.getElementById('c').style.transform = '';
    db.ref('cd_gt_weather').off();
    if (gtWeatherInterval) { clearInterval(gtWeatherInterval); gtWeatherInterval = null; }
    gtClockData = null;
    clearGTEnemies();
    enterHub();
}

// ── Scene ─────────────────────────────────────────────────────────────
function buildGTScene() {
    gtScene  = new THREE.Scene();
    gtScene.background = new THREE.Color(0x87ceeb);
    gtCamera = makeCamera();
    gtCamera.far = 40000;
    gtCamera.updateProjectionMatrix();

    gtAmbLight = new THREE.AmbientLight(0xffffff, 0.7);
    gtScene.add(gtAmbLight);
    gtSunLight = new THREE.DirectionalLight(0xfff5e0, 1.0);
    gtSunLight.position.set(2400, 3600, 1800);
    gtScene.add(gtSunLight);

    // Terrain mesh with height support
    const geo = new THREE.PlaneGeometry(GT_SIZE*2, GT_SIZE*2, GT_TERRAIN_SEGS, GT_TERRAIN_SEGS);
    gtTerrainMesh = new THREE.Mesh(geo, new THREE.MeshLambertMaterial({ color: 0xd4a96a, vertexColors: false }));
    gtTerrainMesh.rotation.x = -Math.PI/2;
    gtTerrainMesh.userData.isGTGround = true;
    gtTerrainMesh.receiveShadow = true;
    gtScene.add(gtTerrainMesh);
    gtScene.fog = new THREE.Fog(0x87ceeb, GT_SIZE*0.4, GT_SIZE*1.0);
}

// ── GT Terrain helpers ────────────────────────────────────────────────
function getGTTerrainY(wx, wz) {
    if (!gtTerrainMesh || !gtTerrainHeights) return 0;
    const u = (wx / (GT_SIZE * 2) + 0.5);
    const v = (wz / (GT_SIZE * 2) + 0.5);
    const ui = Math.max(0, Math.min(GT_TERRAIN_SEGS, Math.round(u * GT_TERRAIN_SEGS)));
    const vi = Math.max(0, Math.min(GT_TERRAIN_SEGS, Math.round(v * GT_TERRAIN_SEGS)));
    return gtTerrainHeights[vi]?.[ui] ?? 0;
}

function buildGTTerrain(rng) {
    const segs = GT_TERRAIN_SEGS;
    const heights = [];

    // Place mountain zones around the ring perimeter
    const mountainZones = [];
    const numPeaks = 60;
    for (let i = 0; i < numPeaks; i++) {
        const angle = (i / numPeaks) * Math.PI * 2 + (rng() - 0.5) * 0.2;
        const r = (MOUNTAIN_R / GT_SIZE) * 0.5 + (rng() - 0.5) * 0.04; // normalized 0-1
        mountainZones.push({
            cx: Math.cos(angle) * r + 0.5,
            cz: Math.sin(angle) * r + 0.5,
            outerR: 0.04 + rng() * 0.03,
            height: 500 + rng() * 600,
        });
    }
    // A few extra inland peaks in dark region
    for (let i = 0; i < 12; i++) {
        const angle = rng() * Math.PI * 2;
        const r = ((MOUNTAIN_R + 1000) / GT_SIZE) * 0.5 + rng() * 0.06;
        mountainZones.push({
            cx: Math.cos(angle) * r + 0.5,
            cz: Math.sin(angle) * r + 0.5,
            outerR: 0.02 + rng() * 0.025,
            height: 300 + rng() * 400,
        });
    }

    for (let vi = 0; vi <= segs; vi++) {
        heights.push([]);
        for (let ui = 0; ui <= segs; ui++) {
            const u = ui / segs, v = vi / segs;
            const wx = (u - 0.5) * GT_SIZE * 2;
            const wz = (v - 0.5) * GT_SIZE * 2;
            const distFromCenter = Math.sqrt(wx*wx + wz*wz);

            // Gentle rolling hills across the map
            const freq = 1 / 4000;
            const baseBump = (
                Math.sin(wx * freq * 1.1 + 0.5) * Math.cos(wz * freq * 0.9 + 0.3) +
                Math.sin(wx * freq * 2.3 + 1.2) * Math.cos(wz * freq * 2.0 + 0.8)
            ) * 30;

            // Mountain influence
            let mInfluence = 0, mHeight = 0;
            for (const z of mountainZones) {
                const du = u - z.cx, dv = v - z.cz;
                const dist = Math.sqrt(du*du + dv*dv);
                if (dist < z.outerR) {
                    const t = 1 - dist / z.outerR;
                    const ts = t * t * (3 - 2 * t);
                    if (ts > mInfluence) { mInfluence = ts; mHeight = z.height; }
                }
            }

            let h = baseBump;
            if (mInfluence > 0) {
                const ridgeNoise = Math.sin(wx * freq * 5 + 2.1) * Math.cos(wz * freq * 4 + 1.3) * 80;
                h = baseBump * (1 - mInfluence) + (mHeight + ridgeNoise) * mInfluence;
            }

            // Town area stays flat
            if (distFromCenter < TOWN_R * 0.7) {
                const blend = Math.max(0, 1 - distFromCenter / (TOWN_R * 0.7));
                h = h * (1 - blend * 0.9);
            }

            heights[vi].push(Math.max(0, h));
        }
    }

    gtTerrainHeights = heights;

    // Apply to mesh with vertex colors
    const positions = gtTerrainMesh.geometry.attributes.position;
    const colorArr = [];
    for (let vi = 0; vi <= segs; vi++) {
        for (let ui = 0; ui <= segs; ui++) {
            const idx = vi * (segs + 1) + ui;
            const h = heights[vi][ui];
            const wx = (ui / segs - 0.5) * GT_SIZE * 2;
            const wz = (vi / segs - 0.5) * GT_SIZE * 2;
            const dist = Math.sqrt(wx*wx + wz*wz);
            positions.setZ(idx, h);

            let r, g, b;
            if (mInfluenceAt(h, dist)) {
                // Mountain — rocky
                if (h > 700) { r=0.82; g=0.80; b=0.78; }       // snow cap
                else if (h > 350) { r=0.55; g=0.50; b=0.43; }  // grey rock
                else { r=0.38; g=0.34; b=0.26; }                // rocky base
            } else if (dist < TOWN_R) {
                r=0.72; g=0.62; b=0.42; // dirt beige
            } else if (dist < DESERT_R) {
                r=0.82; g=0.72; b=0.48; // sand
            } else if (dist < MOUNTAIN_R) {
                r=0.52; g=0.46; b=0.38; // rocky grey desert
            } else {
                r=0.28; g=0.22; b=0.15; // dark region
            }
            colorArr.push(r, g, b);
        }
    }
    positions.needsUpdate = true;
    gtTerrainMesh.geometry.setAttribute('color', new THREE.Float32BufferAttribute(colorArr, 3));
    gtTerrainMesh.material.vertexColors = true;
    gtTerrainMesh.geometry.computeVertexNormals();
}

function mInfluenceAt(h, dist) {
    return h > 200 && dist > DESERT_R * 0.6;
}

// ── Generation ────────────────────────────────────────────────────────
function generateGhostTown() {
    if (myName !== 'bartelsfamily5') return;
    const rng = seededRand(Date.now() % 9999);

    // Clear old
    gtBuildings.forEach(b => { gtScene.remove(b.mesh); b.scene = null; b.camera = null; });
    gtBuildings = []; gtCollisionBoxes = []; clearGTEnemies();

    // ── Build terrain ──
    buildGTTerrain(rng);

    // ── Road down center (on terrain) ──
    const road = new THREE.Mesh(
        new THREE.PlaneGeometry(360, TOWN_R*2),
        new THREE.MeshLambertMaterial({ color: 0x555555 })
    );
    road.rotation.x = -Math.PI/2; road.position.y = 2;
    gtScene.add(road);
    const road2 = road.clone(); road2.rotation.z = Math.PI/2; gtScene.add(road2);

    // ── Cacti in desert ──
    for (let c=0; c<200; c++) {
        const angle = rng()*Math.PI*2;
        const r = TOWN_R + 500 + rng()*(MOUNTAIN_R - TOWN_R - 1000);
        const cx = Math.cos(angle)*r, cz = Math.sin(angle)*r;
        const cy = getGTTerrainY(cx, cz);
        const cactus = makeCactus(cx, cz);
        cactus.position.y = cy;
        gtScene.add(cactus);
    }

    // ── Town Hall (always 1, near center) ──
    placeTownHall(rng);

    // ── Museum (always 1) ──
    placeMuseum(rng);

    // ── Other buildings — no overlap ──
    const buildingPool = ['store','house1','house2','misc1','misc2','misc3','misc4'];
    const numBuildings = 18 + Math.floor(rng()*10);
    const placed = [
        { x: gtBuildings[0]?.x||0, z: gtBuildings[0]?.z||0, hw: 280, hd: 220 },
        { x: gtBuildings[1]?.x||0, z: gtBuildings[1]?.z||0, hw: 260, hd: 210 },
    ];
    for (let i=0; i<numBuildings; i++) {
        let attempts = 0, ok = false, bx, bz;
        while (attempts++ < 60 && !ok) {
            const angle = rng()*Math.PI*2;
            const r = 500 + rng()*(TOWN_R - 700);
            bx = Math.cos(angle)*r; bz = Math.sin(angle)*r;
            if (Math.abs(bx) < 300 || Math.abs(bz) < 300) continue;
            const sz = BLDG_SIZES[buildingPool[0]];
            const hw = (sz.w/2) + 150, hd = (sz.d/2) + 150;
            ok = placed.every(p => {
                return Math.abs(p.x - bx) > (p.hw + hw) || Math.abs(p.z - bz) > (p.hd + hd);
            });
        }
        if (!ok) continue;
        const type = buildingPool[Math.floor(rng()*buildingPool.length)];
        const sz = BLDG_SIZES[type];
        placeBuilding(type, bx, bz, rng);
        placed.push({ x:bx, z:bz, hw: sz.w/2+150, hd: sz.d/2+150 });
    }

    // ── Save ──
    const saveData = {
        buildings: gtBuildings.map(b=>({ type:b.type, x:+b.x.toFixed(1), z:+b.z.toFixed(1), rot:+(b.rot||0).toFixed(3) })),
        terrain: { heights: gtTerrainHeights.map(row => row.map(v => Math.round(v*10)/10)), segs: GT_TERRAIN_SEGS },
        generated: Date.now()
    };
    db.ref('cd_ghosttown').set(saveData);
    db.ref('cd_gt_weather').set('day');
    gtClockData = generateWeatherClock(Date.now() % 99999);
    gtGenerated = true;
    showGTMsg('🏚️ Ghost Town generated!'); setTimeout(()=>showGTMsg(''), 2500);
}

function applyGTData(data) {
    if (!data.buildings) return;
    gtBuildings.forEach(b => gtScene.remove(b.mesh));
    gtBuildings = []; gtCollisionBoxes = [];
    if (data.terrain && data.terrain.heights) {
        gtTerrainHeights = data.terrain.heights;
        const segs = data.terrain.segs || GT_TERRAIN_SEGS;
        const positions = gtTerrainMesh.geometry.attributes.position;
        const colorArr = [];
        for (let vi = 0; vi <= segs; vi++) {
            for (let ui = 0; ui <= segs; ui++) {
                const idx = vi * (segs + 1) + ui;
                const h = gtTerrainHeights[vi]?.[ui] ?? 0;
                const wx = (ui / segs - 0.5) * GT_SIZE * 2;
                const wz = (vi / segs - 0.5) * GT_SIZE * 2;
                const dist = Math.sqrt(wx*wx + wz*wz);
                positions.setZ(idx, h);
                let r, g, b;
                if (mInfluenceAt(h, dist)) {
                    if (h > 700)      { r=0.82; g=0.80; b=0.78; }
                    else if (h > 350) { r=0.55; g=0.50; b=0.43; }
                    else              { r=0.38; g=0.34; b=0.26; }
                } else if (dist < TOWN_R) {
                    r=0.72; g=0.62; b=0.42;
                } else if (dist < DESERT_R) {
                    r=0.82; g=0.72; b=0.48;
                } else if (dist < MOUNTAIN_R) {
                    r=0.52; g=0.46; b=0.38;
                } else {
                    r=0.28; g=0.22; b=0.15;
                }
                colorArr.push(r, g, b);
            }
        }
        positions.needsUpdate = true;
        gtTerrainMesh.geometry.setAttribute('color', new THREE.Float32BufferAttribute(colorArr, 3));
        gtTerrainMesh.material.vertexColors = true;
        gtTerrainMesh.geometry.computeVertexNormals();
    }

    const rng = seededRand(42);
    data.buildings.forEach(b => placeBuilding(b.type, b.x, b.z, rng, b.rot));

    // Cacti
    const rng2 = seededRand(13);
    for (let c=0; c<200; c++) {
        const angle = rng2()*Math.PI*2;
        const r = TOWN_R + 500 + rng2()*(MOUNTAIN_R - TOWN_R - 1000);
        const cx = Math.cos(angle)*r, cz = Math.sin(angle)*r;
        const cy = getGTTerrainY(cx, cz);
        const cactus = makeCactus(cx, cz);
        cactus.position.y = cy;
        gtScene.add(cactus);
    }
}

// ── Building placement ────────────────────────────────────────────────
const BLDG_SIZES = {
    store:    { w:200, d:200, h:160 },
    house1:   { w:200, d:200, h:150 },
    house2:   { w:320, d:280, h:160 },
    misc1:    { w:180, d:180, h:140 },
    misc2:    { w:180, d:180, h:140 },
    misc3:    { w:260, d:260, h:150 },
    misc4:    { w:400, d:400, h:180 },
    townhall: { w:500, d:400, h:240 },
    museum:   { w:480, d:380, h:220 },
};

function placeBuilding(type, bx, bz, rng, rot) {
    const sz   = BLDG_SIZES[type] || BLDG_SIZES.misc1;
    const brot = rot !== undefined ? rot : rng()*Math.PI*2;
    const grp  = new THREE.Group();
    const groundY = getGTTerrainY(bx, bz);

    // Walls
    const wallCol = { store:0xd4b483, house1:0xc8a870, house2:0xc09a60,
        misc1:0xd0aa7a, misc2:0xcc9966, misc3:0xc89050, misc4:0xd0a868,
        townhall:0xe8e0cc, museum:0xe0d8c0 }[type] || 0xc8a870;
    const wallMat = new THREE.MeshLambertMaterial({ color: wallCol });
    const roofMat = new THREE.MeshLambertMaterial({ color: 0x884422 });

    const W=sz.w, D=sz.d, H=sz.h, WT=10;
    grp.add(mkBox(W,H,WT, wallMat, 0,H/2,-D/2));
    grp.add(mkBox(WT,H,D, wallMat, -W/2,H/2,0));
    grp.add(mkBox(WT,H,D, wallMat,  W/2,H/2,0));
    const doorW=60, doorH=120;
    const sw=(W-doorW)/2;
    grp.add(mkBox(sw,H,WT, wallMat, -W/2+sw/2, H/2, D/2));
    grp.add(mkBox(sw,H,WT, wallMat,  W/2-sw/2, H/2, D/2));
    grp.add(mkBox(doorW,H-doorH,WT, wallMat, 0, doorH+(H-doorH)/2, D/2));

    const doorMat = new THREE.MeshLambertMaterial({ color: 0x5c3317 });
    grp.add(mkBox(doorW+8,8,WT+2, doorMat, 0, doorH, D/2));
    const doorTrigger = new THREE.Mesh(new THREE.BoxGeometry(doorW,doorH,30), new THREE.MeshBasicMaterial({visible:false}));
    doorTrigger.position.set(0, doorH/2, D/2);
    doorTrigger.userData.isDoor = true; doorTrigger.userData.buildingIdx = gtBuildings.length;
    grp.add(doorTrigger);

    grp.add(mkBox(W+WT*2, WT, D+WT*2, roofMat, 0, H+WT/2, 0));

    grp.rotation.y = brot;
    grp.position.set(bx, groundY, bz);
    gtScene.add(grp);

    // Single AABB for the whole building footprint.
    // Project the four corners of the rotated rectangle into world space,
    // then take the min/max to get a tight axis-aligned box.
    const cosR = Math.cos(brot), sinR = Math.sin(brot);
    const hw = W / 2 + WT, hd = D / 2 + WT; // half-extents with wall thickness
    const corners = [
        { lx: -hw, lz: -hd }, { lx:  hw, lz: -hd },
        { lx:  hw, lz:  hd }, { lx: -hw, lz:  hd },
    ];
    let minX = Infinity, maxX = -Infinity, minZ = Infinity, maxZ = -Infinity;
    for (const c of corners) {
        const wx2 = bx + c.lx * cosR - c.lz * sinR;
        const wz2 = bz + c.lx * sinR + c.lz * cosR;
        if (wx2 < minX) minX = wx2; if (wx2 > maxX) maxX = wx2;
        if (wz2 < minZ) minZ = wz2; if (wz2 > maxZ) maxZ = wz2;
    }
    gtCollisionBoxes.push({ minX, maxX, minZ, maxZ });

    const bldg = { type, x:bx, z:bz, rot:brot, mesh:grp, sz, interior:null };
    gtBuildings.push(bldg);
    return bldg;
}

function placeTownHall(rng) {
    placeBuilding('townhall', (rng()-0.5)*600, -(TOWN_R*0.6), rng, 0);
}
function placeMuseum(rng) {
    placeBuilding('museum', (rng()-0.5)*600, TOWN_R*0.55, rng, Math.PI);
}

function mkBox(w,h,d,mat,x,y,z) {
    const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), mat);
    m.position.set(x,y,z); return m;
}

// ── Cactus ────────────────────────────────────────────────────────────
function makeCactus(x,z) {
    const g = new THREE.Group();
    const mat = new THREE.MeshLambertMaterial({ color: 0x2d6a2d });
    const trunk = new THREE.Mesh(new THREE.CylinderGeometry(6,8,80,6), mat);
    trunk.position.y = 40; g.add(trunk);
    const arm1 = new THREE.Mesh(new THREE.CylinderGeometry(4,4,30,6), mat);
    arm1.rotation.z = Math.PI/3; arm1.position.set(20,50,0); g.add(arm1);
    const arm2 = new THREE.Mesh(new THREE.CylinderGeometry(4,4,30,6), mat);
    arm2.rotation.z = -Math.PI/3; arm2.position.set(-20,55,0); g.add(arm2);
    g.position.set(x, 0, z);
    g.rotation.y = Math.random()*Math.PI*2;
    return g;
}

// ── Weather ────────────────────────────────────────────────────────────
let gtRainParticles = null;
let gtShakeInterval = null;

function applyWeather(w) {
    gtWeather = w;
    document.getElementById('dim-label').innerText = '🏚️ Ghost Town — ' + ({
        day:'☀️ Day', night:'🌙 Night', rainy:'🌧️ Rain', reckoning:'⚠️ Reckoning'
    }[w]||w);

    // Sky / lighting
    const configs = {
        day:       { sky:0x87ceeb, amb:0.75, sun:1.0,  fog:0x87ceeb },
        night:     { sky:0x080818, amb:0.12, sun:0.0,  fog:0x080818 },
        rainy:     { sky:0x445566, amb:0.35, sun:0.2,  fog:0x334455 },
        reckoning: { sky:0x220a00, amb:0.15, sun:0.05, fog:0x1a0500 },
    };
    const cfg = configs[w] || configs.day;
    if (gtScene)  gtScene.background = new THREE.Color(cfg.sky);
    if (gtScene)  gtScene.fog = new THREE.Fog(cfg.fog, GT_SIZE*0.3, GT_SIZE*0.8);
    if (gtAmbLight) gtAmbLight.intensity = cfg.amb;
    if (gtSunLight) gtSunLight.intensity = cfg.sun;

    // Rain particles
    if (gtRainParticles) { gtScene.remove(gtRainParticles); gtRainParticles = null; }
    if (w === 'rainy' || w === 'reckoning') buildRain();

    // Reckoning warning
    if (w === 'reckoning') {
        showGTMsg('Something is wrong. Get inside.');
        setTimeout(() => showGTMsg(''), 4000);
        startShake();
    } else {
        stopShake();
    }

    // Respawn enemies for new weather
    clearGTEnemies();
    if (gtGenerated || Object.keys(gtBuildings).length > 0) spawnGTEnemies();
    updateWeatherTimerUI();
}

function buildRain() {
    const count = 2000;
    const geo   = new THREE.BufferGeometry();
    const verts = [];
    for (let i=0; i<count; i++) {
        verts.push((Math.random()-0.5)*GT_SIZE*0.3, Math.random()*800, (Math.random()-0.5)*GT_SIZE*0.3);
    }
    geo.setAttribute('position', new THREE.Float32BufferAttribute(verts,3));
    gtRainParticles = new THREE.Points(geo, new THREE.PointsMaterial({ color:0x88aacc, size:3, transparent:true, opacity:0.5 }));
    gtScene.add(gtRainParticles);
}

function startShake() {
    gtReckoningShake = true;
}
function stopShake() {
    gtReckoningShake = false;
    document.getElementById('c').style.transform = '';
}

// ── Weather cycling — fully serverless, computed from a saved timeline ──
let gtWeatherInterval = null;
let gtWeatherCountdown = 0;
let gtClockData = null; // { startTime, cycles: [{weather, duration}] }

// Generate a long pre-planned sequence of cycles and save it to Firebase.
// Called when the town is generated, or when a player enters and no clock exists.
function generateWeatherClock(seed) {
    const rng = seededRand(seed || (Date.now() % 99999));
    const cycles = [];
    let lastWeather = 'day';
    // Pre-generate 200 cycles (~16 hours at 5min each)
    for (let i = 0; i < 200; i++) {
        const reckoningChance = 1/15;
        let next;
        let attempts = 0;
        do {
            if (rng() < reckoningChance) {
                next = 'reckoning';
            } else {
                const safe = ['day','night','rainy'];
                next = safe[Math.floor(rng() * safe.length)];
            }
            attempts++;
        } while (next === lastWeather && next !== 'rainy' && attempts < 10);
        lastWeather = next;
        // Reckoning lasts 60s, everything else WEATHER_CYCLE ms
        cycles.push({ weather: next, duration: next === 'reckoning' ? 60000 : WEATHER_CYCLE });
        // After reckoning always insert a day cycle
        if (next === 'reckoning') {
            cycles.push({ weather: 'day', duration: WEATHER_CYCLE });
            lastWeather = 'day';
        }
    }
    const clockData = { startTime: Date.now(), cycles };
    db.ref('cd_gt_clock').set(clockData);
    return clockData;
}

// Compute current weather and seconds-to-next-cycle from the saved clock
function computeWeatherFromClock(clock) {
    if (!clock || !clock.cycles || !clock.startTime) return { weather: 'day', secsLeft: 300 };
    let t = Date.now() - clock.startTime;
    // Wrap through the cycle list
    const totalDur = clock.cycles.reduce((a, c) => a + c.duration, 0);
    t = ((t % totalDur) + totalDur) % totalDur;
    let acc = 0;
    for (const c of clock.cycles) {
        acc += c.duration;
        if (t < acc) {
            const secsLeft = Math.ceil((acc - t) / 1000);
            return { weather: c.weather, secsLeft };
        }
    }
    return { weather: 'day', secsLeft: 300 };
}

function startWeatherCycle() {
    // Read existing clock, or create one if missing
    db.ref('cd_gt_clock').once('value', snap => {
        if (snap.exists()) {
            gtClockData = snap.val();
        } else {
            gtClockData = generateWeatherClock();
        }
        tickWeather();
    });

    // Every second, each client locally computes current weather
    if (gtWeatherInterval) clearInterval(gtWeatherInterval);
    gtWeatherInterval = setInterval(tickWeather, 1000);
}

function tickWeather() {
    if (!gtClockData || currentDim !== 'ghosttown') return;
    const { weather, secsLeft } = computeWeatherFromClock(gtClockData);
    // Apply reckoning chance boost if Peeping Tom is active
    // (already baked into the sequence, but we can re-roll on the fly for active sessions)
    gtWeatherCountdown = secsLeft;
    if (weather !== gtWeather) {
        applyWeather(weather);
    }
    updateWeatherTimerUI();
}

function updateWeatherTimerUI() {
    const el = document.getElementById('weather-timer');
    if (!el) return;
    if (currentDim !== 'ghosttown') { el.style.display = 'none'; return; }
    const secs = Math.ceil(gtWeatherCountdown);
    const mins = Math.floor(secs / 60), s = secs % 60;
    const label = gtWeather === 'reckoning' ? '⚠️ Reckoning ends' : '🌤 Next cycle';
    el.innerText = `${label}: ${mins}:${String(s).padStart(2,'0')}`;
    el.style.display = 'block';
    el.style.borderColor = gtWeather === 'reckoning' ? '#eb4d4b' : 'var(--primary)';
    el.style.color       = gtWeather === 'reckoning' ? '#eb4d4b' : 'var(--accent)';
}

// ── Interiors ─────────────────────────────────────────────────────────
function enterInterior(bldgIdx) {
    const b = gtBuildings[bldgIdx];
    if (!b) return;
    gtInInterior = true;
    gtInteriorBuilding = b;

    // Each building gets its own scene + camera, built once and cached
    if (!b.scene) {
        b.scene  = new THREE.Scene();
        b.scene.background = new THREE.Color(0x221a10);
        b.camera = makeCamera();
        b.camera.far = 3000;
        b.camera.updateProjectionMatrix();
        b.scene.add(new THREE.AmbientLight(0xffeecc, 0.5));
        const iL = new THREE.PointLight(0xffeeaa, 1.8, 800);
        iL.position.set(0, b.sz.h * 0.8, 0); b.scene.add(iL);
        buildInterior(b);
    }

    gtInteriorScene  = b.scene;
    gtInteriorCamera = b.camera;
    activeScene  = b.scene;
    activeCamera = b.camera;

    // Spawn just inside the front door (south side, facing north)
    pos.x = 0; pos.y = 0; pos.z = b.sz.d * 0.35;
    yaw = Math.PI;

    document.getElementById('bsmt-interact').innerText = '[ E ] Exit building';
    document.getElementById('bsmt-interact').style.display = 'block';
}

function leaveInterior() {
    gtInInterior = false;
    activeScene  = gtScene;
    activeCamera = gtCamera;
    document.getElementById('bsmt-interact').style.display = 'none';
    // Pop player out just in front of the door in world space
    if (gtInteriorBuilding) {
        const b = gtInteriorBuilding;
        const cosR = Math.cos(b.rot), sinR = Math.sin(b.rot);
        const localZ = b.sz.d / 2 + 80;
        pos.x = b.x + localZ * sinR;
        pos.z = b.z + localZ * cosR;
        pos.y = getGTTerrainY(pos.x, pos.z);
    }
}

function buildInterior(b) {
    const s    = b.scene;
    const W = b.sz.w*0.9, D = b.sz.d*0.9, H = b.sz.h*0.9, WT=8;
    const floorMat = new THREE.MeshLambertMaterial({ color:0x5c4020 });
    const wallMat  = new THREE.MeshLambertMaterial({ color:0x9a7a50 });

    function iBox(w,h,d,mat,x,y,z) { const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat); m.position.set(x,y,z); s.add(m); return m; }

    // Floor, ceiling, 4 walls
    iBox(W,WT,D, floorMat, 0, 0, 0);
    iBox(W,WT,D, new THREE.MeshLambertMaterial({color:0x3a2a10}), 0,H,0);
    iBox(W,H,WT, wallMat, 0,H/2,-D/2);
    iBox(W,H,WT, wallMat, 0,H/2, D/2);
    iBox(WT,H,D, wallMat, -W/2,H/2,0);
    iBox(WT,H,D, wallMat,  W/2,H/2,0);

    // Furniture based on type
    const tblMat = new THREE.MeshLambertMaterial({color:0x5c3a1e});
    const chairMat = new THREE.MeshLambertMaterial({color:0x3a2010});

    if (b.type === 'store') {
        // Shelves along walls
        for (let i=-1;i<=1;i++) {
            const shelf=new THREE.Mesh(new THREE.BoxGeometry(W*0.6,8,30), tblMat);
            shelf.position.set(i*W*0.22, 60+i*20, -D*0.3); s.add(shelf);
        }
        iBox(80,4,50, tblMat, 0,40,0); // counter
    } else if (b.type === 'house1') {
        // Bed
        iBox(80,20,100, new THREE.MeshLambertMaterial({color:0x4444aa}), -W/2+60,10,-D/2+70);
        // Table near entrance
        iBox(60,4,40, tblMat, W/2-60,35,D/2-60);
    } else if (b.type === 'house2') {
        // 4 rooms via internal walls
        iBox(WT,H,D/2, wallMat, 0,H/2,-D/4); // divider
        iBox(W/2,H,WT, wallMat, W/4,H/2,0);  // divider
        // Bed (bedroom)
        iBox(70,18,90, new THREE.MeshLambertMaterial({color:0x4444aa}), -W/2+50,9,-D/4);
        // Chair + table (living room)
        iBox(40,4,40, tblMat, W/4,30,D/4);
        iBox(30,50,30, new THREE.MeshLambertMaterial({color:0x334455}), W/4,50,D/4);        // TV box on table
        iBox(40,28,6, new THREE.MeshBasicMaterial({color:0x111111}), W/4,44,D/4);
        // Bathroom — checkerboard floor tile
        const cbC = document.createElement('canvas'); cbC.width=cbC.height=64;
        const cbCtx=cbC.getContext('2d');
        for(let ci=0;ci<4;ci++) for(let cj=0;cj<4;cj++){cbCtx.fillStyle=(ci+cj)%2===0?'#eee':'#888';cbCtx.fillRect(ci*16,cj*16,16,16);}
        const cbTex=new THREE.CanvasTexture(cbC); cbTex.wrapS=cbTex.wrapT=THREE.RepeatWrapping; cbTex.repeat.set(4,4);
        const bathFloor=new THREE.Mesh(new THREE.PlaneGeometry(W/2,D/2),new THREE.MeshLambertMaterial({map:cbTex}));
        bathFloor.rotation.x=-Math.PI/2; bathFloor.position.set(-W/4,1,D/4); s.add(bathFloor);
        // Toilet
        const toiletG=makeGTToilet(); toiletG.position.set(-W/4,0,D/4); s.add(toiletG);
    } else if (b.type === 'misc2') {
        iBox(60,4,40, tblMat, 0,40,0);
        const ch=makeGTChair(chairMat); ch.position.set(0,0,60); s.add(ch);
    } else if (b.type === 'misc3') {
        for(let i=0;i<4;i++){
            const cx=(Math.random()-0.5)*W*0.5, cz=(Math.random()-0.5)*D*0.5;
            iBox(40,40,40, new THREE.MeshLambertMaterial({color:0x7a6a50}), cx,20,cz);
        }
    } else if (b.type === 'misc4') {
        // Completely empty — just the room
    } else if (b.type === 'misc1') {
        // Crate in corner
        iBox(50,50,50, new THREE.MeshLambertMaterial({color:0x7a6a50}), -W/2+40,25,-D/2+40);
    } else if (b.type === 'townhall') {
        // Stage + chairs
        iBox(W*0.5, 30, D*0.25, new THREE.MeshLambertMaterial({color:0x8a7050}), 0,15,-D*0.3);
        for(let row=0;row<4;row++) for(let col=0;col<6;col++){
            const ch=makeGTChair(chairMat);
            ch.position.set(-W/2+60+col*55, 0, -D*0.1+row*70);
            s.add(ch);
            const ch2=makeGTChair(chairMat);
            ch2.position.set(W/2-60-col*55, 0, -D*0.1+row*70);
            s.add(ch2);
        }
    } else if (b.type === 'museum') {
        // Paintings on walls — use enemy PNGs
        const imgs = ['buddy.png','fly.png','mountainbuddy.png','statue.png','notbuddy.png','giantspider.png'];
        imgs.forEach((img,i) => {
            const tx = new THREE.TextureLoader();
            const tryLoad = (path, fallback) => tx.load(path, t=>{
                const frame=new THREE.Mesh(new THREE.PlaneGeometry(80,80),new THREE.MeshBasicMaterial({map:t,side:THREE.DoubleSide}));
                frame.position.set(-W/2+40+(i%3)*110, 80, fallback ? D/2-5 : -D/2+5);
                frame.rotation.y = fallback ? 0 : Math.PI;
                s.add(frame);
            }, undefined, fallback ? ()=>{} : ()=>tryLoad(GITHUB_BASE+img, true));
            tryLoad('enemies/'+img, false);
        });
    }
}

// ── Enemies ────────────────────────────────────────────────────────────
function clearGTEnemies() {
    gtEnemies.forEach(e=>{ if(e.sprite) gtScene?.remove(e.sprite); });
    gtEnemies = [];
    peepingTomActive = false;
    megaSpiderExists = false;
}

const GT_ENEMY_DEFS = {
    spider:      {img:'enemies/giantspider.png',  size:55,  speed:GT_SPEED*0.75, dmg:15, hostile:false, tint:null},
    spiderRed:   {img:'enemies/giantspider.png',  size:55,  speed:GT_SPEED*0.75, dmg:15, hostile:true,  tint:0xff3333},
    statue:      {img:'enemies/statue.png',       size:70,  speed:GT_SPEED*3,    dmg:30, hostile:true,  tint:null},
    falseBuddy:  {img:'enemies/notbuddy.png',     size:75,  speed:GT_SPEED*1.5,  dmg:25, hostile:true,  tint:null},
    megaSpider:  {img:'enemies/giantspider.png',  size:340, speed:GT_SPEED*0.75, dmg:75, hostile:true,  tint:null},
    peepingTom:  {img:'enemies/peepingtom.png',   size:80,  speed:0,             dmg:0,  hostile:false, tint:null},
};
let peepingTomActive = false;
let megaSpiderExists = false;

function spawnGTEnemies() {
    clearGTEnemies();
    peepingTomActive = false;
    megaSpiderExists = false;
    const w = gtWeather;
    const rng = seededRand(Date.now()%9999);

    // Spiders — day:non-hostile, night+rain+reckoning:hostile red
    const spiderType = (w==='day') ? 'spider' : 'spiderRed';
    const spiderCount = w==='reckoning' ? 12 : w==='day' ? 6 : 8;
    for (let i=0;i<spiderCount;i++) {
        const angle=rng()*Math.PI*2, r=600+rng()*TOWN_R*0.8;
        spawnGTEnemy(spiderType, Math.cos(angle)*r, Math.sin(angle)*r);
    }

    // Statues — max 2 at a time
    if (w==='day') {
        if (rng()<0.3) spawnGTEnemy('statue', (rng()-0.5)*TOWN_R*0.8, (rng()-0.5)*TOWN_R*0.8);
    } else if (w==='night') {
        for(let i=0;i<2;i++) spawnGTEnemy('statue',(rng()-0.5)*TOWN_R*1.2,(rng()-0.5)*TOWN_R*1.2);
    } else if (w==='reckoning') {
        for(let i=0;i<2;i++) spawnGTEnemy('statue',(rng()-0.5)*TOWN_R*1.5,(rng()-0.5)*TOWN_R*1.5);
    }

    // False Buddy — always in Dark Place (beyond MOUNTAIN_R), PLUS town during Reckoning
    for(let i=0;i<3;i++){
        const angle=rng()*Math.PI*2, r=MOUNTAIN_R+800+rng()*2400;
        spawnGTEnemy('falseBuddy',Math.cos(angle)*r,Math.sin(angle)*r);
    }
    if (w==='reckoning') {
        for(let i=0;i<5;i++){
            const angle=rng()*Math.PI*2, r=TOWN_R+rng()*(MOUNTAIN_R-TOWN_R);
            spawnGTEnemy('falseBuddy',Math.cos(angle)*r,Math.sin(angle)*r);
        }
    }

    // Mega Spider — one, deep in the Dark Place
    {
        const angle=rng()*Math.PI*2, r=MOUNTAIN_R+800+rng()*2000;
        const mx = Math.cos(angle)*r, mz = Math.sin(angle)*r;
        spawnGTEnemy('megaSpider', mx, mz);
        megaSpiderExists = true;
    }

    // Peeping Tom — deep desert, far from center, only one
    {
        const angle=rng()*Math.PI*2, r=DESERT_R+800+rng()*(MOUNTAIN_R-DESERT_R-1200);
        spawnGTEnemy('peepingTom', Math.cos(angle)*r, Math.sin(angle)*r);
        peepingTomActive = true;
    }
}

function spawnGTEnemy(type, wx, wz) {
    const def = GT_ENEMY_DEFS[type];
    if (!def) return;
    const enemy = { type, def, x:wx, y:0, z:wz, vx:0, vz:0,
        sprite:null, lastHit:0, statuePhase:0, statuePhaseTimer:0, lastMove:0,
        spreadOffset: (Math.random() - 0.5) * 2.4, // anti-clump angle offset (~±137 degrees)
        wanderTimer: Math.random() * 20,            // stagger initial wander so they don't all go at once
        wanderDir: null };
    getSpriteTexture(type, def, tex => {
        const mat = new THREE.SpriteMaterial({map:tex,transparent:true,depthTest:true,depthWrite:false,sizeAttenuation:true});
        if (def.tint) mat.color.set(def.tint);
        const sp = new THREE.Sprite(mat);
        sp.scale.set(def.size, def.size, 1);
        sp.position.set(wx, def.size*0.5, wz);
        sp.userData.enemyType = type;
        gtScene.add(sp);
        enemy.sprite = sp;
    });
    gtEnemies.push(enemy);
    return enemy;
}

// ── Update ────────────────────────────────────────────────────────────
let gtLastCheck = 0;

function updateGhostTown(dt) {
    if (currentDim !== 'ghosttown') return;
    const now = Date.now();

    // Rain particle drift
    if (gtRainParticles) {
        const pos3 = gtRainParticles.geometry.attributes.position;
        for (let i=0; i<pos3.count; i++) {
            let y = pos3.getY(i) - 300*dt;
            if (y < 0) y = 600;
            pos3.setY(i, y);
            pos3.setX(i, pos3.getX(i) + 20*dt);
        }
        pos3.needsUpdate = true;
    }

    // Reckoning screen shake
    if (gtReckoningShake) {
        const s = Math.sin(now*0.02)*2.5;
        document.getElementById('c').style.transform = `translate(${s}px,${s*0.5}px)`;
    }

    // Wet / slow from rain
    if (gtWeather === 'rainy' && !gtInInterior) {
        if (!gtWet) { gtWet=true; gtWetTimer=now; }
        if (now - gtWetTimer > 30000 && gtSlowTimer === 0) {
            gtSlowTimer = now;
            showGTMsg('You got drenched! Movement slowed.');
            setTimeout(()=>showGTMsg(''),3000);
        }
    } else {
        gtWet = false;
        if (gtSlowTimer > 0 && now - gtSlowTimer > 60000) gtSlowTimer = 0;
    }

    // Interior E-key exit
    if (gtInInterior && keys['KeyE']) {
        keys['KeyE'] = false;
        leaveInterior();
        return;
    }

    // Door proximity check
    if (!gtInInterior && now - gtLastCheck > 300) {
        gtLastCheck = now;
        checkGTDoors();
    }

    // Enemy AI
    const spd = (gtSlowTimer > 0) ? GT_SPEED * 0.4 : GT_SPEED;
    gtEnemies.forEach(e => {
        if (!e.sprite) return;
        const pdx = pos.x - e.x, pdz = pos.z - e.z;
        const pdist = Math.sqrt(pdx*pdx + pdz*pdz);

        if (e.type === 'statue') {
            e.statuePhaseTimer += dt;
            if (e.statuePhase === 0 && e.statuePhaseTimer > 2.0) {
                e.statuePhase = 1; e.statuePhaseTimer = 0;
            } else if (e.statuePhase === 1 && e.statuePhaseTimer > 0.5) {
                e.statuePhase = 0; e.statuePhaseTimer = 0;
            }
            if (e.statuePhase === 1) {
                const len = pdist || 1;
                e.x += (pdx/len)*e.def.speed*dt;
                e.z += (pdz/len)*e.def.speed*dt;
            }
            if (pdist < 60 && now - e.lastHit > 2000) {
                e.lastHit = now; dealGTDmg(30); showGTMsg('A Statue got you!'); setTimeout(()=>showGTMsg(''),2000);
            }

        } else if (e.type === 'spiderRed') {
            // Every 20s pick a random wander direction for 3s, then resume chasing
            if (!e.wanderTimer) e.wanderTimer = 0;
            if (!e.wanderDir) e.wanderDir = null;
            e.wanderTimer += dt;
            if (e.wanderDir) {
                // Wandering sideways
                e.x += e.wanderDir.x * e.def.speed * 0.6 * dt;
                e.z += e.wanderDir.z * e.def.speed * 0.6 * dt;
                if (e.wanderTimer >= 3) { e.wanderDir = null; e.wanderTimer = 0; }
            } else {
                // Chase with a small perpendicular spread (anti-clump)
                const len = pdist || 1;
                const perpAngle = Math.atan2(pdz, pdx) + (e.spreadOffset || 0);
                e.x += Math.cos(perpAngle) * e.def.speed * dt;
                e.z += Math.sin(perpAngle) * e.def.speed * dt;
                if (e.wanderTimer >= 20) {
                    // Start wander — pick a random sideways direction
                    const sideAngle = Math.atan2(pdz, pdx) + (Math.random() < 0.5 ? Math.PI/2 : -Math.PI/2);
                    e.wanderDir = { x: Math.cos(sideAngle), z: Math.sin(sideAngle) };
                    e.wanderTimer = 0;
                }
            }
            if (pdist < 60 && now - e.lastHit > 1500) {
                e.lastHit = now; dealGTDmg(15); showGTMsg('A spider bit you!'); setTimeout(()=>showGTMsg(''),1500);
            }

        } else if (e.type === 'spider') {
            if (Math.random() < 0.01) { e.vx=(Math.random()-0.5)*80; e.vz=(Math.random()-0.5)*80; }
            e.x += e.vx*dt; e.z += e.vz*dt;

        } else if (e.type === 'falseBuddy') {
            // Confined to Dark Place (beyond MOUNTAIN_R) unless Reckoning
            const distFromCenter = Math.sqrt(e.x*e.x+e.z*e.z);
            const inDarkPlace = distFromCenter > MOUNTAIN_R;
            if (!inDarkPlace && gtWeather !== 'reckoning') {
                // Push back into dark place
                const len = distFromCenter || 1;
                e.x += (e.x/len)*e.def.speed*dt;
                e.z += (e.z/len)*e.def.speed*dt;
            } else {
                const len = pdist || 1;
                e.x += (pdx/len)*e.def.speed*dt;
                e.z += (pdz/len)*e.def.speed*dt;
            }
            if (pdist < 70 && now - e.lastHit > 2000) {
                e.lastHit = now; dealGTDmg(25); showGTMsg('The False Buddy hit you!'); setTimeout(()=>showGTMsg(''),2000);
            }

        } else if (e.type === 'megaSpider') {
            // Confined to Dark Place — cannot cross into mountain zone
            const distFromCenter = Math.sqrt(e.x*e.x+e.z*e.z);
            if (distFromCenter < MOUNTAIN_R + 200) {
                // Push back out into dark place
                const len = distFromCenter || 1;
                e.x -= (e.x/len)*e.def.speed*dt*2;
                e.z -= (e.z/len)*e.def.speed*dt*2;
            } else if (pdist < 3000) {
                // Pursue player if within range
                const len = pdist || 1;
                e.x += (pdx/len)*e.def.speed*dt;
                e.z += (pdz/len)*e.def.speed*dt;
            } else {
                // Wander slowly
                if (Math.random() < 0.005) { e.vx=(Math.random()-0.5)*100; e.vz=(Math.random()-0.5)*100; }
                e.x += e.vx*dt; e.z += e.vz*dt;
            }
            // Deal big damage
            if (pdist < 120 && now - e.lastHit > 2500) {
                e.lastHit = now; dealGTDmg(75); showGTMsg('💀 The Mega Spider got you!'); setTimeout(()=>showGTMsg(''),2500);
            }
            // Occasionally spawn a hostile spider (max every 8s, despawn after 15s)
            if (!e.spawnCooldown) e.spawnCooldown = 0;
            e.spawnCooldown -= dt;
            if (e.spawnCooldown <= 0 && Math.random() < 0.015) {
                e.spawnCooldown = 8;
                const sx = e.x + (Math.random()-0.5)*400, sz = e.z + (Math.random()-0.5)*400;
                const child = spawnGTEnemy('spiderRed', sx, sz);
                if (child) {
                    child.isMegaChild = true;
                    child.lifetime = 15;
                }
            }

        } else if (e.type === 'peepingTom') {
            // Teleport away if player gets within 1800 units
            if (pdist < 1800) {
                // Vanish — reappear far away in deep desert
                const angle = Math.random()*Math.PI*2;
                const r = DESERT_R + 1500 + Math.random()*2000;
                e.x = Math.cos(angle)*r; e.z = Math.sin(angle)*r;
                peepingTomActive = true; // still exists, just moved
                if (e.sprite) e.sprite.position.set(e.x, getGTTerrainY(e.x,e.z)+e.def.size*0.5, e.z);
                return; // skip normal position update
            }
        }

        // Mega spider children lifetime
        if (e.isMegaChild) {
            e.lifetime -= dt;
            if (e.lifetime <= 0) {
                if (e.sprite) { gtScene.remove(e.sprite); e.sprite = null; }
                e.dead = true;
                return;
            }
        }

        if (e.sprite) e.sprite.position.set(e.x, getGTTerrainY(e.x, e.z) + e.def.size*0.5, e.z);
    });
    // Prune dead children
    for (let i = gtEnemies.length-1; i >= 0; i--) {
        if (gtEnemies[i].dead) gtEnemies.splice(i,1);
    }
}

function checkGTDoors() {
    const prompt = document.getElementById('portal-prompt');
    const interact = document.getElementById('bsmt-interact');

    // Return portal — near world edge north
    if (pos.z < -GT_SIZE + 200 || (pos.x*pos.x+pos.z*pos.z) < 50*50 && gtInInterior===false) {
        // Check near hub exit (centre start)
    }

    // Check building doors
    let nearDoor = null;
    for (let i=0; i<gtBuildings.length; i++) {
        const b = gtBuildings[i];
        const dx = pos.x - b.x, dz = pos.z - b.z;
        const dist = Math.sqrt(dx*dx+dz*dz);
        if (dist < b.sz.d/2 + 80) { nearDoor = i; break; }
    }

    if (nearDoor !== null) {
        interact.innerText = '[ E ] Enter building'; interact.style.display='block';
        prompt.style.display = 'none';
        if (keys['KeyE']) { keys['KeyE']=false; enterInterior(nearDoor); }
    } else {
        interact.style.display = 'none';
        // Return to hub
        const distCenter = Math.sqrt(pos.x*pos.x + pos.z*pos.z);
        if (distCenter < 100 && pos.z > -50) {
            // near spawn — check for hub exit sign
        }
        // Hub portal on south edge of town
        const dHub = Math.sqrt(pos.x*pos.x + (pos.z - (TOWN_R-240))**2);
        if (dHub < 200) {
            prompt.innerText='[ E ] Return to Hub'; prompt.style.display='block';
            if(keys['KeyE']){keys['KeyE']=false; exitGhostTown();}
        } else {
            prompt.style.display='none';
        }
    }
}

function dealGTDmg(amount) {
    const now=Date.now();
    if(now-gtDmgTime<500) return;
    gtDmgTime=now;
    playerHP_gt=Math.max(0,playerHP_gt-amount);
    updateHPUI_gt();
    const flash=document.createElement('div');
    flash.style.cssText='position:fixed;inset:0;background:rgba(235,77,75,0.3);pointer-events:none;z-index:9000;';
    document.body.appendChild(flash); setTimeout(()=>flash.remove(),180);
    if(playerHP_gt<=0){showGTMsg('You died... returning to Hub.'); setTimeout(()=>{playerHP_gt=100;exitGhostTown();},2500);}
}
function updateHPUI_gt() {
    document.getElementById('hp-val').innerText=Math.ceil(playerHP_gt);
    const pct=playerHP_gt/100*100;
    const fill=document.getElementById('hp-fill');
    fill.style.width=pct+'%';
    fill.style.background=pct>60?'var(--primary)':pct>30?'#f39c12':'#eb4d4b';
}
function showGTMsg(msg) {
    const el=document.getElementById('bsmt-msg');
    if(!el) return;
    el.innerText=msg; el.style.display=msg?'block':'none';
}

function loop() {
    requestAnimationFrame(loop);
    const dt = Math.min(clock3.getDelta(), 0.05);
    update(dt);
    if (activeScene && activeCamera) renderer.render(activeScene, activeCamera);
}

function hashStr(s) {
    let h = 0;
    for (let i = 0; i < s.length; i++) h = s.charCodeAt(i) + ((h << 5) - h);
    return h;
}

let petNotifTimer = null;
function showPetNotif(msg) {
    const el = document.getElementById('pet-notif');
    el.innerText = msg; el.style.display = 'block';
    clearTimeout(petNotifTimer);
    petNotifTimer = setTimeout(() => el.style.display = 'none', 2500);
}

function updateHPUI() {
    const hp = currentDim === 'ghosttown' ? playerHP_gt : 100;
    document.getElementById('hp-val').innerText = Math.ceil(hp);
    const pct = hp;
    const fill = document.getElementById('hp-fill');
    fill.style.width = pct + '%';
    fill.style.background = pct>60 ? 'var(--primary)' : pct>30 ? '#f39c12' : '#eb4d4b';
}
function showMBDamage() {
    showPetNotif('💥 A Mountain Buddy hit you!');
    // Red flash overlay
    const flash = document.createElement('div');
    flash.style.cssText = 'position:fixed;inset:0;background:rgba(235,77,75,0.35);pointer-events:none;z-index:9000;';
    document.body.appendChild(flash);
    setTimeout(() => flash.remove(), 200);
}
</script>
</body>
</html>
